    force_tokens=[<span class="str">"Question:"</span>, <span class="str">"Answer:"</span>]  <span class="cm"># preserve these</span>)
<span class="cm"># Typical: 3000 tokens -> 1000 tokens, 3x cost reduction on context</span></code></pre>
<h2>Cost Reduction Summary</h2>
<table><tr><th>Strategy</th><th>Cost Reduction</th><th>Quality Impact</th><th>Effort</th></tr>
<tr><td>Semantic caching</td><td>30-50%</td><td>None (identical answer)</td><td>Low</td></tr>
<tr><td>LLM Router</td><td>40-60%</td><td>Minimal (complex queries unchanged)</td><td>Medium</td></tr>
<tr><td>Prompt compression</td><td>20-40%</td><td>Small (&lt;3% quality drop)</td><td>Medium</td></tr>
<tr><td>Fewer context chunks</td><td>10-20%</td><td>None if re-ranking is good</td><td>Low</td></tr>
<tr><td><strong>Combined</strong></td><td><strong>70-80%</strong></td><td><strong>&lt;5% quality drop</strong></td><td>Medium</td></tr></table>`
},

"streaming-ai": {id:"streaming-ai",title:"Streaming AI Responses (SSE, WebSockets)",cat:"Advanced Topics",level:"Advanced",time:"30 min",
content:`<h2>Streaming AI Responses</h2>
<p>Streaming delivers LLM tokens to the client as they're generated — reducing perceived latency from 3-8 seconds to near-instant first token. Essential for any user-facing AI application.</p>
<h2>Why Streaming Matters</h2>
<table><tr><th>Without Streaming</th><th>With Streaming</th></tr>
<tr><td>User stares at blank screen for 5s</td><td>First token in ~300ms</td></tr>
<tr><td>Time-to-first-byte = full generation time</td><td>TTFB = time-to-first-token (~300ms)</td></tr>
<tr><td>User thinks app is broken</td><td>User reads while model writes</td></tr>
<tr><td>Timeout risk on long outputs</td><td>No timeout issues</td></tr></table>
<h2>OpenAI Streaming (Python)</h2>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> AsyncOpenAI
client = AsyncOpenAI()

<span class="kw">async def</span> <span class="fn">stream_tokens</span>(question: <span class="cls">str</span>):
    stream = <span class="kw">await</span> client.chat.completions.create(
        model=<span class="str">"gpt-4o"</span>, stream=<span class="kw">True</span>,
        messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:question}])
    full_response = <span class="str">""</span>
    <span class="kw">async for</span> chunk <span class="kw">in</span> stream:
        token = chunk.choices[<span class="num">0</span>].delta.content <span class="kw">or</span> <span class="str">""</span>
        full_response += token
        print(token, end=<span class="str">""</span>, flush=<span class="kw">True</span>)
    <span class="kw">return</span> full_response</code></pre>
<h2>FastAPI Server-Sent Events (SSE)</h2>
<pre><code><span class="kw">from</span> fastapi <span class="kw">import</span> FastAPI
<span class="kw">from</span> fastapi.responses <span class="kw">import</span> StreamingResponse
<span class="kw">import</span> json

app = FastAPI()

<span class="kw">async def</span> <span class="fn">rag_stream_generator</span>(question: <span class="cls">str</span>, tenant_id: <span class="cls">str</span>):
    context = <span class="kw">await</span> retrieve_context(question, tenant_id)

    <span class="cm"># Stream metadata first</span>
    <span class="kw">yield</span> f<span class="str">"data: {json.dumps({'type':'context','sources':context.sources})}\n\n"</span>

    <span class="cm"># Stream LLM tokens</span>
    stream = <span class="kw">await</span> client.chat.completions.create(
        model=<span class="str">"gpt-4o"</span>, stream=<span class="kw">True</span>,
        messages=[
            {<span class="str">"role"</span>:<span class="str">"system"</span>,<span class="str">"content"</span>:f<span class="str">"Answer ONLY from context:\n{context.text}"</span>},
            {<span class="str">"role"</span>:<span class="str">"user"</span>,  <span class="str">"content"</span>:question}
        ])
    <span class="kw">async for</span> chunk <span class="kw">in</span> stream:
        token = chunk.choices[<span class="num">0</span>].delta.content <span class="kw">or</span> <span class="str">""</span>
        <span class="kw">if</span> token:
            <span class="kw">yield</span> f<span class="str">"data: {json.dumps({'type':'token','text':token})}\n\n"</span>

    <span class="kw">yield</span> <span class="str">"data: [DONE]\n\n"</span>

<span class="dec">@app.get("/stream")</span>
<span class="kw">async def</span> <span class="fn">stream_endpoint</span>(q: <span class="cls">str</span>, tenant_id: <span class="cls">str</span>):
    <span class="kw">return</span> StreamingResponse(
        rag_stream_generator(q, tenant_id),
        media_type=<span class="str">"text/event-stream"</span>,
        headers={<span class="str">"Cache-Control"</span>:<span class="str">"no-cache"</span>,<span class="str">"X-Accel-Buffering"</span>:<span class="str">"no"</span>})</code></pre>
<h2>Frontend SSE Consumer (JavaScript)</h2>
<pre><code><span class="kw">const</span> evtSource = <span class="kw">new</span> EventSource(<span class="str">&#96;/stream?q=\${encodeURIComponent(question)}&amp;tenant_id=\${tid}&#96;</span>);
<span class="kw">let</span> fullText = <span class="str">""</span>;

evtSource.onmessage = (event) => {
    <span class="kw">if</span> (event.data === <span class="str">"[DONE]"</span>) { evtSource.close(); <span class="kw">return</span>; }
    <span class="kw">const</span> msg = JSON.parse(event.data);
    <span class="kw">if</span> (msg.type === <span class="str">"token"</span>) {
        fullText += msg.text;
        document.getElementById(<span class="str">"answer"</span>).innerText = fullText;
    }
    <span class="kw">if</span> (msg.type === <span class="str">"context"</span>) {
        renderSources(msg.sources);
    }
};
evtSource.onerror = () => evtSource.close();</code></pre>
<h2>Spring AI Streaming (Java/Flux)</h2>
<pre><code><span class="dec">@GetMapping(value = "/stream", produces = MediaType.TEXT_EVENT_STREAM_VALUE)</span>
<span class="kw">public</span> Flux&lt;String&gt; <span class="fn">streamAnswer</span>(<span class="dec">@RequestParam</span> String question) {
    <span class="kw">return</span> chatClient.prompt()
        .system(<span class="str">"You are an AI assistant. Answer concisely."</span>)
        .user(question)
        .stream()
        .content();  <span class="cm">// Flux&lt;String&gt; of token chunks</span>
}</code></pre>
<h2>Streaming Performance Metrics</h2>
<table><tr><th>Metric</th><th>Target</th><th>Measure With</th></tr>
<tr><td>Time to First Token (TTFT)</td><td>&lt;500ms</td><td>LangFuse trace</td></tr>
<tr><td>Token throughput</td><td>&gt;30 tokens/sec</td><td>LangFuse / custom</td></tr>
<tr><td>Total latency</td><td>&lt;10s for 500-word response</td><td>End-to-end trace</td></tr>
<tr><td>SSE connection timeout</td><td>&gt;60s nginx/proxy timeout</td><td>nginx config</td></tr></table>
<div class="box warn"><div class="box-ico">⚠️</div><div class="box-body"><div class="box-title">Streaming Gotchas</div><p class="box-text">Nginx default proxy timeout is 60s — increase to 120s+ for streaming. SSE doesn't work with HTTP/2 multiplexing in some configs. Set X-Accel-Buffering: no header to prevent nginx from buffering your stream. Always have a fallback non-streaming endpoint for clients that don't support SSE (e.g., old mobile apps).</p></div></div>`
},

"multimodal-ai": {id:"multimodal-ai",title:"Multimodal AI (Vision, Audio)",cat:"Advanced Topics",level:"Advanced",time:"35 min",
content:`<h2>Multimodal AI</h2>
<p>Multimodal AI processes multiple input types: text, images, audio, video. GPT-4o, Claude 3.5 Sonnet, Gemini 2.0 are all natively multimodal.</p>
<h2>GPT-4o Vision</h2>
<pre><code><span class="kw">import</span> base64
<span class="kw">from</span> openai <span class="kw">import</span> OpenAI
client = OpenAI()

<span class="cm"># Analyze image from URL</span>
response = client.chat.completions.create(
    model=<span class="str">"gpt-4o"</span>,
    messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:[
        {<span class="str">"type"</span>:<span class="str">"text"</span>,<span class="str">"text"</span>:<span class="str">"Extract all text and data from this architecture diagram."</span>},
        {<span class="str">"type"</span>:<span class="str">"image_url"</span>,<span class="str">"image_url"</span>:{<span class="str">"url"</span>:<span class="str">"https://example.com/arch_diagram.png"</span>}}
    ]}]
)

<span class="cm"># Analyze local image (base64)</span>
<span class="kw">with</span> open(<span class="str">"invoice.png"</span>, <span class="str">"rb"</span>) <span class="kw">as</span> f:
    img_b64 = base64.b64encode(f.read()).decode()

response = client.chat.completions.create(
    model=<span class="str">"gpt-4o"</span>,
    messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:[
        {<span class="str">"type"</span>:<span class="str">"text"</span>,<span class="str">"text"</span>:<span class="str">"Extract all line items, amounts, and totals from this invoice as JSON."</span>},
        {<span class="str">"type"</span>:<span class="str">"image_url"</span>,<span class="str">"image_url"</span>:{<span class="str">"url"</span>:<span class="str">f"data:image/png;base64,{img_b64}"</span>}}
    ]}]
)</code></pre>
<h2>Whisper — Speech to Text</h2>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> OpenAI
client = OpenAI()

<span class="cm"># Transcribe audio file</span>
<span class="kw">with</span> open(<span class="str">"meeting_recording.mp3"</span>, <span class="str">"rb"</span>) <span class="kw">as</span> audio:
    transcript = client.audio.transcriptions.create(
        model=<span class="str">"whisper-1"</span>,
        file=audio,
        language=<span class="str">"en"</span>,
        response_format=<span class="str">"text"</span>
    )

<span class="cm"># Then use transcript in RAG or summarization</span>
summary = ask_llm(<span class="str">f"Summarize this meeting transcript and list all action items:\\n{transcript}"</span>)</code></pre>
<h2>Enterprise Use Cases</h2>
<table><tr><th>Use Case</th><th>Modality</th><th>Model</th><th>Output</th></tr>
<tr><td>Invoice processing</td><td>Image</td><td>GPT-4o Vision</td><td>Structured JSON</td></tr>
<tr><td>Architecture diagram analysis</td><td>Image</td><td>GPT-4o Vision</td><td>Text description</td></tr>
<tr><td>Meeting transcription + summary</td><td>Audio</td><td>Whisper + GPT-4o</td><td>Summary + action items</td></tr>
<tr><td>Document scan OCR + extraction</td><td>Image</td><td>GPT-4o Vision</td><td>Extracted data</td></tr>
<tr><td>Video content analysis</td><td>Video frames</td><td>Gemini 2.0 Pro</td><td>Scene descriptions</td></tr></table>
<h2>Multimodal RAG</h2>
<pre><code><span class="cm"># Index: convert PDF pages to images, embed image descriptions</span>
<span class="kw">import</span> fitz  <span class="cm"># PyMuPDF</span>

<span class="kw">def</span> <span class="fn">pdf_to_multimodal_chunks</span>(pdf_path: <span class="cls">str</span>) -> <span class="cls">list</span>[<span class="cls">dict</span>]:
    doc = fitz.open(pdf_path)
    chunks = []
    <span class="kw">for</span> page_num, page <span class="kw">in</span> enumerate(doc):
        <span class="cm"># Extract text</span>
        text = page.get_text()
        <span class="cm"># Extract and describe images</span>
        img_list = page.get_images()
        <span class="kw">for</span> img <span class="kw">in</span> img_list:
            img_desc = describe_image_with_gpt4o(img)
            text += <span class="str">f"\\n[Image on page {page_num}: {img_desc}]"</span>
        chunks.append({<span class="str">"text"</span>: text, <span class="str">"page"</span>: page_num})
    <span class="kw">return</span> chunks</code></pre>`
},

"docker-k8s-ai": {id:"docker-k8s-ai",title:"Docker & Kubernetes for AI Systems",cat:"MLOps & LLMOps",level:"Advanced",time:"40 min",
content:`<h2>Docker & Kubernetes for AI</h2>
<p>Containerization ensures your AI system runs identically in dev, staging, and prod. Kubernetes adds auto-scaling, health checks, and rolling deployments — essential when your LLM workload spikes unpredictably.</p>
<h2>Optimized AI Service Dockerfile</h2>
<pre><code><span class="cm"># Multi-stage build — slim final image</span>
FROM python:3.11-slim AS builder
WORKDIR /build
COPY requirements.txt .
RUN pip install --user --no-cache-dir -r requirements.txt

FROM python:3.11-slim
WORKDIR /app
COPY --from=builder /root/.local /root/.local
COPY . .

<span class="cm"># Non-root user for security</span>
RUN useradd -m appuser && chown -R appuser:appuser /app
USER appuser

<span class="cm"># GPU-aware: install CUDA base if needed</span>
<span class="cm"># FROM nvidia/cuda:12.0-runtime-ubuntu22.04</span>

ENV PATH=/root/.local/bin:\$PATH
EXPOSE 8000
CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]</code></pre>
<h2>Kubernetes Deployment</h2>
<pre><code>apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rag-service
  template:
    spec:
      containers:
      - name: rag-service
        image: myregistry/rag-service:v1.2.0
        ports: [{containerPort: 8000}]
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-secrets
              key: openai-key
        resources:
          requests: {cpu: "500m", memory: "1Gi"}
          limits:   {cpu: "2000m", memory: "4Gi"}
        livenessProbe:
          httpGet: {path: /health, port: 8000}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet: {path: /ready, port: 8000}
          initialDelaySeconds: 5</code></pre>
<h2>Horizontal Pod Autoscaler</h2>
<pre><code>apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Pods
    pods:
      metric:
        name: requests_per_second
      target:
        type: AverageValue
        averageValue: "50"</code></pre>
<h2>FastAPI Health Endpoints</h2>
<pre><code><span class="kw">from</span> fastapi <span class="kw">import</span> FastAPI
<span class="kw">import</span> asyncio

app = FastAPI()

<span class="dec">@app.get("/health")</span>
<span class="kw">async def</span> <span class="fn">health</span>():  <span class="cm"># Kubernetes liveness probe</span>
    <span class="kw">return</span> {<span class="str">"status"</span>:<span class="str">"ok"</span>}

<span class="dec">@app.get("/ready")</span>
<span class="kw">async def</span> <span class="fn">ready</span>():  <span class="cm"># Readiness — all dependencies up</span>
    checks = <span class="kw">await</span> asyncio.gather(
        ping_vectorstore(), ping_redis(), ping_llm_api(),
        return_exceptions=<span class="kw">True</span>)
    <span class="kw">if</span> any(isinstance(c, Exception) <span class="kw">for</span> c <span class="kw">in</span> checks):
        <span class="kw">raise</span> HTTPException(<span class="num">503</span>, detail=<span class="str">"Dependency unavailable"</span>)
    <span class="kw">return</span> {<span class="str">"status"</span>:<span class="str">"ready"</span>}</code></pre>
<h2>GPU Node Setup for LLM Self-Hosting</h2>
<pre><code><span class="cm"># Taint GPU nodes so only GPU workloads run on them</span>
kubectl taint nodes gpu-node-1 nvidia.com/gpu=true:NoSchedule
kubectl label nodes gpu-node-1 accelerator=nvidia-a100

<span class="cm"># Pod spec for GPU workload (e.g., vLLM or Ollama)</span>
resources:
  limits:
    nvidia.com/gpu: 1  # Request 1 GPU
nodeSelector:
  accelerator: nvidia-a100</code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">K8s AI Production Tips</div><p class="box-text">Always use Secrets for API keys — never ENV in Dockerfile. Set resource limits or one bad request starves other pods. HPA on CPU + custom metrics (RPS). PodDisruptionBudget: minAvailable=1 to prevent zero-downtime deployments from going to zero. Qdrant on StatefulSet with persistent volumes. Use ArgoCD or Flux for GitOps deployments — never kubectl apply in CI.</p></div></div>`

"memory-systems": {id:"memory-systems",title:"Memory Systems for AI Agents",cat:"AI Agents",level:"Advanced",time:"35 min",
content:`<h2>Memory Systems for AI Agents</h2>
<p>Memory enables agents to remember context across conversations, learn from interactions, and personalize responses. Critical for production virtual assistants and copilots.</p>
<h2>4 Types of Agent Memory</h2>
<table><tr><th>Type</th><th>Storage</th><th>Scope</th><th>Best For</th></tr>
<tr><td><strong>Sensory / In-context</strong></td><td>Current prompt window</td><td>Single request</td><td>Immediate context within one exchange</td></tr>
<tr><td><strong>Short-term (Buffer)</strong></td><td>Message list in memory</td><td>Current session</td><td>Multi-turn conversation history</td></tr>
<tr><td><strong>Long-term (Episodic)</strong></td><td>Vector DB (semantic search)</td><td>Persistent, cross-session</td><td>Recall past conversations by topic</td></tr>
<tr><td><strong>Semantic / Entity</strong></td><td>Key-value store (Redis)</td><td>Persistent facts</td><td>User profile, preferences, facts</td></tr></table>
<h2>Implementing Long-Term Memory</h2>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> OpenAI
<span class="kw">import</span> chromadb, json
<span class="kw">from</span> datetime <span class="kw">import</span> datetime

client = OpenAI()
memory_db = chromadb.PersistentClient(<span class="str">"./agent_memory"</span>)
col = memory_db.get_or_create_collection(<span class="str">"episodic_memory"</span>)

<span class="kw">def</span> <span class="fn">save_interaction</span>(user_id: <span class="cls">str</span>, question: <span class="cls">str</span>, answer: <span class="cls">str</span>):
    <span class="cm"># Extract key facts from interaction for memory</span>
    summary = client.chat.completions.create(
        model=<span class="str">"gpt-4o-mini"</span>,
        messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:
            <span class="str">f"Extract 1-3 key facts from this Q&A as a single sentence:\\nQ: {question}\\nA: {answer}"</span>}],
        max_tokens=100
    ).choices[0].message.content
    
    col.add(
        documents=[summary],
        metadatas=[{<span class="str">"user_id"</span>:user_id, <span class="str">"timestamp"</span>:datetime.now().isoformat(),
                    <span class="str">"q"</span>:question[:200]}],
        ids=[<span class="str">f"{user_id}_{datetime.now().timestamp()}"</span>]
    )

<span class="kw">def</span> <span class="fn">recall_memories</span>(user_id: <span class="cls">str</span>, current_query: <span class="cls">str</span>, k: <span class="cls">int</span> = <span class="num">5</span>) -> <span class="cls">str</span>:
    results = col.query(
        query_texts=[current_query],
        n_results=k,
        where={<span class="str">"user_id"</span>: user_id}
    )
    memories = results[<span class="str">"documents"</span>][0] <span class="kw">if</span> results[<span class="str">"documents"</span>] <span class="kw">else</span> []
    <span class="kw">return</span> <span class="str">"\\n"</span>.join([<span class="str">f"- {m}"</span> <span class="kw">for</span> m <span class="kw">in</span> memories])

<span class="kw">def</span> <span class="fn">agent_with_memory</span>(user_id: <span class="cls">str</span>, question: <span class="cls">str</span>) -> <span class="cls">str</span>:
    memories = recall_memories(user_id, question)
    system = <span class="str">f"You are a helpful AI assistant.\\nRelevant memories about this user:\\n{memories}"</span>
    answer = client.chat.completions.create(
        model=<span class="str">"gpt-4o"</span>,
        messages=[{<span class="str">"role"</span>:<span class="str">"system"</span>,<span class="str">"content"</span>:system},
                  {<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:question}]
    ).choices[0].message.content
    save_interaction(user_id, question, answer)
    <span class="kw">return</span> answer</code></pre>
<h2>Mem0 — Managed Memory Layer</h2>
<pre><code>pip install mem0ai

<span class="kw">from</span> mem0 <span class="kw">import</span> Memory

memory = Memory()

<span class="cm"># Store memories automatically</span>
memory.add(<span class="str">"User prefers responses in Hindi. Works at JP Morgan as an AI Architect."</span>, 
           user_id=<span class="str">"vitthal_01"</span>)

<span class="cm"># Retrieve relevant memories</span>
relevant = memory.search(<span class="str">"language preference"</span>, user_id=<span class="str">"vitthal_01"</span>)
print(relevant[0][<span class="str">"memory"</span>])  <span class="cm"># "User prefers responses in Hindi"</span></code></pre>`

];

// flat ordered list for prev/next nav
const TOPIC_ORDER = SIDEBAR.flatMap(s => s.items);

// ─── BADGE HELPERS ───────────────────────────────────────────────
function levelBadge(lv) {
  const map = {Beginner:"lv-b",Intermediate:"lv-i",Advanced:"lv-a",Expert:"lv-e"};
  return lv ? `<span class="lv ${map[lv]||'lv-b'}">${lv}</span>` : '';
}

// ─── RENDER SIDEBAR ──────────────────────────────────────────────
function renderSidebar(filter) {
  const sb = document.getElementById('SB');
  const fl = (filter||'').toLowerCase().trim();
  let html = '<div class="sb-head">AI Architect Tutorial</div>';

  for (const sec of SIDEBAR) {
    const visible = sec.items.filter(id => {
      if (!fl) return true;
      const t = TOPICS[id];
      return t && (t.title.toLowerCase().includes(fl) || (t.cat||'').toLowerCase().includes(fl));
    });
    if (!visible.length) continue;
    html += `<div class="sb-cat">${sec.cat}</div>`;
    for (const id of visible) {
      const t = TOPICS[id]; if (!t) continue;
      const active = id === currentTopic ? ' active' : '';
      const badge = t.level === 'Expert' ? '<span class="sb-pill p-hot">Expert</span>'
                  : t.level === 'Advanced' ? '<span class="sb-pill p-new">Adv</span>' : '';
      html += `<div class="sb-item${active}" onclick="goTopic('${id}')">${t.title}${badge?'&nbsp;'+badge:''}</div>`;
    }
  }
  sb.innerHTML = html;
}

// ─── RENDER TOPIC PAGE ───────────────────────────────────────────
let currentTopic = null;

function goTopic(id) {
  const t = TOPICS[id];
  if (!t) return;
  currentTopic = id;
  renderSidebar(document.getElementById('sInput').value);
  const ca = document.getElementById('CA');
  const idx = TOPIC_ORDER.indexOf(id);
  const prev = idx > 0 ? TOPICS[TOPIC_ORDER[idx-1]] : null;
  const next = idx < TOPIC_ORDER.length-1 ? TOPICS[TOPIC_ORDER[idx+1]] : null;

  const navRow = `<div class="nav-row">
    ${prev ? `<button class="nav-btn" onclick="goTopic('${prev.id}')"><div class="nav-lbl">← Previous</div><div class="nav-title">${prev.title}</div></button>` : '<div></div>'}
    ${next ? `<button class="nav-btn nxt" onclick="goTopic('${next.id}')"><div class="nav-lbl">Next →</div><div class="nav-title">${next.title}</div></button>` : '<div></div>'}
  </div>`;

  ca.innerHTML = `
    <div class="pg-title">${t.title}</div>
    <div class="pg-meta">
      ${levelBadge(t.level)}
      ${t.time ? `<span class="time">⏱ ${t.time}</span>` : ''}
      ${t.cat ? `<span class="time">📁 ${t.cat}</span>` : ''}
    </div>
    <hr class="div">
    ${t.content||'<p>Content coming soon.</p>'}
    ${navRow}
  `;
  document.querySelector('.content').scrollTop = 0;
}

// ─── HOME PAGE ───────────────────────────────────────────────────
function goHome() {
  currentTopic = null;
  renderSidebar('');
  const ca = document.getElementById('CA');
  const sections = SIDEBAR.map(s => {
    const cnt = s.items.length;
    const first = TOPICS[s.items[0]];
    return `<div class="sec-card" onclick="goTopic('${s.items[0]}')">
      <div style="font-size:24px">${catIcon(s.cat)}</div>
      <h3>${s.cat}</h3>
      <div class="sec-count">${cnt} topic${cnt!==1?'s':''}</div>
    </div>`;
  }).join('');

  ca.innerHTML = `
    <div class="hero">
      <h1>AI Solution Architect<br>Complete Tutorial</h1>
      <p>From Python basics to Enterprise AI Architecture. 70+ topics covering everything you need to become an AI Solution Architect in 12 months.</p>
      <div class="hero-btns">
        <button class="hbtn hbtn-p" onclick="goTopic('ai-roadmap')">📍 Start with Roadmap</button>
        <button class="hbtn hbtn-s" onclick="goTopic('rag-architecture')">⚡ Jump to RAG</button>
        <button class="hbtn hbtn-s" onclick="goTopic('ai-agents')">🤖 AI Agents</button>
      </div>
    </div>
    <h2 style="margin-bottom:4px">All Topics</h2>
    <p style="color:#6b7280;font-size:13.5px;margin-bottom:16px">Click any section to begin</p>
    <div class="section-grid">${sections}</div>
    <hr class="div">
    <div class="box note"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Learning Path</div><p class="box-text">Recommended order: Introduction → Python for AI → ML → Deep Learning → Transformers → LLMs → Prompt Engineering → Embeddings → RAG → Agents → Frameworks → Java AI Stack → MLOps → Enterprise Architecture → Interview Prep.</p></div></div>
  `;
  document.querySelector('.content').scrollTop = 0;
}

function catIcon(cat) {
  const m = {
    "Introduction":"🌐","Python for AI":"🐍","Machine Learning":"🤖",
    "Deep Learning":"🧠","LLMs & APIs":"💬","Prompt Engineering":"✏️",
    "Embeddings & Vector DB":"🔍","RAG Systems":"📚","AI Agents":"⚡",
    "Frameworks":"🔧","Java AI Stack":"☕","MLOps & LLMOps":"🔄",
    "Cloud AI":"☁️","Enterprise AI":"🏢","System Design":"🏗️",
    "Advanced Topics":"🚀","Career":"🎓"
  };
  return m[cat]||'📖';
}

// ─── SEARCH ──────────────────────────────────────────────────────
document.getElementById('sInput').addEventListener('input', function() {
  const q = this.value.trim();
  renderSidebar(q);
  if (!q) return;
  // show search results in content if home
  if (!currentTopic) {
    const ca = document.getElementById('CA');
    const matches = Object.values(TOPICS).filter(t =>
      t.id !== 'home' &&
      (t.title.toLowerCase().includes(q.toLowerCase()) ||
       (t.cat||'').toLowerCase().includes(q.toLowerCase()))
    );
    const items = matches.map(t =>
      `<div class="sr-item" onclick="goTopic('${t.id}')">
        <div class="sr-title">${t.title}</div>
        <div class="sr-cat">${t.cat||''} · ${t.level||''} · ${t.time||''}</div>
      </div>`
    ).join('');
    ca.innerHTML = `<h2 style="margin-bottom:14px">Search: "${q}"</h2>
      <p style="color:#6b7280;font-size:13.5px;margin-bottom:12px">${matches.length} topic${matches.length!==1?'s':''} found</p>
      <div class="sr-list">${items||'<p style="color:#94a3b8">No topics match your search.</p>'}</div>`;
  }
});

// ─── INIT ────────────────────────────────────────────────────────
window.onload = function() {

};
