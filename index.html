        <span class="kw">for</span> img <span class="kw">in</span> img_list:
            img_desc = describe_image_with_gpt4o(img)
            text += <span class="str">f"\\n[Image on page {page_num}: {img_desc}]"</span>
        chunks.append({<span class="str">"text"</span>: text, <span class="str">"page"</span>: page_num})
    <span class="kw">return</span> chunks</code></pre>`
},

"docker-k8s-ai": {id:"docker-k8s-ai",title:"Docker & Kubernetes for AI Systems",cat:"MLOps & LLMOps",level:"Advanced",time:"40 min",
content:`<h2>Docker & Kubernetes for AI Systems</h2>
<p>Containerizing and orchestrating AI applications for production deployment. Critical for MLOps and enterprise AI architecture.</p>
<h2>Dockerfile for a RAG API</h2>
<pre><code><span class="cm"># Multi-stage build for Python RAG service</span>
FROM python:3.11-slim <span class="kw">as</span> builder
WORKDIR /app
COPY requirements.txt .
RUN pip install --no-cache-dir -r requirements.txt --target /deps

FROM python:3.11-slim
WORKDIR /app
COPY --from=builder /deps /deps
ENV PYTHONPATH=/deps
COPY src/ .
<span class="cm"># Non-root user for security</span>
RUN adduser --disabled-password --gecos "" appuser && chown -R appuser /app
USER appuser
EXPOSE 8000
CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]</code></pre>
<h2>Docker Compose for Local AI Stack</h2>
<pre><code>version: <span class="str">'3.9'</span>
services:
  rag-api:
    build: .
    ports: [<span class="str">"8000:8000"</span>]
    environment:
      - OPENAI_API_KEY=<span class="str">\${OPENAI_API_KEY}</span>
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
    depends_on: [qdrant, redis]

  qdrant:
    image: qdrant/qdrant:latest
    ports: [<span class="str">"6333:6333"</span>]
    volumes: [<span class="str">"qdrant_data:/qdrant/storage"</span>]

  redis:
    image: redis:7-alpine
    ports: [<span class="str">"6379:6379"</span>]

  langfuse:
    image: langfuse/langfuse:latest
    ports: [<span class="str">"3000:3000"</span>]
    environment:
      - NEXTAUTH_SECRET=your-secret
      - DATABASE_URL=postgresql://...

volumes:
  qdrant_data:</code></pre>
<h2>Kubernetes Deployment</h2>
<pre><code>apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
spec:
  replicas: 3
  selector:
    matchLabels: {app: rag-api}
  template:
    metadata:
      labels: {app: rag-api}
    spec:
      containers:
      - name: rag-api
        image: myregistry/rag-api:v1.2.3
        resources:
          requests: {memory: "256Mi", cpu: "250m"}
          limits:   {memory: "512Mi", cpu: "500m"}
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef: {name: ai-secrets, key: openai-api-key}
        livenessProbe:
          httpGet: {path: /health, port: 8000}
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet: {path: /ready, port: 8000}
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api-svc
spec:
  selector: {app: rag-api}
  ports: [{port: 80, targetPort: 8000}]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target: {type: Utilization, averageUtilization: 70}</code></pre>
<div class="box tip"><div class="box-ico">🏛️</div><div class="box-body"><div class="box-title">AI-Specific K8s Patterns</div><p class="box-text">GPU workloads: use nvidia.com/gpu resource requests for embedding or inference pods. Spot instances: use spot/preemptible nodes for batch embedding jobs (70% cheaper). Separate node pools: LLM inference pods on GPU nodes, API pods on CPU nodes. Secret management: never put API keys in env vars directly — use K8s Secrets + external-secrets-operator (AWS Secrets Manager / Azure Key Vault).</p></div></div>`
},

"memory-systems": {id:"memory-systems",title:"Memory Systems for AI Agents",cat:"AI Agents",level:"Advanced",time:"35 min",
content:`<h2>Memory Systems for AI Agents</h2>
<p>Memory enables agents to remember context across conversations, learn from interactions, and personalize responses. Critical for production virtual assistants and copilots.</p>
<h2>4 Types of Agent Memory</h2>
<table><tr><th>Type</th><th>Storage</th><th>Scope</th><th>Best For</th></tr>
<tr><td><strong>Sensory / In-context</strong></td><td>Current prompt window</td><td>Single request</td><td>Immediate context within one exchange</td></tr>
<tr><td><strong>Short-term (Buffer)</strong></td><td>Message list in memory</td><td>Current session</td><td>Multi-turn conversation history</td></tr>
<tr><td><strong>Long-term (Episodic)</strong></td><td>Vector DB (semantic search)</td><td>Persistent, cross-session</td><td>Recall past conversations by topic</td></tr>
<tr><td><strong>Semantic / Entity</strong></td><td>Key-value store (Redis)</td><td>Persistent facts</td><td>User profile, preferences, facts</td></tr></table>
<h2>Implementing Long-Term Memory</h2>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> OpenAI
<span class="kw">import</span> chromadb, json
<span class="kw">from</span> datetime <span class="kw">import</span> datetime

client = OpenAI()
memory_db = chromadb.PersistentClient(<span class="str">"./agent_memory"</span>)
col = memory_db.get_or_create_collection(<span class="str">"episodic_memory"</span>)

<span class="kw">def</span> <span class="fn">save_interaction</span>(user_id: <span class="cls">str</span>, question: <span class="cls">str</span>, answer: <span class="cls">str</span>):
    <span class="cm"># Extract key facts from interaction for memory</span>
    summary = client.chat.completions.create(
        model=<span class="str">"gpt-4o-mini"</span>,
        messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:
            <span class="str">f"Extract 1-3 key facts from this Q&A as a single sentence:\\nQ: {question}\\nA: {answer}"</span>}],
        max_tokens=100
    ).choices[0].message.content
    
    col.add(
        documents=[summary],
        metadatas=[{<span class="str">"user_id"</span>:user_id, <span class="str">"timestamp"</span>:datetime.now().isoformat(),
                    <span class="str">"q"</span>:question[:200]}],
        ids=[<span class="str">f"{user_id}_{datetime.now().timestamp()}"</span>]
    )

<span class="kw">def</span> <span class="fn">recall_memories</span>(user_id: <span class="cls">str</span>, current_query: <span class="cls">str</span>, k: <span class="cls">int</span> = <span class="num">5</span>) -> <span class="cls">str</span>:
    results = col.query(
        query_texts=[current_query],
        n_results=k,
        where={<span class="str">"user_id"</span>: user_id}
    )
    memories = results[<span class="str">"documents"</span>][0] <span class="kw">if</span> results[<span class="str">"documents"</span>] <span class="kw">else</span> []
    <span class="kw">return</span> <span class="str">"\\n"</span>.join([<span class="str">f"- {m}"</span> <span class="kw">for</span> m <span class="kw">in</span> memories])

<span class="kw">def</span> <span class="fn">agent_with_memory</span>(user_id: <span class="cls">str</span>, question: <span class="cls">str</span>) -> <span class="cls">str</span>:
    memories = recall_memories(user_id, question)
    system = <span class="str">f"You are a helpful AI assistant.\\nRelevant memories about this user:\\n{memories}"</span>
    answer = client.chat.completions.create(
        model=<span class="str">"gpt-4o"</span>,
        messages=[{<span class="str">"role"</span>:<span class="str">"system"</span>,<span class="str">"content"</span>:system},
                  {<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:question}]
    ).choices[0].message.content
    save_interaction(user_id, question, answer)
    <span class="kw">return</span> answer</code></pre>
<h2>Mem0 — Managed Memory Layer</h2>
<pre><code>pip install mem0ai

<span class="kw">from</span> mem0 <span class="kw">import</span> Memory

memory = Memory()

<span class="cm"># Store memories automatically</span>
memory.add(<span class="str">"User prefers responses in Hindi. Works at JP Morgan as an AI Architect."</span>, 
           user_id=<span class="str">"vitthal_01"</span>)

<span class="cm"># Retrieve relevant memories</span>
relevant = memory.search(<span class="str">"language preference"</span>, user_id=<span class="str">"vitthal_01"</span>)
print(relevant[0][<span class="str">"memory"</span>])  <span class="cm"># "User prefers responses in Hindi"</span></code></pre>`

function levelBadge(lv) {

function renderSidebar(filter) {

      const badge = t.level === 'Expert' ? '<span class="sb-pill p-hot">Expert</span>'
                  : t.level === 'Advanced' ? '<span class="sb-pill p-new">Adv</span>' : '';
      html += `<div class="sb-item${active}" onclick="goTopic('${id}')">${t.title}${badge?'&nbsp;'+badge:''}</div>`;
    }
  }
  sb.innerHTML = html;
}

// ─── RENDER TOPIC PAGE ───────────────────────────────────────────
let currentTopic = null;

function goTopic(id) {
  const t = TOPICS[id];
  if (!t) return;
  currentTopic = id;
  renderSidebar(document.getElementById('sInput').value);
  const ca = document.getElementById('CA');
  const idx = TOPIC_ORDER.indexOf(id);
  const prev = idx > 0 ? TOPICS[TOPIC_ORDER[idx-1]] : null;
  const next = idx < TOPIC_ORDER.length-1 ? TOPICS[TOPIC_ORDER[idx+1]] : null;

  const navRow = `<div class="nav-row">
    ${prev ? `<button class="nav-btn" onclick="goTopic('${prev.id}')"><div class="nav-lbl">← Previous</div><div class="nav-title">${prev.title}</div></button>` : '<div></div>'}
    ${next ? `<button class="nav-btn nxt" onclick="goTopic('${next.id}')"><div class="nav-lbl">Next →</div><div class="nav-title">${next.title}</div></button>` : '<div></div>'}
  </div>`;

  ca.innerHTML = `
    <div class="pg-title">${t.title}</div>
    <div class="pg-meta">
      ${levelBadge(t.level)}
      ${t.time ? `<span class="time">⏱ ${t.time}</span>` : ''}
      ${t.cat ? `<span class="time">📁 ${t.cat}</span>` : ''}
    </div>
    <hr class="div">
    ${t.content||'<p>Content coming soon.</p>'}
    ${navRow}
  `;
  document.querySelector('.content').scrollTop = 0;
}

// ─── HOME PAGE ───────────────────────────────────────────────────
function goHome() {
  currentTopic = null;
  renderSidebar('');
  const ca = document.getElementById('CA');
  const sections = SIDEBAR.map(s => {
    const cnt = s.items.length;
    const first = TOPICS[s.items[0]];
    return `<div class="sec-card" onclick="goTopic('${s.items[0]}')">
      <div style="font-size:24px">${catIcon(s.cat)}</div>
      <h3>${s.cat}</h3>
      <div class="sec-count">${cnt} topic${cnt!==1?'s':''}</div>
    </div>`;
  }).join('');

  ca.innerHTML = `
    <div class="hero">
      <h1>AI Solution Architect<br>Complete Tutorial</h1>
      <p>From Python basics to Enterprise AI Architecture. 70+ topics covering everything you need to become an AI Solution Architect in 12 months.</p>
      <div class="hero-btns">
        <button class="hbtn hbtn-p" onclick="goTopic('ai-roadmap')">📍 Start with Roadmap</button>
        <button class="hbtn hbtn-s" onclick="goTopic('rag-architecture')">⚡ Jump to RAG</button>
        <button class="hbtn hbtn-s" onclick="goTopic('ai-agents')">🤖 AI Agents</button>
      </div>
    </div>
    <h2 style="margin-bottom:4px">All Topics</h2>
    <p style="color:#6b7280;font-size:13.5px;margin-bottom:16px">Click any section to begin</p>
    <div class="section-grid">${sections}</div>
    <hr class="div">
    <div class="box note"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Learning Path</div><p class="box-text">Recommended order: Introduction → Python for AI → ML → Deep Learning → Transformers → LLMs → Prompt Engineering → Embeddings → RAG → Agents → Frameworks → Java AI Stack → MLOps → Enterprise Architecture → Interview Prep.</p></div></div>
  `;
  document.querySelector('.content').scrollTop = 0;
}

function catIcon(cat) {
  const m = {
    "Introduction":"🌐","Python for AI":"🐍","Machine Learning":"🤖",
    "Deep Learning":"🧠","LLMs & APIs":"💬","Prompt Engineering":"✏️",
    "Embeddings & Vector DB":"🔍","RAG Systems":"📚","AI Agents":"⚡",
    "Frameworks":"🔧","Java AI Stack":"☕","MLOps & LLMOps":"🔄",
    "Cloud AI":"☁️","Enterprise AI":"🏢","System Design":"🏗️",
    "Advanced Topics":"🚀","Career":"🎓"
  };
  return m[cat]||'📖';
}

// ─── SEARCH ──────────────────────────────────────────────────────
document.getElementById('sInput').addEventListener('input', function() {
  const q = this.value.trim();
  renderSidebar(q);
  if (!q) return;
  // show search results in content if home
  if (!currentTopic) {
    const ca = document.getElementById('CA');
    const matches = Object.values(TOPICS).filter(t =>
      t.id !== 'home' &&
      (t.title.toLowerCase().includes(q.toLowerCase()) ||
       (t.cat||'').toLowerCase().includes(q.toLowerCase()))
    );
    const items = matches.map(t =>
      `<div class="sr-item" onclick="goTopic('${t.id}')">
        <div class="sr-title">${t.title}</div>
        <div class="sr-cat">${t.cat||''} · ${t.level||''} · ${t.time||''}</div>
      </div>`
    ).join('');
    ca.innerHTML = `<h2 style="margin-bottom:14px">Search: "${q}"</h2>
      <p style="color:#6b7280;font-size:13.5px;margin-bottom:12px">${matches.length} topic${matches.length!==1?'s':''} found</p>
      <div class="sr-list">${items||'<p style="color:#94a3b8">No topics match your search.</p>'}</div>`;
  }
});

// ─── INIT ────────────────────────────────────────────────────────
window.onload = function() {
  goHome();
};
</script>
