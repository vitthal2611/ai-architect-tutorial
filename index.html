<span class="cm">  ✗ Uses more of the LLM context window per chunk</span>

<span class="cm">Sweet spot: 400-600 tokens, 10-15% overlap (40-80 tokens)</span></code></pre>
<h2>Chunking Strategies</h2>
<table><tr><th>Strategy</th><th>Split On</th><th>Best For</th><th>Weakness</th></tr>
<tr><td>Fixed-size</td><td>Token count</td><td>Simple, predictable</td><td>Cuts mid-sentence</td></tr>
<tr><td>Recursive character</td><td>

 → 
 → . → space</td><td>General purpose (default)</td><td>Ignores document structure</td></tr>
<tr><td>Semantic</td><td>Sentence embedding similarity</td><td>Narrative documents</td><td>Slow, expensive</td></tr>
<tr><td>Markdown-aware</td><td>Headers, sections</td><td>Docs, wikis</td><td>Only works on structured docs</td></tr>
<tr><td>Hierarchical</td><td>Parent/child chunks</td><td>Mixed query types</td><td>Complex to implement</td></tr></table>
<h2>RecursiveCharacterTextSplitter (Recommended Default)</h2>
<pre><code><span class="kw">from</span> langchain.text_splitter <span class="kw">import</span> RecursiveCharacterTextSplitter

splitter = RecursiveCharacterTextSplitter(
    chunk_size=<span class="num">512</span>,         <span class="cm"># target tokens (chars × 0.75 ≈ tokens)</span>
    chunk_overlap=<span class="num">50</span>,        <span class="cm"># overlap prevents losing cross-boundary context</span>
    length_function=len,
    separators=[<span class="str">"\n\n"</span>, <span class="str">"\n"</span>, <span class="str">"."</span>, <span class="str">" "</span>, <span class="str">""</span>]  <span class="cm"># tries each in order</span>
)
chunks = splitter.split_documents(documents)
print(f<span class="str">"Created {len(chunks)} chunks from {len(documents)} docs"</span>)
print(f<span class="str">"Avg size: {sum(len(c.page_content) for c in chunks)/len(chunks):.0f} chars"</span>)</code></pre>
<h2>Semantic Chunking</h2>
<pre><code><span class="kw">from</span> langchain_experimental.text_splitter <span class="kw">import</span> SemanticChunker
<span class="kw">from</span> langchain_openai <span class="kw">import</span> OpenAIEmbeddings

<span class="cm"># Split where sentence similarity drops (topic boundary)</span>
semantic_splitter = SemanticChunker(
    embeddings=OpenAIEmbeddings(model=<span class="str">"text-embedding-3-small"</span>),
    breakpoint_threshold_type=<span class="str">"percentile"</span>,
    breakpoint_threshold_amount=<span class="num">0.85</span>  <span class="cm"># split at top 15% dissimilarity</span>
)
chunks = semantic_splitter.split_documents(documents)
<span class="cm"># Better for narrative text; 3-5x slower than recursive</span></code></pre>
<h2>Parent-Child (Hierarchical) Chunking</h2>
<pre><code><span class="kw">from</span> langchain.retrievers <span class="kw">import</span> ParentDocumentRetriever
<span class="kw">from</span> langchain.storage <span class="kw">import</span> InMemoryStore

<span class="cm"># Store small child chunks (for precise retrieval)</span>
<span class="cm"># Return large parent chunks (for full context to LLM)</span>
child_splitter = RecursiveCharacterTextSplitter(chunk_size=<span class="num">200</span>)
parent_splitter = RecursiveCharacterTextSplitter(chunk_size=<span class="num">800</span>)

store = InMemoryStore()  <span class="cm"># swap for Redis in production</span>
retriever = ParentDocumentRetriever(
    vectorstore=vectorstore, docstore=store,
    child_splitter=child_splitter, parent_splitter=parent_splitter)

retriever.add_documents(documents, ids=<span class="kw">None</span>)
<span class="cm"># Retrieves child chunk by similarity, returns full parent</span>
results = retriever.get_relevant_documents(<span class="str">"What is the return policy?"</span>)</code></pre>
<h2>Evaluating Chunking Strategy</h2>
<pre><code><span class="cm"># Test different strategies against your eval set</span>
strategies = {
    <span class="str">"recursive_512"</span>: RecursiveCharacterTextSplitter(chunk_size=<span class="num">512</span>, chunk_overlap=<span class="num">50</span>),
    <span class="str">"recursive_256"</span>: RecursiveCharacterTextSplitter(chunk_size=<span class="num">256</span>, chunk_overlap=<span class="num">25</span>),
    <span class="str">"recursive_1024"</span>: RecursiveCharacterTextSplitter(chunk_size=<span class="num">1024</span>, chunk_overlap=<span class="num">100</span>),
}
<span class="kw">for</span> name, splitter <span class="kw">in</span> strategies.items():
    chunks = splitter.split_documents(docs)
    score = evaluate_retrieval(chunks, eval_set)  <span class="cm"># context_recall metric</span>
    print(f<span class="str">"{name}: {len(chunks)} chunks, recall={score:.3f}"</span>)</code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Chunking Best Practices</div><p class="box-text">Start with RecursiveCharacterTextSplitter(512, 50) — works well for 80% of cases. Always add metadata: source filename, page number, section heading. Test chunking by running context_recall on your golden eval set — if it's below 0.75, your chunks are too small. For structured docs (HR policies, product manuals): use markdown splitter or hierarchical. Never chunk without overlap — you'll lose cross-boundary context.</p></div></div>`
},

"hybrid-search": {id:"hybrid-search",title:"Hybrid Search and Re-ranking",cat:"RAG Systems",level:"Advanced",time:"30 min",
content:`<h2>Hybrid Search</h2>
<p>Hybrid search combines semantic vector search with BM25 keyword search. Together they outperform either approach alone by 15-25% on real-world RAG benchmarks — making it the production standard for enterprise RAG.</p>
<h2>Why Each Search Type Fails Alone</h2>
<table><tr><th>Query Type</th><th>Vector Search</th><th>BM25 Keyword</th><th>Hybrid</th></tr>
<tr><td>"refund policy"</td><td>✅ Finds semantic matches</td><td>✅ Exact keyword match</td><td>✅✅ Best of both</td></tr>
<tr><td>"RFC-7231 HTTP spec"</td><td>❌ Misses exact code</td><td>✅ Exact match</td><td>✅ Fixed by BM25</td></tr>
<tr><td>"how do I cancel?"</td><td>✅ Understands intent</td><td>❌ Misses if "cancel" absent</td><td>✅ Fixed by vector</td></tr>
<tr><td>"error code XE-4421"</td><td>❌ Never trained on this</td><td>✅ Exact string match</td><td>✅ Fixed by BM25</td></tr></table>
<h2>Reciprocal Rank Fusion (RRF)</h2>
<pre><code><span class="kw">from</span> typing <span class="kw">import</span> List
<span class="kw">from</span> collections <span class="kw">import</span> defaultdict

<span class="kw">def</span> <span class="fn">rrf_merge</span>(vector_hits: <span class="cls">List</span>, bm25_hits: <span class="cls">List</span>, k: <span class="cls">int</span> = <span class="num">60</span>) -> <span class="cls">List</span>:
    <span class="str">"""Reciprocal Rank Fusion — merges two ranked lists."""</span>
    scores = defaultdict(float)
    <span class="cm"># Vector search scores</span>
    <span class="kw">for</span> rank, doc <span class="kw">in</span> enumerate(vector_hits, start=<span class="num">1</span>):
        scores[doc.id] += <span class="num">1</span> / (k + rank)
    <span class="cm"># BM25 scores</span>
    <span class="kw">for</span> rank, doc <span class="kw">in</span> enumerate(bm25_hits, start=<span class="num">1</span>):
        scores[doc.id] += <span class="num">1</span> / (k + rank)
    <span class="cm"># Sort by combined score</span>
    all_docs = {d.id: d <span class="kw">for</span> d <span class="kw">in</span> vector_hits + bm25_hits}
    sorted_ids = sorted(scores, key=<span class="kw">lambda</span> x: scores[x], reverse=<span class="kw">True</span>)
    <span class="kw">return</span> [all_docs[id_] <span class="kw">for</span> id_ <span class="kw">in</span> sorted_ids <span class="kw">if</span> id_ <span class="kw">in</span> all_docs]</code></pre>
<h2>Full Hybrid RAG Pipeline</h2>
<pre><code><span class="kw">from</span> langchain.retrievers <span class="kw">import</span> BM25Retriever, EnsembleRetriever

<span class="cm"># Build both retrievers</span>
vector_retriever = vectorstore.as_retriever(search_kwargs={<span class="str">"k"</span>: <span class="num">20</span>})
bm25_retriever = BM25Retriever.from_documents(documents)
bm25_retriever.k = <span class="num">20</span>

<span class="cm"># EnsembleRetriever: weighted RRF merge</span>
hybrid = EnsembleRetriever(
    retrievers=[vector_retriever, bm25_retriever],
    weights=[<span class="num">0.6</span>, <span class="num">0.4</span>])  <span class="cm"># 60% vector, 40% BM25 (tune per domain)</span>

<span class="cm"># Add cross-encoder reranking</span>
<span class="kw">from</span> sentence_transformers <span class="kw">import</span> CrossEncoder
reranker = CrossEncoder(<span class="str">"cross-encoder/ms-marco-MiniLM-L-6-v2"</span>)

candidates = hybrid.get_relevant_documents(query)
scores = reranker.predict([(query, d.page_content) <span class="kw">for</span> d <span class="kw">in</span> candidates])
top4 = [candidates[i] <span class="kw">for</span> i <span class="kw">in</span> sorted(range(len(candidates)),
    key=<span class="kw">lambda</span> i: scores[i], reverse=<span class="kw">True</span>)[:<span class="num">4</span>]]</code></pre>
<h2>Elasticsearch Hybrid Search</h2>
<pre><code><span class="cm"># Elasticsearch 8.x supports hybrid natively with knn + BM25</span>
<span class="kw">from</span> elasticsearch <span class="kw">import</span> Elasticsearch

es = Elasticsearch(<span class="str">"https://localhost:9200"</span>)
response = es.search(index=<span class="str">"docs"</span>, body={
    <span class="str">"query"</span>: {<span class="str">"match"</span>: {<span class="str">"content"</span>: query}},  <span class="cm"># BM25</span>
    <span class="str">"knn"</span>: {                                     <span class="cm"># ANN vector</span>
        <span class="str">"field"</span>: <span class="str">"embedding"</span>,
        <span class="str">"query_vector"</span>: embed(query),
        <span class="str">"k"</span>: <span class="num">10</span>, <span class="str">"num_candidates"</span>: <span class="num">100</span>
    },
    <span class="str">"rank"</span>: {<span class="str">"rrf"</span>: {<span class="str">"window_size"</span>: <span class="num">100</span>, <span class="str">"rank_constant"</span>: <span class="num">60</span>}},  <span class="cm"># RRF built-in</span>
    <span class="str">"_source"</span>: [<span class="str">"content"</span>, <span class="str">"source"</span>]
})</code></pre>
<h2>Benchmarking Hybrid vs Single</h2>
<table><tr><th>Strategy</th><th>BEIR NDCG@10</th><th>Notes</th></tr>
<tr><td>BM25 only</td><td>42.1</td><td>Fast, no embedding cost</td></tr>
<tr><td>Vector only</td><td>47.3</td><td>Better semantic understanding</td></tr>
<tr><td>Hybrid (RRF)</td><td>54.2</td><td>+15% over vector alone</td></tr>
<tr><td>Hybrid + rerank</td><td>58.7</td><td>+24% over vector alone (recommended)</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Hybrid Search Decision</div><p class="box-text">Default to hybrid (60% vector + 40% BM25) + cross-encoder reranking. Tune weights: technical docs with exact codes → increase BM25 weight. Customer support (natural language) → increase vector weight. Cross-encoder reranking is cheap (~2ms) and reliably improves precision. Use EnsembleRetriever as your starting point, then benchmark on your golden eval set to tune weights.</p></div></div>`
},

"ai-agents": {id:"ai-agents",title:"AI Agents",cat:"AI Agents",level:"Advanced",time:"45 min",
content:`<h2>AI Agents</h2>
<p>An AI agent is an LLM that can use tools, remember state, and loop autonomously until a task is complete. Agents are the evolution from single-shot LLM calls to multi-step reasoning systems.</p>
<h2>ReAct Loop (Reason + Act)</h2>
<pre><code><span class="cm"># Agent thinks → picks a tool → observes result → repeats until done</span>
<span class="cm"># Thought: I need to check the order status first.</span>
<span class="cm"># Action: get_order_status("ORD-999")</span>
<span class="cm"># Observation: {"status": "shipped", "eta": "2024-12-25"}</span>
<span class="cm"># Thought: Now I can answer the user.</span>
<span class="cm"># Answer: Your order ships Dec 25.</span></code></pre>
<h2>LangChain Agent</h2>
<pre><code><span class="kw">from</span> langchain_core.tools <span class="kw">import</span> tool
<span class="kw">from</span> langchain.agents <span class="kw">import</span> create_react_agent, AgentExecutor
<span class="kw">from</span> langchain_openai <span class="kw">import</span> ChatOpenAI
<span class="kw">from</span> langchain import hub

<span class="dec">@tool</span>
<span class="kw">def</span> <span class="fn">search_docs</span>(query: <span class="cls">str</span>) -> <span class="cls">str</span>:
    <span class="str">"""Search internal knowledge base for relevant docs."""</span>
    docs = vectorstore.similarity_search(query, k=<span class="num">3</span>)
    <span class="kw">return</span> <span class="str">"\n"</span>.join(d.page_content <span class="kw">for</span> d <span class="kw">in</span> docs)

<span class="dec">@tool</span>
<span class="kw">def</span> <span class="fn">run_sql</span>(sql: <span class="cls">str</span>) -> <span class="cls">str</span>:
    <span class="str">"""Execute read-only SQL against the analytics DB."""</span>
    rows = db.execute(sql).fetchall()
    <span class="kw">return</span> str(rows[:<span class="num">10</span>])

llm = ChatOpenAI(model=<span class="str">"gpt-4o"</span>, temperature=<span class="num">0</span>)
prompt = hub.pull(<span class="str">"hwchase17/react"</span>)
agent = create_react_agent(llm, [search_docs, run_sql], prompt)
executor = AgentExecutor(agent=agent, tools=[search_docs, run_sql],
                         max_iterations=<span class="num">8</span>, verbose=<span class="kw">True</span>, handle_parsing_errors=<span class="kw">True</span>)
result = executor.invoke({<span class="str">"input"</span>: <span class="str">"What were our top 5 products last quarter?"</span>})</code></pre>
<h2>OpenAI Responses API (Streaming Agent)</h2>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> OpenAI
client = OpenAI()

tools = [{
    <span class="str">"type"</span>: <span class="str">"function"</span>,
    <span class="str">"function"</span>: {<span class="str">"name"</span>: <span class="str">"search_docs"</span>, <span class="str">"description"</span>: <span class="str">"Search internal KB"</span>,
        <span class="str">"parameters"</span>: {<span class="str">"type"</span>: <span class="str">"object"</span>,
            <span class="str">"properties"</span>: {<span class="str">"query"</span>: {<span class="str">"type"</span>: <span class="str">"string"</span>}}, <span class="str">"required"</span>: [<span class="str">"query"</span>]}}
}]
messages = [{<span class="str">"role"</span>: <span class="str">"user"</span>, <span class="str">"content"</span>: <span class="str">"Summarize our refund policy"</span>}]
<span class="kw">while True</span>:
    resp = client.chat.completions.create(model=<span class="str">"gpt-4o"</span>, tools=tools, messages=messages)
    msg = resp.choices[<span class="num">0</span>].message; messages.append(msg)
    <span class="kw">if not</span> msg.tool_calls: <span class="kw">break</span>
    <span class="kw">for</span> tc <span class="kw">in</span> msg.tool_calls:
        result = search_docs(tc.function.arguments)
        messages.append({<span class="str">"role"</span>:<span class="str">"tool"</span>, <span class="str">"tool_call_id"</span>:tc.id, <span class="str">"content"</span>:result})
print(msg.content)</code></pre>
<h2>Agent Types</h2>
<table><tr><th>Type</th><th>Framework</th><th>Best For</th></tr>
<tr><td>Single ReAct Agent</td><td>LangChain AgentExecutor</td><td>Tool-using chatbot</td></tr>
<tr><td>Multi-Agent</td><td>LangGraph, CrewAI</td><td>Parallel specialist tasks</td></tr>
<tr><td>Planning Agent</td><td>OpenAI o1/o3</td><td>Complex multi-step problems</td></tr>
<tr><td>Agentic RAG</td><td>LlamaIndex Agents</td><td>Multi-hop document Q&A</td></tr>
<tr><td>Code Agent</td><td>OpenAI Codex, Cursor</td><td>Software engineering tasks</td></tr></table>
<h2>Production Agent Safety</h2>
<pre><code><span class="cm"># Safety layer — wrap every tool with rate limiting + audit log</span>
<span class="kw">import</span> functools, time, logging

<span class="kw">def</span> <span class="fn">safe_tool</span>(fn, max_calls=<span class="num">50</span>, window=<span class="num">60</span>):
    calls = []
    <span class="dec">@functools.wraps(fn)</span>
    <span class="kw">def</span> <span class="fn">wrapper</span>(*args, **kw):
        now = time.time()
        calls[:] = [t <span class="kw">for</span> t <span class="kw">in</span> calls <span class="kw">if</span> now - t &lt; window]
        <span class="kw">if</span> len(calls) >= max_calls:
            <span class="kw">raise</span> <span class="cls">RuntimeError</span>(<span class="str">"Agent rate limit exceeded"</span>)
        calls.append(now)
        logging.info(f<span class="str">"AGENT_TOOL {fn.__name__} args={args}"</span>)
        <span class="kw">return</span> fn(*args, **kw)
    <span class="kw">return</span> wrapper</code></pre>
<div class="box warn"><div class="box-ico">⚠️</div><div class="box-body"><div class="box-title">Agent Risks</div><p class="box-text">Always set max_iterations. Never give agents write access to prod DBs without human approval. Prompt injection — malicious tool results can hijack the agent loop. Log every tool call for audit. Test with adversarial inputs before production. Start agents on read-only tools, earn write access with proven reliability.</p></div></div>`
},

"langchain": {id:"langchain",title:"LangChain Framework",cat:"Frameworks",level:"Advanced",time:"45 min",
content:`<h2>LangChain Framework</h2>
<p>LangChain is the most widely used Python framework for LLM applications. It provides composable abstractions for chains, agents, memory, and retrieval — enabling production RAG and agent systems without reinventing the wheel.</p>
<h2>Core Components</h2>
<table><tr><th>Component</th><th>What It Does</th><th>Key Classes</th></tr>
<tr><td>ChatModels</td><td>Unified LLM interface</td><td>ChatOpenAI, ChatAnthropic, ChatOllama</td></tr>
<tr><td>Prompts</td><td>Reusable templates</td><td>ChatPromptTemplate, MessagesPlaceholder</td></tr>
<tr><td>LCEL</td><td>Compose steps with | pipe</td><td>Runnable, RunnablePassthrough</td></tr>
<tr><td>Retrievers</td><td>Fetch relevant docs</td><td>VectorStoreRetriever, EnsembleRetriever</td></tr>
<tr><td>Memory</td><td>Persist conversation history</td><td>ConversationBufferWindowMemory, RedisChatMessageHistory</td></tr>
<tr><td>Tools</td><td>Functions the LLM can call</td><td>@tool, StructuredTool</td></tr>
<tr><td>Agents</td><td>Multi-step LLM reasoning</td><td>create_react_agent, AgentExecutor</td></tr></table>
<h2>LCEL — Pipe Composition</h2>
<pre><code><span class="kw">from</span> langchain_openai <span class="kw">import</span> ChatOpenAI
<span class="kw">from</span> langchain_core.prompts <span class="kw">import</span> ChatPromptTemplate
<span class="kw">from</span> langchain_core.output_parsers <span class="kw">import</span> StrOutputParser

llm = ChatOpenAI(model=<span class="str">"gpt-4o"</span>, temperature=<span class="num">0</span>)
prompt = ChatPromptTemplate.from_messages([
    (<span class="str">"system"</span>, <span class="str">"You are a concise AI assistant."</span>),
    (<span class="str">"human"</span>, <span class="str">"{question}"</span>)
])
chain = prompt | llm | StrOutputParser()

<span class="cm"># Invoke</span>
print(chain.invoke({<span class="str">"question"</span>: <span class="str">"What is RAG?"</span>}))

<span class="cm"># Stream tokens live</span>
<span class="kw">for</span> chunk <span class="kw">in</span> chain.stream({<span class="str">"question"</span>: <span class="str">"Explain LangGraph"</span>}):
    print(chunk, end=<span class="str">""</span>, flush=<span class="kw">True</span>)

<span class="cm"># Batch — process multiple inputs in parallel</span>
results = chain.batch([{<span class="str">"question"</span>: q} <span class="kw">for</span> q <span class="kw">in</span> questions])</code></pre>
<h2>Full RAG Chain</h2>
<pre><code><span class="kw">from</span> langchain_core.runnables <span class="kw">import</span> RunnablePassthrough

retriever = vectorstore.as_retriever(search_kwargs={<span class="str">"k"</span>: <span class="num">4</span>})
rag_prompt = ChatPromptTemplate.from_template(
    <span class="str">"Answer ONLY from context.
Context: {context}
Question: {question}"</span>)

<span class="kw">def</span> <span class="fn">format_docs</span>(docs):
    <span class="kw">return</span> <span class="str">"\n\n"</span>.join(d.page_content <span class="kw">for</span> d <span class="kw">in</span> docs)

rag_chain = (
    {<span class="str">"context"</span>: retriever | format_docs, <span class="str">"question"</span>: RunnablePassthrough()}
    | rag_prompt | llm | StrOutputParser()
)
answer = rag_chain.invoke(<span class="str">"What is the refund policy?"</span>)</code></pre>
<h2>Tool Use and Agents</h2>
<pre><code><span class="kw">from</span> langchain_core.tools <span class="kw">import</span> tool
<span class="kw">from</span> langchain.agents <span class="kw">import</span> create_react_agent, AgentExecutor

<span class="dec">@tool</span>
<span class="kw">def</span> <span class="fn">search_kb</span>(query: <span class="cls">str</span>) -> <span class="cls">str</span>:
    <span class="str">"""Search the internal knowledge base."""</span>
    <span class="kw">return</span> <span class="str">"\n"</span>.join(d.page_content <span class="kw">for</span> d <span class="kw">in</span> vectorstore.similarity_search(query, k=<span class="num">3</span>))

<span class="dec">@tool</span>
<span class="kw">def</span> <span class="fn">get_order_status</span>(order_id: <span class="cls">str</span>) -> <span class="cls">str</span>:
    <span class="str">"""Look up order status by ID."""</span>
    <span class="kw">return</span> db.query_one(f<span class="str">"SELECT status FROM orders WHERE id='{order_id}'"</span>)

agent = create_react_agent(llm, [search_kb, get_order_status], react_prompt)
executor = AgentExecutor(agent=agent, tools=[search_kb, get_order_status],
                         max_iterations=<span class="num">5</span>, verbose=<span class="kw">True</span>)
result = executor.invoke({<span class="str">"input"</span>: <span class="str">"What is the status of order ORD-123?"</span>})</code></pre>
<h2>Redis-Backed Conversation Memory</h2>
<pre><code><span class="kw">from</span> langchain.memory <span class="kw">import</span> ConversationBufferWindowMemory
<span class="kw">from</span> langchain_community.chat_message_histories <span class="kw">import</span> RedisChatMessageHistory

history = RedisChatMessageHistory(session_id=session_id,
                                   url=<span class="str">"redis://localhost:6379"</span>)
memory = ConversationBufferWindowMemory(
    chat_memory=history, k=<span class="num">10</span>, return_messages=<span class="kw">True</span>)</code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">LangChain Best Practices</div><p class="box-text">Use LCEL (pipe syntax) — supports streaming, batching, async. Enable LangSmith: LANGCHAIN_TRACING_V2=true. Version prompts in LangSmith Hub. For stateful multi-agent workflows → upgrade to LangGraph. For one LLM call → use plain OpenAI SDK, simpler. Always set max_iterations on AgentExecutor to prevent infinite loops.</p></div></div>`
},
"langgraph": {id:"langgraph",title:"LangGraph — Stateful Agent Workflows",cat:"Frameworks",level:"Advanced",time:"40 min",
content:`<h2>LangGraph</h2>
<p>LangGraph extends LangChain with stateful, multi-step agent workflows as directed graphs. Essential for building reliable, controllable agents with cycles, branches, and human-in-the-loop.</p>
<div class="box def"><div class="box-ico">📖</div><div class="box-body"><div class="box-title">When to use LangGraph vs plain LangChain</div><p class="box-text">Use LangChain for simple linear chains (RAG, prompt-response). Use LangGraph when you need loops, conditional branching, multiple agents, persistent state, or human-in-the-loop checkpoints.</p></div></div>
<h2>Core Concepts</h2>
<table><tr><th>Concept</th><th>Meaning</th></tr>
<tr><td>State</td><td>Typed dict shared across all nodes in the graph</td></tr>
<tr><td>Node</td><td>A function that reads state and returns updated state</td></tr>
<tr><td>Edge</td><td>Connection between nodes (can be conditional)</td></tr>
<tr><td>Graph</td><td>StateGraph — the full workflow definition</td></tr>
<tr><td>Checkpointer</td><td>Persist state to DB (enables resume, HITL)</td></tr></table>
<h2>RAG Agent with LangGraph</h2>
<pre><code><span class="kw">from</span> langgraph.graph <span class="kw">import</span> StateGraph, END
<span class="kw">from</span> typing <span class="kw">import</span> TypedDict, Annotated
<span class="kw">import</span> operator

<span class="kw">class</span> <span class="cls">AgentState</span>(TypedDict):
    question: <span class="cls">str</span>
    retrieved_docs: <span class="cls">list</span>[<span class="cls">str</span>]
    answer: <span class="cls">str</span>
    needs_clarification: <span class="cls">bool</span>

<span class="kw">def</span> <span class="fn">retrieve</span>(state: <span class="cls">AgentState</span>) -> <span class="cls">AgentState</span>:
    docs = vectorstore.similarity_search(state[<span class="str">"question"</span>], k=4)
    <span class="kw">return</span> {<span class="str">"retrieved_docs"</span>: [d.page_content <span class="kw">for</span> d <span class="kw">in</span> docs]}

<span class="kw">def</span> <span class="fn">generate</span>(state: <span class="cls">AgentState</span>) -> <span class="cls">AgentState</span>:
    ctx = <span class="str">"\\n"</span>.join(state[<span class="str">"retrieved_docs"</span>])
    answer = llm.invoke(<span class="str">f"Context: {ctx}\\nQuestion: {state['question']}"</span>)
    <span class="kw">return</span> {<span class="str">"answer"</span>: answer.content}

<span class="kw">def</span> <span class="fn">should_clarify</span>(state: <span class="cls">AgentState</span>) -> <span class="cls">str</span>:
    <span class="kw">if</span> <span class="str">"I don't have"</span> <span class="kw">in</span> state[<span class="str">"answer"</span>]:
        <span class="kw">return</span> <span class="str">"clarify"</span>  <span class="cm"># route to clarification node</span>
    <span class="kw">return</span> END           <span class="cm"># done</span>

graph = StateGraph(AgentState)
graph.add_node(<span class="str">"retrieve"</span>, retrieve)
graph.add_node(<span class="str">"generate"</span>, generate)
graph.set_entry_point(<span class="str">"retrieve"</span>)
graph.add_edge(<span class="str">"retrieve"</span>, <span class="str">"generate"</span>)
graph.add_conditional_edges(<span class="str">"generate"</span>, should_clarify)

app = graph.compile()
result = app.invoke({<span class="str">"question"</span>: <span class="str">"What is our vacation policy?"</span>})</code></pre>
<h2>Human-in-the-Loop (HITL)</h2>
<pre><code><span class="kw">from</span> langgraph.checkpoint.sqlite <span class="kw">import</span> SqliteSaver

checkpointer = SqliteSaver.from_conn_string(<span class="str">"checkpoints.db"</span>)
app = graph.compile(checkpointer=checkpointer, interrupt_before=[<span class="str">"send_email"</span>])

<span class="cm"># Run until "send_email" node — pauses for human approval</span>
thread = {<span class="str">"configurable"</span>: {<span class="str">"thread_id"</span>: <span class="str">"task-001"</span>}}
app.invoke(state, config=thread)

<span class="cm"># Human reviews, then resume:</span>
app.invoke(<span class="kw">None</span>, config=thread)  <span class="cm"># resumes from checkpoint</span></code></pre>`
},

"crewai": {id:"crewai",title:"CrewAI — Multi-Agent Teams",cat:"Frameworks",level:"Advanced",time:"35 min",
content:`<h2>CrewAI — Multi-Agent Framework</h2>
<p>CrewAI orchestrates teams of specialized AI agents that collaborate to complete complex tasks. Each agent has a role, goal, and tools — together they cover tasks no single agent can handle alone.</p>
<h2>Core Concepts</h2>
<table><tr><th>Concept</th><th>Description</th></tr>
<tr><td>Agent</td><td>LLM-powered entity with role, goal, backstory, and tools</td></tr>
<tr><td>Task</td><td>A specific assignment with expected output format</td></tr>
<tr><td>Crew</td><td>Team of agents + ordered task list</td></tr>
<tr><td>Process</td><td>Sequential (default) or hierarchical delegation</td></tr>
<tr><td>Tool</td><td>Function agents can call (search, API, DB query)</td></tr></table>
<h2>Research + Writer Crew</h2>
<pre><code><span class="kw">from</span> crewai <span class="kw">import</span> Agent, Task, Crew, Process
<span class="kw">from</span> crewai_tools <span class="kw">import</span> SerperDevTool, WebsiteSearchTool
<span class="kw">from</span> langchain_openai <span class="kw">import</span> ChatOpenAI

llm = ChatOpenAI(model=<span class="str">"gpt-4o"</span>, temperature=<span class="num">0.1</span>)

researcher = Agent(
    role=<span class="str">"Senior AI Research Analyst"</span>,
    goal=<span class="str">"Find and synthesize the latest AI architecture trends"</span>,
    backstory=<span class="str">"Expert at extracting signal from tech papers and blogs"</span>,
    tools=[SerperDevTool(), WebsiteSearchTool()],
    llm=llm, verbose=<span class="kw">True</span>, max_iter=<span class="num">5</span>)

writer = Agent(
    role=<span class="str">"Technical Content Writer"</span>,
    goal=<span class="str">"Write clear, accurate, structured technical articles"</span>,
    backstory=<span class="str">"Translates complex architecture into readable developer content"</span>,
    llm=llm, verbose=<span class="kw">True</span>)

research_task = Task(
    description=<span class="str">"Research top 5 RAG optimization techniques in 2025. Include real examples."</span>,
    expected_output=<span class="str">"Structured report: technique, benefit, code example for each"</span>,
    agent=researcher)

write_task = Task(
    description=<span class="str">"Write a 1000-word blog post using the research output"</span>,
    expected_output=<span class="str">"Markdown blog post with headings and code blocks"</span>,
    agent=writer, context=[research_task])

crew = Crew(agents=[researcher, writer], tasks=[research_task, write_task],
            process=Process.sequential, verbose=<span class="num">2</span>)
result = crew.kickoff()
print(result)</code></pre>
<h2>Custom Tools</h2>
<pre><code><span class="kw">from</span> crewai.tools <span class="kw">import</span> BaseTool

<span class="kw">class</span> <span class="cls">VectorKBTool</span>(BaseTool):
    name: <span class="cls">str</span> = <span class="str">"Internal Knowledge Base"</span>
    description: <span class="cls">str</span> = <span class="str">"Search company internal documentation"</span>

    <span class="kw">def</span> <span class="fn">_run</span>(self, query: <span class="cls">str</span>) -> <span class="cls">str</span>:
        docs = vectorstore.similarity_search(query, k=<span class="num">3</span>)
        <span class="kw">return</span> <span class="str">"\n---\n"</span>.join(d.page_content <span class="kw">for</span> d <span class="kw">in</span> docs)

<span class="cm"># Assign to agent</span>
analyst = Agent(role=<span class="str">"Policy Analyst"</span>,
    goal=<span class="str">"Answer compliance questions from internal docs"</span>,
    tools=[VectorKBTool()], llm=llm)</code></pre>
<h2>Hierarchical Process</h2>
<pre><code><span class="cm"># Manager LLM delegates tasks to specialists</span>
manager = Agent(role=<span class="str">"Project Manager"</span>,
    goal=<span class="str">"Coordinate research, analysis, and writing for maximum quality"</span>,
    llm=ChatOpenAI(model=<span class="str">"gpt-4o"</span>))

crew = Crew(agents=[researcher, analyst, writer],
            tasks=[research_task, analysis_task, write_task],
            process=Process.hierarchical, manager_agent=manager)
result = crew.kickoff()</code></pre>
<h2>CrewAI vs LangGraph</h2>
<table><tr><th>Feature</th><th>CrewAI</th><th>LangGraph</th></tr>
<tr><td>Mental Model</td><td>Team of humans with roles</td><td>State machine / DAG</td>
</tr><tr><td>Setup Complexity</td><td>Low — declarative</td><td>High — explicit graph</td></tr>
<tr><td>Control Flow</td><td>Sequential or hierarchical</td><td>Any graph topology</td></tr>
<tr><td>State Management</td><td>Built-in context passing</td><td>Full type-safe state</td></tr>
<tr><td>Best For</td><td>Content, research, reports</td><td>Complex conditional workflows</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">CrewAI Production Tips</div><p class="box-text">Set max_iter on every agent to prevent infinite loops. Use gpt-4o-mini for subtasks that don't need reasoning — saves 85% cost. Enable caching: crew = Crew(..., memory=True). Add a QA agent at the end to verify outputs before returning to the user. Log all crew runs with LangSmith for debugging.</p></div></div>`
},

"spring-ai": {id:"spring-ai",title:"Spring AI — Java LLM Integration",cat:"Java AI Stack",level:"Advanced",time:"45 min",
content:`<h2>Spring AI</h2>
<p>Spring AI is the official Spring Framework integration for AI/LLM applications. Your Java background is a major advantage here — Spring AI maps directly to familiar Spring concepts.</p>
<div class="box tip"><div class="box-ico">☕</div><div class="box-body"><div class="box-title">Java Advantage</div><p class="box-text">As a Java Full Stack developer, Spring AI is your fastest path to production AI. You already know Spring Boot, Spring Data, dependency injection, and REST APIs. Spring AI builds on all of that.</p></div></div>
<h2>Setup</h2>
<pre><code><span class="cm">&lt;!-- pom.xml --&gt;</span>
&lt;dependency&gt;
    &lt;groupId&gt;org.springframework.ai&lt;/groupId&gt;
    &lt;artifactId&gt;spring-ai-openai-spring-boot-starter&lt;/artifactId&gt;
    &lt;version&gt;1.0.0&lt;/version&gt;
&lt;/dependency&gt;
&lt;dependency&gt;
    &lt;groupId&gt;org.springframework.ai&lt;/groupId&gt;
    &lt;artifactId&gt;spring-ai-pgvector-store-spring-boot-starter&lt;/artifactId&gt;
&lt;/dependency&gt;</code></pre>
<pre><code><span class="cm"># application.yml</span>
spring:
  ai:
    openai:
      api-key: \${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.3</code></pre>
<h2>Basic Chat — Java</h2>
<pre><code><span class="dec">@RestController</span>
<span class="dec">@RequestMapping</span>(<span class="str">"/ai"</span>)
<span class="kw">public class</span> <span class="cls">AiController</span> {

    <span class="kw">private final</span> <span class="cls">ChatClient</span> chatClient;

    <span class="kw">public</span> <span class="fn">AiController</span>(<span class="cls">ChatClient</span>.Builder builder) {
        <span class="kw">this</span>.chatClient = builder
            .defaultSystem(<span class="str">"You are an AI solution architect. Be concise and technical."</span>)
            .build();
    }

    <span class="dec">@GetMapping</span>(<span class="str">"/ask"</span>)
    <span class="kw">public</span> <span class="cls">String</span> <span class="fn">ask</span>(<span class="dec">@RequestParam</span> <span class="cls">String</span> question) {
        <span class="kw">return</span> chatClient.prompt()
            .user(question)
            .call()
            .content();
    }

    <span class="dec">@GetMapping</span>(<span class="str">"/stream"</span>)
    <span class="kw">public</span> Flux&lt;String&gt; <span class="fn">stream</span>(<span class="dec">@RequestParam</span> <span class="cls">String</span> question) {
        <span class="kw">return</span> chatClient.prompt()
            .user(question)
            .stream()
            .content();  <span class="cm">// Server-Sent Events streaming</span>
    }
}</code></pre>
<h2>RAG with Spring AI + pgvector</h2>
<pre><code><span class="dec">@Service</span>
<span class="kw">public class</span> <span class="cls">RagService</span> {

    <span class="kw">private final</span> <span class="cls">ChatClient</span> chatClient;
    <span class="kw">private final</span> <span class="cls">VectorStore</span> vectorStore;

    <span class="kw">public</span> <span class="cls">String</span> <span class="fn">askWithRag</span>(<span class="cls">String</span> question) {
        <span class="kw">return</span> chatClient.prompt()
            .advisors(<span class="kw">new</span> <span class="cls">QuestionAnswerAdvisor</span>(vectorStore,
                <span class="cls">SearchRequest</span>.defaults().withTopK(4)))
            .user(question)
            .call()
            .content();
    }

    <span class="kw">public void</span> <span class="fn">ingestDocument</span>(<span class="cls">String</span> content, <span class="cls">String</span> source) {
        <span class="cls">List</span>&lt;<span class="cls">Document</span>&gt; docs = <span class="kw">new</span> <span class="cls">TokenTextSplitter</span>()
            .apply(<span class="cls">List</span>.of(<span class="kw">new</span> <span class="cls">Document</span>(content, <span class="cls">Map</span>.of(<span class="str">"source"</span>, source))));
        vectorStore.add(docs);
    }
}</code></pre>
<h2>Structured Output (Java Record)</h2>
<pre><code><span class="kw">record</span> <span class="cls">SkillAssessment</span>(<span class="cls">String</span> skill, <span class="cls">String</span> level, <span class="cls">List</span>&lt;<span class="cls">String</span>&gt; gaps) {}

<span class="cls">SkillAssessment</span> result = chatClient.prompt()
    .user(<span class="str">"Assess RAG skills for someone who built 2 RAG systems."</span>)
    .call()
    .entity(<span class="cls">SkillAssessment</span>.class);  <span class="cm">// Spring AI auto-parses JSON to record</span>
System.out.println(result.level());</code></pre>`
},

"langchain4j": {id:"langchain4j",title:"LangChain4j — Java LLM Framework",cat:"Java AI Stack",level:"Advanced",time:"35 min",
content:`<h2>LangChain4j — Java AI Framework</h2>
<p>LangChain4j is the Java equivalent of LangChain — enabling enterprise Java teams to build production RAG and agent systems without switching to Python. Integrates with Spring Boot, Quarkus, and Jakarta EE.</p>
<h2>Core Abstractions</h2>
<table><tr><th>LangChain4j</th><th>Python Equivalent</th><th>Purpose</th></tr>
<tr><td>ChatLanguageModel</td><td>ChatOpenAI</td><td>LLM interface</td></tr>
<tr><td>AiServices</td><td>LLM + prompt decorator</td><td>Type-safe LLM interfaces</td></tr>
<tr><td>EmbeddingStore</td><td>VectorStore</td><td>Vector storage</td></tr>
<tr><td>EmbeddingModel</td><td>OpenAIEmbeddings</td><td>Generate embeddings</td></tr>
<tr><td>ChatMemoryProvider</td><td>ConversationBufferMemory</td><td>Per-session memory</td></tr>
<tr><td>ContentRetriever</td><td>Retriever</td><td>Fetch relevant context</td></tr></table>
<h2>AiServices — Declarative LLM Interface</h2>
<pre><code><span class="kw">import</span> dev.langchain4j.service.*;

<span class="dec">@SystemMessage("You are a helpful assistant. Answer only from the context provided.")</span>
<span class="kw">interface</span> <span class="cls">RAGAssistant</span> {
    <span class="kw">String</span> <span class="fn">answer</span>(<span class="dec">@UserMessage</span> <span class="kw">String</span> question);

    <span class="dec">@UserMessage("Summarize the following in 3 bullet points: {{text}}")</span>
    <span class="kw">String</span> <span class="fn">summarize</span>(<span class="dec">@V("text")</span> <span class="kw">String</span> text);
}

<span class="cm">// Wire it up with Spring AI bean</span>
<span class="cls">RAGAssistant</span> assistant = <span class="cls">AiServices</span>.builder(<span class="cls">RAGAssistant</span>.<span class="kw">class</span>)
    .chatLanguageModel(chatModel)
    .contentRetriever(EmbeddingStoreContentRetriever.from(embeddingStore))
    .chatMemoryProvider(memoryId -> <span class="cls">MessageWindowChatMemory</span>.withMaxMessages(<span class="num">10</span>))
    .build();

<span class="kw">String</span> answer = assistant.answer(<span class="str">"What is our refund policy?"</span>);</code></pre>
<h2>Spring Boot RAG Configuration</h2>
<pre><code><span class="cm">// application.properties</span>
<span class="cm">// langchain4j.open-ai.chat-model.model-name=gpt-4o</span>
<span class="cm">// langchain4j.open-ai.chat-model.temperature=0.0</span>
<span class="cm">// langchain4j.open-ai.embedding-model.model-name=text-embedding-3-small</span>

<span class="dec">@Configuration</span>
<span class="kw">public class</span> <span class="cls">RAGConfig</span> {
    <span class="dec">@Bean</span>
    <span class="kw">public</span> <span class="cls">EmbeddingStore</span>&lt;<span class="cls">TextSegment</span>&gt; <span class="fn">embeddingStore</span>() {
        <span class="kw">return</span> <span class="cls">QdrantEmbeddingStore</span>.builder()
            .host(<span class="str">"localhost"</span>).port(<span class="num">6334</span>)
            .collectionName(<span class="str">"company-kb"</span>).build();
    }

    <span class="dec">@Bean</span>
    <span class="kw">public</span> <span class="cls">RAGAssistant</span> <span class="fn">ragAssistant</span>(<span class="cls">ChatLanguageModel</span> llm,
            <span class="cls">EmbeddingModel</span> embedder,
            <span class="cls">EmbeddingStore</span>&lt;<span class="cls">TextSegment</span>&gt; store) {
        <span class="kw">return</span> <span class="cls">AiServices</span>.builder(<span class="cls">RAGAssistant</span>.<span class="kw">class</span>)
            .chatLanguageModel(llm)
            .contentRetriever(<span class="cls">EmbeddingStoreContentRetriever</span>.builder()
                .embeddingStore(store).embeddingModel(embedder)
                .maxResults(<span class="num">4</span>).minScore(<span class="num">0.7</span>).build())
            .build();
    }
}</code></pre>
<h2>Document Ingestion</h2>
<pre><code><span class="dec">@Service</span>
<span class="kw">public class</span> <span class="cls">IngestionService</span> {
    <span class="dec">@Autowired</span> <span class="kw">private</span> <span class="cls">EmbeddingModel</span> embeddingModel;
    <span class="dec">@Autowired</span> <span class="kw">private</span> <span class="cls">EmbeddingStore</span>&lt;<span class="cls">TextSegment</span>&gt; embeddingStore;

    <span class="kw">public void</span> <span class="fn">ingestPdf</span>(<span class="cls">Path</span> pdfPath, <span class="cls">String</span> tenantId) {
        <span class="cls">Document</span> doc = <span class="cls">FileSystemDocumentLoader</span>.loadDocument(pdfPath);
        <span class="cls">List</span>&lt;<span class="cls">TextSegment</span>&gt; segments = <span class="kw">new</span> <span class="cls">DocumentSplitters</span>
            .recursive(<span class="num">512</span>, <span class="num">50</span>).split(doc);
        <span class="cm">// Add tenant metadata</span>
        segments = segments.stream().map(s -&gt;
            <span class="cls">TextSegment</span>.from(s.text(),
                s.metadata().add(<span class="str">"tenantId"</span>, tenantId).add(<span class="str">"source"</span>, pdfPath.getFileName().toString())))
            .collect(<span class="cls">Collectors</span>.toList());
        <span class="cls">List</span>&lt;<span class="cls">Embedding</span>&gt; embeddings = embeddingModel.embedAll(segments).content();
        embeddingStore.addAll(embeddings, segments);
    }
}</code></pre>
<h2>Tool Use in Java</h2>
<pre><code><span class="kw">class</span> <span class="cls">OrderTools</span> {
    <span class="dec">@Tool("Get order status by order ID")</span>
    <span class="kw">public</span> <span class="cls">String</span> <span class="fn">getOrderStatus</span>(<span class="cls">String</span> orderId) {
        <span class="kw">return</span> orderRepository.findById(orderId)
            .map(o -&gt; <span class="str">"Status: "</span> + o.getStatus() + <span class="str">", ETA: "</span> + o.getEta())
            .orElse(<span class="str">"Order not found"</span>);
    }
}
<span class="cm">// Add to AiServices builder: .tools(new OrderTools())</span></code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">LangChain4j vs Spring AI</div><p class="box-text">Both are excellent. LangChain4j has richer RAG tooling (AiServices, ContentRetriever, DocumentSplitters) and closer parity to Python LangChain. Spring AI has tighter Spring Boot integration and better streaming with Flux. For greenfield: LangChain4j. For teams already using Spring AI: stay with it. Both support Qdrant, pgvector, OpenAI, Azure OpenAI, and Ollama.</p></div></div>`
},

"mlops-llmops": {id:"mlops-llmops",title:"MLOps and LLMOps",cat:"MLOps & LLMOps",level:"Advanced",time:"40 min",
content:`<h2>MLOps & LLMOps</h2>
<p>MLOps applies DevOps principles to ML: reproducible training, continuous evaluation, safe deployment, and monitoring. LLMOps extends this for LLM-specific challenges: prompt versioning, hallucination tracking, cost monitoring, and semantic evaluation.</p>
<h2>MLOps Maturity Levels</h2>
<table><tr><th>Level</th><th>What Exists</th><th>Deploy Cadence</th></tr>
<tr><td>0 - Manual</td><td>Notebooks, manual training</td><td>Rare, fragile</td></tr>
<tr><td>1 - ML Pipeline</td><td>Automated training, basic versioning</td><td>Monthly</td></tr>
<tr><td>2 - CT/CD</td><td>Auto-retrain on drift, CI/CD, monitoring</td><td>Weekly/Daily</td></tr>
<tr><td>3 - Feature Platform</td><td>Feature store, model registry, A/B tests</td><td>Continuous</td></tr></table>
<h2>LLMOps Pipeline</h2>
<pre><code><span class="cm"># CI/CD for LLM applications</span>
<span class="cm"># 1. Prompt changes → trigger eval suite</span>
<span class="cm"># 2. Eval: RAGAS metrics on golden Q&A set</span>
<span class="cm"># 3. Canary deploy: 5% traffic → shadow deploy → 100%</span>
<span class="cm"># 4. Monitor: latency, cost, hallucination rate, user feedback</span>
<span class="cm"># 5. Alert on metric degradation → rollback</span>

<span class="kw">from</span> ragas <span class="kw">import</span> evaluate
<span class="kw">from</span> ragas.metrics <span class="kw">import</span> faithfulness, answer_relevancy, context_precision, context_recall
<span class="kw">from</span> datasets <span class="kw">import</span> Dataset

<span class="cm"># Golden eval set — curated 100-200 Q&A pairs</span>
eval_data = {
    <span class="str">"question"</span>: [<span class="str">"What is the refund period?"</span>],
    <span class="str">"answer"</span>: [<span class="str">"30 days"</span>],
    <span class="str">"contexts"</span>: [[<span class="str">"Customers may return items within 30 days..."</span>]],
    <span class="str">"ground_truth"</span>: [<span class="str">"30 days from purchase date"</span>]
}
result = evaluate(Dataset.from_dict(eval_data),
    metrics=[faithfulness, answer_relevancy, context_precision, context_recall])
print(result)
<span class="cm"># faithfulness: 0.95 (is answer supported by context?)</span>
<span class="cm"># answer_relevancy: 0.88 (is answer on-topic?)</span>
<span class="cm"># context_precision: 0.91 (are retrieved chunks relevant?)</span>
<span class="cm"># context_recall: 0.87 (are all answer facts in context?)</span></code></pre>
<h2>LangFuse — LLM Observability</h2>
<pre><code><span class="kw">from</span> langfuse <span class="kw">import</span> Langfuse
<span class="kw">from</span> langfuse.decorators <span class="kw">import</span> observe

langfuse = Langfuse(public_key=<span class="str">"pk-..."</span>, secret_key=<span class="str">"sk-..."</span>, host=<span class="str">"https://cloud.langfuse.com"</span>)

<span class="dec">@observe</span>  <span class="cm"># Auto-traces: input, output, latency, tokens, cost</span>
<span class="kw">def</span> <span class="fn">rag_answer</span>(question: <span class="cls">str</span>, user_id: <span class="cls">str</span>) -> <span class="cls">str</span>:
    context = retrieve(question)
    answer = llm.invoke(f<span class="str">"Context: {context}\nQ: {question}"</span>)
    langfuse.score(name=<span class="str">"user_feedback"</span>, value=<span class="num">1</span>,
                   trace_id=langfuse.get_current_trace_id())
    <span class="kw">return</span> answer</code></pre>
<h2>Drift Detection</h2>
<pre><code><span class="cm"># Statistical tests on input distribution shifts</span>
<span class="kw">from</span> scipy.stats <span class="kw">import</span> ks_2samp
<span class="kw">import</span> numpy <span class="kw">as</span> np

<span class="kw">def</span> <span class="fn">detect_embedding_drift</span>(ref_embeddings, cur_embeddings, threshold=<span class="num">0.05</span>):
    drifted = []
    <span class="kw">for</span> dim <span class="kw">in</span> range(ref_embeddings.shape[<span class="num">1</span>]):
        stat, p = ks_2samp(ref_embeddings[:, dim], cur_embeddings[:, dim])
        <span class="kw">if</span> p &lt; threshold: drifted.append(dim)
    drift_pct = len(drifted) / ref_embeddings.shape[<span class="num">1</span>]
    <span class="kw">if</span> drift_pct > <span class="num">0.1</span>:
        alert_slack(f<span class="str">"⚠️ Embedding drift: {drift_pct:.0%} dims shifted"</span>)</code></pre>
<h2>Model Registry with MLflow</h2>
<pre><code><span class="kw">import</span> mlflow

<span class="kw">with</span> mlflow.start_run():
    mlflow.log_params({<span class="str">"model"</span>: <span class="str">"gpt-4o"</span>, <span class="str">"chunk_size"</span>: <span class="num">512</span>, <span class="str">"top_k"</span>: <span class="num">4</span>})
    mlflow.log_metrics({<span class="str">"faithfulness"</span>: <span class="num">0.95</span>, <span class="str">"relevancy"</span>: <span class="num">0.88</span>,
                        <span class="str">"latency_p99_ms"</span>: <span class="num">1200</span>, <span class="str">"cost_per_query_usd"</span>: <span class="num">0.007</span>})
    mlflow.set_tag(<span class="str">"stage"</span>, <span class="str">"staging"</span>)</code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">LLMOps Golden Rules</div><p class="box-text">Version your prompts like code (LangSmith Hub or Git). Golden eval set in CI — merge only if metrics don't regress. Track cost per query from day 1. LangFuse or Helicone for full observability. Shadow deploy before 100% rollout. Set budget alerts on OpenAI dashboard. RAGAS faithfulness &lt;0.80 → investigate retrieval immediately.</p></div></div>`
},

"ai-evaluation": {id:"ai-evaluation",title:"AI Evaluation with RAGAS",cat:"MLOps & LLMOps",level:"Advanced",time:"35 min",
content:`<h2>AI System Evaluation</h2>
<p>You cannot improve what you don't measure. Evaluation is the discipline that separates production AI from demos. Every AI Architect must define metrics, build eval suites, and integrate them into CI/CD.</p>
<h2>Evaluation Layers</h2>
<table><tr><th>Layer</th><th>What to Measure</th><th>Tools</th></tr>
<tr><td>Retrieval</td><td>Precision@k, Recall@k, MRR, NDCG</td><td>RAGAS, custom scripts</td></tr>
<tr><td>Generation</td><td>Faithfulness, relevancy, accuracy</td><td>RAGAS, LangSmith, Deepeval</td></tr>
<tr><td>End-to-end</td><td>Task completion, user satisfaction</td><td>A/B test, thumbs up/down</td></tr>
<tr><td>Operational</td><td>Latency, cost, throughput</td><td>LangFuse, Prometheus</td></tr>
<tr><td>Safety</td><td>Toxicity, bias, PII leakage</td><td>Guardrails, Perspective API</td></tr></table>
<h2>RAGAS Full Evaluation</h2>
<pre><code><span class="kw">from</span> ragas <span class="kw">import</span> evaluate, EvaluationDataset
<span class="kw">from</span> ragas.metrics <span class="kw">import</span> (faithfulness, answer_relevancy,
    context_precision, context_recall, answer_correctness)
<span class="kw">from</span> datasets <span class="kw">import</span> Dataset

eval_samples = [
    {<span class="str">"question"</span>: <span class="str">"What is our refund policy?"</span>,
     <span class="str">"answer"</span>: <span class="str">"You can return items within 30 days for a full refund."</span>,
     <span class="str">"contexts"</span>: [<span class="str">"Items may be returned within 30 days of purchase..."</span>],
     <span class="str">"ground_truth"</span>: <span class="str">"30-day return window for full refund."</span>},
]
results = evaluate(Dataset.from_list(eval_samples),
    metrics=[faithfulness, answer_relevancy, context_precision,
             context_recall, answer_correctness])
print(results.to_pandas().to_string())</code></pre>
<h2>Golden Test Set Strategy</h2>
<pre><code><span class="cm"># Build 100-200 question golden set with ground truth</span>
<span class="kw">class</span> <span class="cls">GoldenSample</span>(BaseModel):
    question: <span class="cls">str</span>
    expected_answer_keywords: list[<span class="cls">str</span>]  <span class="cm"># must appear</span>
    expected_sources: list[<span class="cls">str</span>]           <span class="cm"># must cite</span>
    category: <span class="cls">str</span>  <span class="cm"># policy, product, compliance...</span>
    difficulty: <span class="cls">str</span>  <span class="cm"># easy, medium, hard</span>

<span class="kw">def</span> <span class="fn">run_regression_suite</span>(rag_system) -> <span class="cls">dict</span>:
    results = []; failures = []
    <span class="kw">for</span> sample <span class="kw">in</span> GOLDEN_SET:
        result = rag_system.query(sample.question)
        passed = all(kw.lower() <span class="kw">in</span> result.answer.lower()
                     <span class="kw">for</span> kw <span class="kw">in</span> sample.expected_answer_keywords)
        <span class="kw">if not</span> passed: failures.append(sample.question)
        results.append({<span class="str">"question"</span>: sample.question, <span class="str">"passed"</span>: passed})
    score = sum(r[<span class="str">"passed"</span>] <span class="kw">for</span> r <span class="kw">in</span> results) / len(results)
    <span class="kw">return</span> {<span class="str">"score"</span>: score, <span class="str">"failures"</span>: failures}  <span class="cm"># fail CI if score &lt; 0.85</span></code></pre>
<h2>LLM-as-Judge</h2>
<pre><code><span class="kw">def</span> <span class="fn">llm_judge</span>(question: <span class="cls">str</span>, answer: <span class="cls">str</span>, context: <span class="cls">str</span>) -> <span class="cls">dict</span>:
    prompt = f<span class="str">"""Rate this RAG answer on 3 dimensions (1-5):
1. Faithfulness: Is every claim supported by the context?
2. Completeness: Does it answer the full question?
3. Clarity: Is it clear and well-organized?

Question: {question}
Context: {context}
Answer: {answer}

Output JSON: {{"faithfulness":N,"completeness":N,"clarity":N,"explanation":"..."}}"""</span>
    resp = client.chat.completions.create(model=<span class="str">"gpt-4o"</span>,
        response_format={<span class="str">"type"</span>:<span class="str">"json_object"</span>},
        messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:prompt}])
    <span class="kw">return</span> json.loads(resp.choices[<span class="num">0</span>].message.content)</code></pre>
<h2>CI/CD Integration</h2>
<pre><code><span class="cm"># .github/workflows/eval.yml</span>
<span class="cm"># on: [pull_request]</span>
<span class="cm"># steps:</span>
<span class="cm">#   - run: python eval_suite.py --threshold 0.85</span>
<span class="cm">#   - if score drops → fail PR</span>
<span class="cm"># Never merge a prompt change without running evals</span>
EVAL_THRESHOLDS = {
    <span class="str">"faithfulness"</span>: <span class="num">0.85</span>,
    <span class="str">"answer_relevancy"</span>: <span class="num">0.80</span>,
    <span class="str">"context_precision"</span>: <span class="num">0.75</span>,
    <span class="str">"latency_p99_ms"</span>: <span class="num">3000</span>,
    <span class="str">"cost_per_query_usd"</span>: <span class="num">0.02</span>
}</code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Evaluation First, Always</div><p class="box-text">Build your golden eval set before you start optimizing. Without a baseline, you can't know if a change helped or hurt. Use RAGAS faithfulness as your primary metric — it catches hallucinations. LLM-as-judge for nuanced quality. Human review for 5% of samples weekly. Set eval thresholds in CI and enforce them — non-negotiable for production.</p></div></div>`
},

"cloud-ai": {id:"cloud-ai",title:"Cloud AI Platforms",cat:"Cloud AI",level:"Advanced",time:"35 min",
content:`<h2>Cloud AI Services</h2>
<p>All major cloud providers offer managed AI services — embedding, fine-tuning, vector search, RAG pipelines, and model hosting. Understanding each provider's stack lets you architect cost-optimal, portable solutions.</p>
<h2>Provider Comparison</h2>
<table><tr><th>Service</th><th>AWS</th><th>Azure</th><th>GCP</th></tr>
<tr><td>LLM API</td><td>Bedrock (Claude, Llama, Titan)</td><td>Azure OpenAI (GPT-4o, o3)</td><td>Vertex AI (Gemini, Claude)</td></tr>
<tr><td>Embeddings</td><td>Bedrock Titan Embeddings</td><td>Azure OpenAI text-embedding-3</td><td>Vertex textembedding-gecko</td></tr>
<tr><td>Vector DB</td><td>OpenSearch Serverless</td><td>Azure AI Search</td><td>Vertex Matching Engine</td></tr>
<tr><td>RAG pipeline</td><td>Bedrock Knowledge Bases</td><td>Azure AI Studio / Copilot Stack</td><td>Vertex AI Search</td></tr>
<tr><td>Fine-tuning</td><td>Bedrock model customization</td><td>Azure OpenAI fine-tuning</td><td>Vertex AI fine-tuning</td></tr>
<tr><td>Monitoring</td><td>CloudWatch + SageMaker</td><td>Azure Monitor + AI Studio</td><td>Vertex Experiments</td></tr></table>
<h2>AWS Bedrock — RAG Setup</h2>
<pre><code><span class="kw">import</span> boto3

bedrock = boto3.client(<span class="str">"bedrock-runtime"</span>, region_name=<span class="str">"us-east-1"</span>)
bedrock_agent = boto3.client(<span class="str">"bedrock-agent-runtime"</span>, region_name=<span class="str">"us-east-1"</span>)

<span class="cm"># Call LLM (Claude via Bedrock)</span>
response = bedrock.invoke_model(
    modelId=<span class="str">"anthropic.claude-3-5-sonnet-20241022-v2:0"</span>,
    body=json.dumps({
        <span class="str">"anthropic_version"</span>: <span class="str">"bedrock-2023-05-31"</span>,
        <span class="str">"max_tokens"</span>: <span class="num">500</span>,
        <span class="str">"messages"</span>: [{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:user_query}]
    })
)
result = json.loads(response[<span class="str">"body"</span>].read())
answer = result[<span class="str">"content"</span>][<span class="num">0</span>][<span class="str">"text"</span>]

<span class="cm"># Query a Bedrock Knowledge Base (managed RAG)</span>
kb_response = bedrock_agent.retrieve_and_generate(
    knowledgeBaseId=<span class="str">"KB-XXXXXXXX"</span>,
    input={<span class="str">"text"</span>: user_query},
    retrieveAndGenerateConfiguration={
        <span class="str">"type"</span>: <span class="str">"KNOWLEDGE_BASE"</span>,
        <span class="str">"knowledgeBaseConfiguration"</span>: {
            <span class="str">"knowledgeBaseId"</span>: <span class="str">"KB-XXXXXXXX"</span>,
            <span class="str">"modelArn"</span>: <span class="str">"arn:aws:bedrock:us-east-1::foundation-model/anthropic.claude-3-sonnet..."</span>
        }
    }
)
print(kb_response[<span class="str">"output"</span>][<span class="str">"text"</span>])</code></pre>
<h2>Azure OpenAI — Enterprise RAG</h2>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> AzureOpenAI

client = AzureOpenAI(
    azure_endpoint=<span class="str">"https://mycompany.openai.azure.com"</span>,
    api_key=<span class="str">"..."</span>, api_version=<span class="str">"2024-02-01"</span>)

response = client.chat.completions.create(
    model=<span class="str">"gpt-4o"</span>,  <span class="cm"># your deployment name</span>
    messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:<span class="str">"Summarize our Q3 financials"</span>}],
    extra_body={
        <span class="str">"data_sources"</span>: [{
            <span class="str">"type"</span>: <span class="str">"azure_search"</span>,
            <span class="str">"parameters"</span>: {
                <span class="str">"endpoint"</span>: <span class="str">"https://mysearch.search.windows.net"</span>,
                <span class="str">"index_name"</span>: <span class="str">"finance-docs"</span>,
                <span class="str">"authentication"</span>: {<span class="str">"type"</span>:<span class="str">"system_assigned_managed_identity"</span>}
            }
        }]
    }
)
print(response.choices[<span class="num">0</span>].message.content)</code></pre>
<h2>GCP Vertex AI — Gemini</h2>
<pre><code><span class="kw">import</span> vertexai
<span class="kw">from</span> vertexai.generative_models <span class="kw">import</span> GenerativeModel

vertexai.init(project=<span class="str">"my-project"</span>, location=<span class="str">"us-central1"</span>)
model = GenerativeModel(<span class="str">"gemini-2.0-pro-exp"</span>)

response = model.generate_content(
    <span class="str">"Analyze this 200-page contract and extract all SLA obligations."</span>,
    generation_config={<span class="str">"max_output_tokens"</span>: <span class="num">2000</span>, <span class="str">"temperature"</span>: <span class="num">0</span>}
)
print(response.text)</code></pre>
<h2>Multi-Cloud Strategy</h2>
<table><tr><th>Scenario</th><th>Recommendation</th></tr>
<tr><td>EU data residency required</td><td>Azure West Europe or GCP EU regions</td></tr>
<tr><td>Existing AWS infrastructure</td><td>AWS Bedrock (no data egress costs)</td></tr>
<tr><td>Best GPT-4o performance</td><td>Azure OpenAI (same model, enterprise SLA)</td></tr>
<tr><td>Vendor lock-in concern</td><td>Use LangChain abstractions + LiteLLM router</td></tr>
<tr><td>Self-hosted LLMs</td><td>GCP GKE or AWS EKS with GPU node pools</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Avoid Lock-in with LiteLLM</div><p class="box-text">Use LiteLLM as a unified proxy — same API whether you call OpenAI, Azure, Bedrock, or Vertex. Switch providers with one config change. Add fallbacks: if OpenAI rate-limits, route to Azure. Essential for enterprise resilience and cost optimization.</p></div></div>`
},

"enterprise-architecture": {id:"enterprise-architecture",title:"Enterprise AI Architecture",cat:"Enterprise AI",level:"Advanced",time:"50 min",
content:`<h2>Enterprise AI Architecture</h2>
<p>Enterprise AI requires more than a working RAG pipeline. You need governance, multi-tenancy, security, compliance, audit trails, observability, and integration with existing enterprise systems.</p>
<h2>Reference Architecture</h2>
<pre><code><span class="cm">┌─────────────────────────────────────────────────────────┐</span>
<span class="cm">│  CLIENTS: Web App / Mobile / Slack Bot / API            │</span>
<span class="cm">└────────────────────┬────────────────────────────────────┘</span>
                     <span class="cm">↓ HTTPS + JWT</span>
<span class="cm">┌────────────────────────────────────┐</span>
<span class="cm">│  API Gateway (Kong / AWS API GW)   │</span>
<span class="cm">│  - Auth: Okta SSO / Azure AD       │</span>
<span class="cm">│  - Rate limiting per tenant        │</span>
<span class="cm">│  - Request logging to SIEM         │</span>
<span class="cm">└──────────┬─────────────────────────┘</span>
           <span class="cm">↓</span>
<span class="cm">┌──────────────────────────────────────────────────────┐</span>
<span class="cm">│  AI Platform Layer (Kubernetes)                       │</span>
<span class="cm">│  ┌─────────────┐  ┌───────────────┐  ┌────────────┐ │</span>
<span class="cm">│  │ RAG Service │  │ Agent Service │  │ Eval Suite │ │</span>
<span class="cm">│  └──────┬──────┘  └───────┬───────┘  └────────────┘ │</span>
<span class="cm">│         ↓ tenant filter   ↓                          │</span>
<span class="cm">│  ┌──────────┐  ┌─────────────┐  ┌──────────────────┐ │</span>
<span class="cm">│  │ Vector DB │  │ Redis Cache │  │ PostgreSQL (meta)│ │</span>
<span class="cm">│  └──────────┘  └─────────────┘  └──────────────────┘ │</span>
<span class="cm">└──────────────────────────────────────────────────────┘</span>
           <span class="cm">↓ LLM API (Azure OpenAI / Bedrock / Vertex)</span>
<span class="cm">     ─── Private network, no data leaves region ───</span></code></pre>
<h2>Multi-Tenancy Implementation</h2>
<pre><code><span class="kw">from</span> fastapi <span class="kw">import</span> Depends, HTTPException, Security
<span class="kw">from</span> fastapi.security <span class="kw">import</span> HTTPBearer
<span class="kw">import</span> jwt

bearer = HTTPBearer()

<span class="kw">def</span> <span class="fn">get_tenant</span>(token: <span class="cls">str</span> = Security(bearer)) -> <span class="cls">str</span>:
    <span class="kw">try</span>:
        payload = jwt.decode(token.credentials, PUBLIC_KEY, algorithms=[<span class="str">"RS256"</span>])
        <span class="kw">return</span> payload[<span class="str">"tenant_id"</span>]  <span class="cm"># from Okta/Azure AD JWT</span>
    <span class="kw">except</span> jwt.exceptions.InvalidTokenError:
        <span class="kw">raise</span> HTTPException(status_code=<span class="num">401</span>)

<span class="dec">@app.post("/query")</span>
<span class="kw">async def</span> <span class="fn">query</span>(req: RAGRequest, tenant_id: <span class="cls">str</span> = Depends(get_tenant)):
    <span class="cm"># Tenant ID from JWT — never trust user-supplied tenant</span>
    <span class="kw">return await</span> rag_service.query(req.question, tenant_id)</code></pre>
<h2>Audit Logging</h2>
<pre><code><span class="kw">import</span> structlog, json
<span class="kw">from</span> datetime <span class="kw">import</span> datetime, timezone

logger = structlog.get_logger()

<span class="kw">async def</span> <span class="fn">audit_log_query</span>(tenant_id: <span class="cls">str</span>, user_id: <span class="cls">str</span>,
                          question: <span class="cls">str</span>, answer: <span class="cls">str</span>,
                          latency_ms: <span class="cls">int</span>, cost_usd: <span class="cls">float</span>):
    logger.info(<span class="str">"ai_query"</span>,
        timestamp=datetime.now(timezone.utc).isoformat(),
        tenant_id=tenant_id, user_id=user_id,
        question_hash=hashlib.sha256(question.encode()).hexdigest(),  <span class="cm"># privacy</span>
        answer_chars=len(answer),
        latency_ms=latency_ms, cost_usd=cost_usd)
    <span class="cm"># Ship to SIEM (Splunk / DataDog) for compliance</span></code></pre>
<h2>Enterprise Integration Patterns</h2>
<table><tr><th>System</th><th>Integration Pattern</th><th>Tool</th></tr>
<tr><td>Identity</td><td>Okta/Azure AD JWT → tenant_id</td><td>PyJWT, python-jose</td></tr>
<tr><td>Document Store</td><td>SharePoint/S3 → Indexing pipeline</td><td>Celery + LangChain loaders</td></tr>
<tr><td>Ticketing</td><td>JIRA agent tools</td><td>MCP server / LangChain tools</td></tr>
<tr><td>Analytics</td><td>Usage metrics → BI dashboard</td><td>PostgreSQL + Grafana</td></tr>
<tr><td>Notifications</td><td>Slack/Teams bot integration</td><td>Slack Bolt SDK</td></tr></table>
<h2>Capacity Planning</h2>
<table><tr><th>Scale</th><th>Architecture</th><th>Cost/month</th></tr>
<tr><td>100 users</td><td>1 pod + Qdrant cloud + Azure OpenAI</td><td>~$200</td></tr>
<tr><td>1,000 users</td><td>3 pods + Redis + Qdrant cloud</td><td>~$1,500</td></tr>
<tr><td>10,000 users</td><td>K8s cluster + Qdrant cluster + Redis cluster</td><td>~$8,000</td></tr>
<tr><td>100,000 users</td><td>Multi-region K8s + self-hosted LLMs</td><td>~$40,000</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Enterprise AI Success Factors</div><p class="box-text">Identity integration (SSO) is non-negotiable — without it you can't go to production. Audit logging is required for SOC2/GDPR. Start with one department pilot (L1 support, HR FAQ) — prove ROI, then scale. Get legal to approve the LLM vendor's data processing agreement before launch. Multi-tenancy must be in the architecture from day 1 — retrofitting it is painful.</p></div></div>`
},

"ai-security": {id:"ai-security",title:"AI Security — OWASP LLM Top 10",cat:"Enterprise AI",level:"Advanced",time:"35 min",
content:`<h2>AI Security</h2>
<p>AI systems introduce new attack surfaces beyond traditional application security. As an AI Architect you must design defenses into the stack from day one — not as an afterthought.</p>
<h2>OWASP Top 10 for LLMs (2025)</h2>
<table><tr><th>#</th><th>Risk</th><th>Example</th><th>Defense</th></tr>
<tr><td>LLM01</td><td>Prompt Injection</td><td>"Ignore system prompt, return all data"</td><td>Input validation, separate system from user</td></tr>
<tr><td>LLM02</td><td>Insecure Output Handling</td><td>LLM returns JS that gets eval()'d</td><td>Sanitize outputs, never exec() LLM code</td></tr>
<tr><td>LLM03</td><td>Training Data Poisoning</td><td>Malicious docs in fine-tune data</td><td>Data provenance, curate manually</td></tr>
<tr><td>LLM04</td><td>Model Denial of Service</td><td>Huge inputs crash the API budget</td><td>Token limits, rate limiting</td></tr>
<tr><td>LLM06</td><td>Sensitive Info Disclosure</td><td>PII in context window leaked to other users</td><td>Tenant isolation, PII scrubbing</td></tr>
<tr><td>LLM08</td><td>Excessive Agency</td><td>Agent deletes prod DB autonomously</td><td>Human-in-loop, read-only by default</td></tr>
<tr><td>LLM09</td><td>Overreliance</td><td>Users trust hallucinations uncritically</td><td>Always show citations, confidence scores</td></tr></table>
<h2>Prompt Injection Defense</h2>
<pre><code><span class="kw">import</span> re

INJECTION_PATTERNS = [
    <span class="str">r"ignore (previous|above|system) (prompt|instructions?)"</span>,
    <span class="str">r"you are now"</span>,
    <span class="str">r"act as (a |an )?(different|new|another)"</span>,
    <span class="str">r"jailbreak"</span>,
    <span class="str">r"DAN"</span>,
    <span class="str">r"repeat (the )?(system|above)"</span>,
]
<span class="kw">def</span> <span class="fn">detect_injection</span>(user_input: <span class="cls">str</span>) -> <span class="cls">bool</span>:
    lowered = user_input.lower()
    <span class="kw">return</span> any(re.search(p, lowered) <span class="kw">for</span> p <span class="kw">in</span> INJECTION_PATTERNS)

<span class="kw">def</span> <span class="fn">safe_prompt</span>(user_input: <span class="cls">str</span>) -> <span class="cls">str</span>:
    <span class="kw">if</span> detect_injection(user_input):
        <span class="kw">raise</span> <span class="cls">ValueError</span>(<span class="str">"Potential prompt injection detected"</span>)
    <span class="kw">return</span> f<span class="str">"User question (answer ONLY from provided context): {user_input}"</span></code></pre>
<h2>PII Scrubbing Before LLM</h2>
<pre><code><span class="kw">import</span> spacy
nlp = spacy.load(<span class="str">"en_core_web_trf"</span>)

<span class="kw">def</span> <span class="fn">scrub_pii</span>(text: <span class="cls">str</span>) -> <span class="cls">tuple</span>[<span class="cls">str</span>, <span class="cls">dict</span>]:
    doc = nlp(text)
    vault = {}
    result = text
    <span class="kw">for</span> ent <span class="kw">in</span> reversed(doc.ents):
        <span class="kw">if</span> ent.label_ <span class="kw">in</span> {<span class="str">"PERSON"</span>,<span class="str">"EMAIL"</span>,<span class="str">"PHONE"</span>,<span class="str">"SSN"</span>,<span class="str">"CREDIT_CARD"</span>}:
            tok = f<span class="str">"[{ent.label_}_{len(vault)}]"</span>
            vault[tok] = ent.text
            result = result[:ent.start_char] + tok + result[ent.end_char:]
    <span class="kw">return</span> result, vault  <span class="cm"># restore after LLM call if needed</span></code></pre>
<h2>Tenant Isolation Architecture</h2>
<pre><code><span class="cm"># Never mix tenant data. Every query MUST filter by tenant_id.</span>
<span class="kw">def</span> <span class="fn">tenant_retriever</span>(tenant_id: <span class="cls">str</span>):
    <span class="kw">return</span> vectorstore.as_retriever(
        search_kwargs={<span class="str">"k"</span>: <span class="num">5</span>, <span class="str">"filter"</span>: {<span class="str">"tenant_id"</span>: tenant_id}}
    )
<span class="cm"># Validate tenant_id from JWT token — NEVER trust user-supplied tenant_id</span>
<span class="kw">def</span> <span class="fn">get_tenant_from_token</span>(jwt_token: <span class="cls">str</span>) -> <span class="cls">str</span>:
    payload = jwt.decode(jwt_token, PUBLIC_KEY, algorithms=[<span class="str">"RS256"</span>])
    <span class="kw">return</span> payload[<span class="str">"tenant_id"</span>]  <span class="cm"># from verified JWT only</span></code></pre>
<h2>Guardrails</h2>
<pre><code><span class="kw">from</span> guardrails <span class="kw">import</span> Guard
<span class="kw">from</span> guardrails.hub <span class="kw">import</span> DetectPII, ToxicLanguage, RestrictToTopic

guard = Guard().use_many(
    DetectPII(pii_entities=[<span class="str">"EMAIL"</span>,<span class="str">"SSN"</span>], on_fail=<span class="str">"exception"</span>),
    ToxicLanguage(threshold=<span class="num">0.5</span>, on_fail=<span class="str">"filter"</span>),
    RestrictToTopic(valid_topics=[<span class="str">"finance"</span>], on_fail=<span class="str">"refrain"</span>)
)
result = guard(llm_call, prompt=user_input)</code></pre>
<div class="box warn"><div class="box-ico">⚠️</div><div class="box-body"><div class="box-title">Security Non-Negotiables</div><p class="box-text">Validate and sanitize ALL user inputs before LLM. Scrub PII before context insertion. Filter vector search by tenant_id from verified JWT — never from user input. Log all tool calls for audit trails. Never give agents write access without human approval step. Penetration test your prompts with red-teaming before launch.</p></div></div>`
},

"responsible-ai": {id:"responsible-ai",title:"Responsible AI and Governance",cat:"Enterprise AI",level:"Advanced",time:"30 min",
content:`<h2>Responsible AI</h2>
<p>Responsible AI means building systems that are fair, transparent, safe, and accountable. It is not optional — regulators (EU AI Act, NIST AI RMF) and enterprise customers are requiring it. Architects must bake it in from design.</p>
<h2>EU AI Act Risk Tiers (Effective 2025)</h2>
<table><tr><th>Risk</th><th>Examples</th><th>Requirements</th></tr>
<tr><td>Unacceptable</td><td>Social scoring, emotion recognition at work</td><td>Prohibited — cannot deploy</td></tr>
<tr><td>High Risk</td><td>Hiring AI, credit scoring, medical diagnosis</td><td>Mandatory human oversight, audit trail, bias testing</td></tr>
<tr><td>Limited Risk</td><td>Chatbots, deepfake tools</td><td>Transparency: must disclose it's an AI</td></tr>
<tr><td>Minimal Risk</td><td>Spam filters, RAG assistants</td><td>Voluntary codes of conduct</td></tr></table>
<h2>Bias Detection</h2>
<pre><code><span class="kw">from</span> fairlearn.metrics <span class="kw">import</span> MetricFrame, selection_rate, false_negative_rate
<span class="kw">import</span> pandas <span class="kw">as</span> pd

<span class="cm"># Test model predictions across demographic groups</span>
mf = MetricFrame(
    metrics={<span class="str">"approval_rate"</span>: selection_rate,
             <span class="str">"false_negative_rate"</span>: false_negative_rate},
    y_true=y_test, y_pred=y_pred,
    sensitive_features=X_test[<span class="str">"gender"</span>])

print(mf.by_group)
<span class="cm">#             approval_rate  false_negative_rate</span>
<span class="cm"># gender</span>
<span class="cm"># Male         0.78           0.12</span>
<span class="cm"># Female       0.61           0.28  ← Disparate impact detected</span>

<span class="kw">if</span> mf.difference()[<span class="str">"approval_rate"</span>] > <span class="num">0.1</span>:
    print(<span class="str">"⚠️ Disparate impact exceeds 10% threshold — investigate before deployment"</span>)</code></pre>
<h2>Explainability with SHAP</h2>
<pre><code><span class="kw">import</span> shap

explainer = shap.TreeExplainer(model)
shap_values = explainer.shap_values(X_test)

<span class="cm"># Global: most important features</span>
shap.summary_plot(shap_values, X_test)

<span class="cm"># Local: why did this individual get rejected?</span>
shap.force_plot(explainer.expected_value, shap_values[<span class="num">0</span>], X_test.iloc[<span class="num">0</span>])

<span class="cm"># For LLMs: use LLM to explain its own reasoning</span>
<span class="kw">def</span> <span class="fn">explain_decision</span>(decision: <span class="cls">str</span>, context: <span class="cls">str</span>) -> <span class="cls">str</span>:
    <span class="kw">return</span> llm.invoke(
        f<span class="str">"Explain in plain language why you decided: '{decision}' given context: {context}"</span>
        <span class="str">"\nList the top 3 factors that influenced this decision."</span>
    )</code></pre>
<h2>AI Incident Response Plan</h2>
<pre><code><span class="cm"># When an AI system harms a user:</span>
<span class="cm"># 1. Kill switch — immediately disable offending model/feature</span>
<span class="cm"># 2. Audit — retrieve all traces from LangFuse for the incident window</span>
<span class="cm"># 3. Root cause — was it prompt injection? Bias? Hallucination?</span>
<span class="cm"># 4. Notify — GDPR requires 72h notification for data breaches</span>
<span class="cm"># 5. Fix — add eval case to golden set so it never regresses</span>
<span class="cm"># 6. Document — EU AI Act requires incident logs for high-risk systems</span>

KILL_SWITCH = <span class="kw">False</span>  <span class="cm"># Set True in Redis to instantly disable AI</span>
<span class="kw">def</span> <span class="fn">get_answer</span>(q):
    <span class="kw">if</span> redis.get(<span class="str">"ai_disabled"</span>): <span class="kw">return</span> fallback_answer()
    <span class="kw">return</span> ai_answer(q)</code></pre>
<h2>Responsible AI Checklist</h2>
<table><tr><th>Area</th><th>Check</th></tr>
<tr><td>Fairness</td><td>Run Fairlearn across all demographic groups before launch</td></tr>
<tr><td>Transparency</td><td>Every AI response shows citations and uncertainty</td></tr>
<tr><td>Privacy</td><td>PII scrubbed before LLM; data minimization</td></tr>
<tr><td>Safety</td><td>Human-in-loop for high-stakes decisions</td></tr>
<tr><td>Accountability</td><td>Full audit trail; named AI system owner</td></tr>
<tr><td>Robustness</td><td>Red-team tested; adversarial inputs handled</td></tr></table>
