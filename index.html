"python-basics": {id:"python-basics",title:"Python for AI (Java Dev Guide)",cat:"Python for AI",level:"Beginner",time:"45 min",
content:`<h2>Python for AI — Java Developer Fast Track</h2>
<p>Python is the #1 language for AI (96% of job postings require it). Key differences from Java below.</p>
<h2>Java vs Python Cheat Sheet</h2>
<table><tr><th>Concept</th><th>Java</th><th>Python</th></tr>
<tr><td>Variable</td><td><span class='ic'>String name = "Raj";</span></td><td><span class='ic'>name = "Raj"</span></td></tr>
<tr><td>List</td><td><span class='ic'>new ArrayList&lt;&gt;()</span></td><td><span class='ic'>[1, 2, 3]</span></td></tr>
<tr><td>Lambda</td><td><span class='ic'>(x) -> x * 2</span></td><td><span class='ic'>lambda x: x * 2</span></td></tr>
<tr><td>String format</td><td><span class='ic'>String.format("%s", name)</span></td><td><span class='ic'>f"{name}"</span></td></tr>
<tr><td>Null check</td><td><span class='ic'>obj != null</span></td><td><span class='ic'>obj is not None</span></td></tr>
<tr><td>Interface</td><td>interface/implements</td><td>Protocol / duck typing</td></tr></table>
<h2>Python Essentials for AI</h2>
<pre><code><span class="cm"># List comprehension (very common in AI code)</span>
chunks = [text[i:i+<span class="num">512</span>] <span class="kw">for</span> i <span class="kw">in</span> range(<span class="num">0</span>, len(text), <span class="num">512</span>)]

<span class="cm"># f-strings</span>
print(<span class="str">f"Processing {len(chunks)} chunks"</span>)

<span class="cm"># Type hints (like Java generics)</span>
<span class="kw">def</span> <span class="fn">embed_text</span>(text: <span class="cls">str</span>, model: <span class="cls">str</span> = <span class="str">"text-embedding-3-small"</span>) -> <span class="cls">list</span>[<span class="cls">float</span>]:
    <span class="kw">return</span> client.embeddings.create(input=text, model=model).data[<span class="num">0</span>].embedding

<span class="cm"># Dataclass (like Java record/POJO)</span>
<span class="kw">from</span> dataclasses <span class="kw">import</span> dataclass

<span class="dec">@dataclass</span>
<span class="kw">class</span> <span class="cls">Document</span>:
    content: <span class="cls">str</span>
    source: <span class="cls">str</span>
    score: <span class="cls">float</span> = <span class="num">0.0</span>

<span class="cm"># Error handling</span>
<span class="kw">try</span>:
    result = call_llm(prompt)
<span class="kw">except</span> <span class="cls">RateLimitError</span> <span class="kw">as</span> e:
    time.sleep(<span class="num">60</span>); result = call_llm(prompt)</code><div class="c-lang">Python</div></pre>
<h2>Key AI Libraries</h2>
<table><tr><th>Library</th><th>Purpose</th></tr>
<tr><td>numpy</td><td>Array math, embeddings arithmetic</td></tr>
<tr><td>pandas</td><td>Data manipulation and preprocessing</td></tr>
<tr><td>scikit-learn</td><td>Classical ML algorithms</td></tr>
<tr><td>torch</td><td>Deep learning (PyTorch)</td></tr>
<tr><td>openai</td><td>OpenAI API client</td></tr>
<tr><td>langchain</td><td>LLM orchestration framework</td></tr>
<tr><td>fastapi</td><td>Build AI REST APIs</td></tr>
<tr><td>pydantic</td><td>Data validation and structured output</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Java Dev Tip</div><p class="box-text">pip = Maven. venv/conda = classpath isolation. Protocols replace interfaces. Python has no access modifiers — use underscore convention (_private). Your Spring Boot REST API knowledge maps directly to FastAPI.</p></div></div>`
},

"numpy-pandas": {id:"numpy-pandas",title:"NumPy & Pandas for AI",cat:"Python for AI",level:"Beginner",time:"35 min",
content:`<h2>NumPy & Pandas for AI</h2>
<p>NumPy handles numerical arrays and matrix math. Pandas handles structured/tabular data. Both are essential for AI data pipelines.</p>
<h2>NumPy — Embedding & Vector Math</h2>
<pre><code><span class="kw">import</span> numpy <span class="kw">as</span> np

<span class="cm"># Embeddings are just numpy arrays</span>
vec1 = np.array([<span class="num">0.1</span>, <span class="num">0.8</span>, <span class="num">0.3</span>, <span class="num">0.5</span>])
vec2 = np.array([<span class="num">0.2</span>, <span class="num">0.7</span>, <span class="num">0.4</span>, <span class="num">0.6</span>])

<span class="cm"># Cosine similarity (basis of semantic search)</span>
cosine_sim = np.dot(vec1, vec2) / (np.linalg.norm(vec1) * np.linalg.norm(vec2))

<span class="cm"># Batch of 1000 embeddings (dim=1536)</span>
embeddings = np.random.randn(<span class="num">1000</span>, <span class="num">1536</span>)
norms = np.linalg.norm(embeddings, axis=<span class="num">1</span>, keepdims=<span class="kw">True</span>)
normalized = embeddings / norms  <span class="cm"># all in one vectorized op</span>

<span class="cm"># Find most similar (without vector DB)</span>
query_vec = np.random.randn(<span class="num">1536</span>)
scores = embeddings @ query_vec / (norms.flatten() * np.linalg.norm(query_vec))
top_idx = np.argsort(scores)[-<span class="num">5</span>:][::-<span class="num">1</span>]  <span class="cm"># top 5</span></code><div class="c-lang">Python</div></pre>
<h2>Pandas — Data Preprocessing</h2>
<pre><code><span class="kw">import</span> pandas <span class="kw">as</span> pd

df = pd.read_csv(<span class="str">"documents.csv"</span>)  <span class="cm"># load dataset</span>

<span class="cm"># Inspect</span>
df.head(); df.info(); df.describe()

<span class="cm"># Clean for AI ingestion</span>
df = df.dropna(subset=[<span class="str">'content'</span>])              <span class="cm"># remove rows with no content</span>
df[<span class="str">'content'</span>] = df[<span class="str">'content'</span>].str.strip()       <span class="cm"># trim whitespace</span>
df = df[df[<span class="str">'content'</span>].str.len() > <span class="num">100</span>]          <span class="cm"># drop short docs</span>
df[<span class="str">'word_count'</span>] = df[<span class="str">'content'</span>].str.split().str.len()

<span class="cm"># Export for vector DB ingestion</span>
records = df[[<span class="str">'id'</span>,<span class="str">'content'</span>,<span class="str">'source'</span>]].to_dict(<span class="str">'records'</span>)</code><div class="c-lang">Python</div></pre>
<div class="box note"><div class="box-ico">💡</div><div class="box-body"><div class="box-title">Used in Real AI Systems</div><p class="box-text">NumPy is used for embedding vector math (cosine similarity, normalization). Pandas is used for loading and preprocessing training datasets, evaluation results, and structured data before vector DB ingestion.</p></div></div>`
},

"ml-intro": {id:"ml-intro",title:"Machine Learning Overview",cat:"Machine Learning",level:"Beginner",time:"25 min",
content:`<h2>Machine Learning Overview</h2>
<p>Machine Learning (ML) is a subset of AI where systems learn from data without being explicitly programmed with rules.</p>
<div class="box def"><div class="box-ico">📖</div><div class="box-body"><div class="box-title">Core Idea</div><p class="box-text">Instead of writing IF/ELSE rules, you feed labeled data (input → output pairs) and let an algorithm find the mapping function automatically.</p></div></div>
<h2>Types of ML</h2>
<table><tr><th>Type</th><th>Input</th><th>Goal</th><th>Examples</th></tr>
<tr><td>Supervised</td><td>Labeled (X, y)</td><td>Predict y from X</td><td>Spam filter, price prediction, fraud detection</td></tr>
<tr><td>Unsupervised</td><td>Unlabeled (X)</td><td>Find structure</td><td>Customer segmentation, anomaly detection</td></tr>
<tr><td>Reinforcement</td><td>Environment+reward</td><td>Maximize reward</td><td>AlphaGo, RLHF for LLMs, robotics</td></tr></table>
<h2>ML Workflow</h2>
<div class="steps">
<div class="step"><div class="snum">1</div><div class="scont"><h4>Data Collection & Cleaning</h4><p>Gather data, handle missing values, remove outliers, encode categories.</p></div></div>
<div class="step"><div class="snum">2</div><div class="scont"><h4>Feature Engineering</h4><p>Select or create features. Critical: garbage in = garbage out.</p></div></div>
<div class="step"><div class="snum">3</div><div class="scont"><h4>Model Training</h4><p>Split train/test (80/20). Fit model on training data.</p></div></div>
<div class="step"><div class="snum">4</div><div class="scont"><h4>Evaluation</h4><p>Measure accuracy, precision, recall, F1 on held-out test set.</p></div></div>
<div class="step"><div class="snum">5</div><div class="scont"><h4>Deploy & Monitor</h4><p>Serve via API. Monitor for data drift. Retrain periodically.</p></div></div>
</div>
<pre><code><span class="kw">from</span> sklearn.ensemble <span class="kw">import</span> RandomForestClassifier
<span class="kw">from</span> sklearn.model_selection <span class="kw">import</span> train_test_split
<span class="kw">from</span> sklearn.metrics <span class="kw">import</span> classification_report

X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=<span class="num">0.2</span>)
model = RandomForestClassifier(n_estimators=<span class="num">100</span>)
model.fit(X_train, y_train)
print(classification_report(y_test, model.predict(X_test)))</code><div class="c-lang">Python</div></pre>
<div class="box tip"><div class="box-ico">🏛️</div><div class="box-body"><div class="box-title">Architect Role</div><p class="box-text">As an AI Architect you rarely train models from scratch. You choose the right model, design the data pipeline, set up monitoring, and integrate ML outputs into enterprise systems.</p></div></div>`
},

"model-evaluation": {id:"model-evaluation",title:"Model Evaluation Metrics",cat:"Machine Learning",level:"Intermediate",time:"30 min",
content:`<h2>Model Evaluation Metrics</h2>
<p>Evaluation is the most underrated skill in AI engineering. A model that "feels good" in demos but has no systematic evaluation will fail in production. This page covers all evaluation metrics an AI Solution Architect must know.</p>
<h2>Classification Metrics</h2>
<table><tr><th>Metric</th><th>Formula</th><th>Use When</th></tr>
<tr><td>Accuracy</td><td>(TP+TN)/(TP+TN+FP+FN)</td><td>Balanced classes</td></tr>
<tr><td>Precision</td><td>TP/(TP+FP)</td><td>False positives costly (spam filter)</td></tr>
<tr><td>Recall</td><td>TP/(TP+FN)</td><td>False negatives costly (cancer detection)</td></tr>
<tr><td>F1 Score</td><td>2*(P*R)/(P+R)</td><td>Imbalanced classes</td></tr>
<tr><td>AUC-ROC</td><td>Area under ROC curve</td><td>Ranking/probability models</td></tr></table>
<h2>RAGAS: LLM/RAG Evaluation</h2>
<pre><code>pip install ragas

<span class="kw">from</span> ragas <span class="kw">import</span> evaluate
<span class="kw">from</span> ragas.metrics <span class="kw">import</span> faithfulness, answer_relevancy, context_precision, context_recall
<span class="kw">from</span> datasets <span class="kw">import</span> Dataset

test_data = {
    <span class="str">"question"</span>: [<span class="str">"What is RAG?"</span>],
    <span class="str">"answer"</span>: [<span class="str">"RAG combines retrieval with generation."</span>],
    <span class="str">"contexts"</span>: [[<span class="str">"RAG stands for Retrieval Augmented Generation..."</span>]],
    <span class="str">"ground_truth"</span>: [<span class="str">"RAG retrieves documents then uses LLM to answer."</span>]
}
result = evaluate(Dataset.from_dict(test_data),
                  metrics=[faithfulness, answer_relevancy, context_precision, context_recall])
print(result)
<span class="cm"># {'faithfulness': 0.92, 'answer_relevancy': 0.87, ...}</span></code></pre>
<h2>Production Thresholds</h2>
<table><tr><th>Metric</th><th>Minimum</th><th>Target</th><th>Alert Below</th></tr>
<tr><td>Faithfulness</td><td>0.80</td><td>&gt;0.90</td><td>0.75</td></tr>
<tr><td>Answer Relevancy</td><td>0.75</td><td>&gt;0.85</td><td>0.70</td></tr>
<tr><td>Context Precision</td><td>0.70</td><td>&gt;0.80</td><td>0.65</td></tr>
<tr><td>Context Recall</td><td>0.70</td><td>&gt;0.80</td><td>0.65</td></tr>
<tr><td>p95 Latency</td><td>&lt;5s</td><td>&lt;2s</td><td>&gt;8s</td></tr></table>
<h2>LLM-as-Judge</h2>
<pre><code><span class="kw">def</span> <span class="fn">llm_judge</span>(question, answer, context):
    prompt = <span class="str">f"""Rate faithfulness 1-5.
Q: {question}
Context: {context}
Answer: {answer}
Reply JSON: {{"score": N, "reason": "..."}}"""</span>
    result = openai_client.chat.completions.create(
        model=<span class="str">"gpt-4o"</span>, temperature=<span class="num">0</span>,
        messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:prompt}]
    )
    <span class="kw">return</span> json.loads(result.choices[<span class="num">0</span>].message.content)</code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Build a Golden Dataset First</div><p class="box-text">Create 50-100 Q&A pairs before deploying. Run RAGAS in CI/CD on every prompt change. Fail the build if faithfulness drops >5%. Treat evaluation as a first-class engineering concern.</p></div></div>`
},

"deep-learning": {id:"deep-learning",title:"Deep Learning & Neural Networks",cat:"Deep Learning",level:"Intermediate",time:"40 min",
content:`<h2>Deep Learning and Neural Networks</h2>
<p>Deep Learning powers all modern AI — from image recognition to LLMs. This page covers the essentials every AI Solution Architect needs, without requiring a PhD in mathematics.</p>
<h2>Neural Network Basics</h2>
<pre><code><span class="kw">import</span> torch, torch.nn <span class="kw">as</span> nn

<span class="kw">class</span> <span class="cls">SimpleNN</span>(nn.Module):
    <span class="kw">def</span> <span class="fn">__init__</span>(self):
        super().__init__()
        self.net = nn.Sequential(
            nn.Linear(<span class="num">784</span>, <span class="num">256</span>),  <span class="cm"># input: 28x28 image</span>
            nn.ReLU(),
            nn.Dropout(<span class="num">0.2</span>),       <span class="cm"># regularization</span>
            nn.Linear(<span class="num">256</span>, <span class="num">128</span>),
            nn.ReLU(),
            nn.Linear(<span class="num">128</span>, <span class="num">10</span>)    <span class="cm"># output: 10 classes</span>
        )
    <span class="kw">def</span> <span class="fn">forward</span>(self, x): <span class="kw">return</span> self.net(x)</code></pre>
<h2>Key Architectures</h2>
<table><tr><th>Architecture</th><th>Key Innovation</th><th>Use Case</th><th>Models</th></tr>
<tr><td>CNN</td><td>Local convolutional filters</td><td>Computer vision</td><td>ResNet, EfficientNet</td></tr>
<tr><td>RNN/LSTM</td><td>Sequential memory</td><td>Time series (legacy)</td><td>LSTM, GRU</td></tr>
<tr><td>Transformer</td><td>Self-attention, parallel</td><td>NLP, LLMs</td><td>BERT, GPT, T5</td></tr>
<tr><td>Diffusion</td><td>Iterative denoising</td><td>Image/audio generation</td><td>Stable Diffusion</td></tr>
<tr><td>GNN</td><td>Graph message passing</td><td>Molecules, graphs</td><td>GCN, GraphSAGE</td></tr></table>
<h2>Training Loop</h2>
<pre><code>optimizer = torch.optim.AdamW(model.parameters(), lr=<span class="num">1e-4</span>, weight_decay=<span class="num">0.01</span>)
criterion = nn.CrossEntropyLoss()

<span class="kw">for</span> epoch <span class="kw">in</span> range(num_epochs):
    <span class="kw">for</span> X_batch, y_batch <span class="kw">in</span> dataloader:
        optimizer.zero_grad()
        loss = criterion(model(X_batch), y_batch)
        loss.backward()                              <span class="cm"># backpropagation</span>
        torch.nn.utils.clip_grad_norm_(model.parameters(), <span class="num">1.0</span>)
        optimizer.step()
    print(f<span class="str">"Epoch {epoch}: loss={loss.item():.4f}"</span>)</code></pre>
<h2>Activation Functions</h2>
<table><tr><th>Activation</th><th>Formula</th><th>Used In</th></tr>
<tr><td>ReLU</td><td>max(0, x)</td><td>Most hidden layers (fast, simple)</td></tr>
<tr><td>GELU</td><td>x·Φ(x)</td><td>BERT, GPT-2/3</td></tr>
<tr><td>SwiGLU</td><td>Swish(xW)·(xV)</td><td>LLaMA, modern LLMs</td></tr>
<tr><td>Sigmoid</td><td>1/(1+e⁻ˣ)</td><td>Binary classification output</td></tr>
<tr><td>Softmax</td><td>eˣⁱ/Σeˣʲ</td><td>Multi-class output, attention</td></tr></table>
<h2>Regularization Techniques</h2>
<table><tr><th>Technique</th><th>How</th><th>When to Use</th></tr>
<tr><td>Dropout</td><td>Randomly zero neurons at train time</td><td>Overfitting, small datasets</td></tr>
<tr><td>Weight Decay (L2)</td><td>Penalize large weights</td><td>Almost always — use AdamW</td></tr>
<tr><td>Batch Norm</td><td>Normalize layer outputs</td><td>CNNs, deep networks</td></tr>
<tr><td>Early Stopping</td><td>Stop when val loss rises</td><td>Always monitor validation loss</td></tr>
<tr><td>Data Augmentation</td><td>Transform training data</td><td>Computer vision, small datasets</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Know What to Delegate</div><p class="box-text">GPU memory ≈ 2x model params in float16 (70B model needs ~140GB VRAM). Know architecture tradeoffs, fine-tuning vs RAG, and when DL adds value. Your job is to choose the right approach and set the team up for success — not to implement backpropagation.</p></div></div>`
},

"transformers": {id:"transformers",title:"Transformer Architecture",cat:"Deep Learning",level:"Intermediate",time:"40 min",
content:`<h2>Transformer Architecture</h2>
<p>Transformers are the architecture behind every major LLM — GPT-4o, Claude, Gemini, LLaMA. Understanding the core concepts is essential for AI Solution Architects making decisions about context windows, latency, and model selection.</p>
<h2>Architecture at a Glance</h2>
<pre><code>Input → Tokenizer → Embeddings + Positional Encoding
                          ↓
              [N Transformer Blocks]
              ┌───────────────────────┐
              │ Multi-Head Attention  │  ← attends to all tokens
              │   (+ residual + norm) │
              │ Feed-Forward Network  │  ← per-token transformation
              │   (+ residual + norm) │
              └───────────────────────┘
                          ↓
              Linear + Softmax → Next Token Probabilities</code></pre>
<h2>Self-Attention: The Core Innovation</h2>
<pre><code><span class="kw">import</span> torch, torch.nn.functional <span class="kw">as</span> F

<span class="kw">def</span> <span class="fn">attention</span>(Q, K, V, mask=<span class="kw">None</span>):
    <span class="str">"""Q=Query, K=Key, V=Value — all learned projections of input."""</span>
    d_k = Q.size(-<span class="num">1</span>)
    scores = torch.matmul(Q, K.transpose(-<span class="num">2</span>, -<span class="num">1</span>)) / d_k**<span class="num">0.5</span>
    <span class="kw">if</span> mask <span class="kw">is not None</span>:
        scores = scores.masked_fill(mask == <span class="num">0</span>, <span class="cls">float</span>(<span class="str">'-inf'</span>))
    weights = F.softmax(scores, dim=-<span class="num">1</span>)
    <span class="kw">return</span> torch.matmul(weights, V)</code></pre>
<div class="box note"><div class="box-ico">💡</div><div class="box-body"><div class="box-title">Why Attention Works</div><p class="box-text">In "The bank by the river", the word "bank" attends to "river" and learns it means geography. Unlike RNNs, ALL tokens attend to ALL others in parallel — enabling massive GPU parallelism and capturing long-range dependencies.</p></div></div>
<h2>Encoder vs Decoder vs Encoder-Decoder</h2>
<table><tr><th>Type</th><th>Models</th><th>Use Case</th><th>Attention</th></tr>
<tr><td>Encoder-only</td><td>BERT, RoBERTa</td><td>Classification, embeddings</td><td>Bidirectional (all tokens)</td></tr>
<tr><td>Decoder-only</td><td>GPT-4, Claude, LLaMA</td><td>Text generation, chat</td><td>Causal (past tokens only)</td></tr>
<tr><td>Encoder-Decoder</td><td>T5, BART</td><td>Translation, summarization</td><td>Cross-attention</td></tr></table>
<h2>Key Parameters for Architects</h2>
<table><tr><th>Parameter</th><th>What It Means</th><th>Practical Impact</th></tr>
<tr><td>Context window</td><td>Max input+output tokens</td><td>GPT-4o:128K, Claude:200K, Gemini:2M</td></tr>
<tr><td>Parameters</td><td>Weight count</td><td>More params = more capability + VRAM</td></tr>
<tr><td>Layers (depth)</td><td>Transformer block count</td><td>More = deeper reasoning</td></tr>
<tr><td>Attention heads</td><td>Parallel subspaces</td><td>More = richer attention patterns</td></tr></table>
<h2>Positional Encoding</h2>
<table><tr><th>Method</th><th>Used In</th><th>Property</th></tr>
<tr><td>Sinusoidal (absolute)</td><td>Original Transformer</td><td>Fixed, no length extrapolation</td></tr>
<tr><td>RoPE (Rotary)</td><td>LLaMA, Mistral, GPT-NeoX</td><td>Relative, supports context extension</td></tr>
<tr><td>ALiBi</td><td>MPT, BLOOM</td><td>Bias-based, good extrapolation</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Architect Takeaways</div><p class="box-text">(1) Context window drives chunk strategy — shorter windows need better retrieval. (2) Output tokens are slower and more expensive than input — keep answers concise. (3) Decoder-only models generate token by token — latency scales with output length. (4) Temperature controls sampling from the final probability distribution.</p></div></div>`
},

"llm-intro": {id:"llm-intro",title:"What are Large Language Models?",cat:"LLMs & APIs",level:"Intermediate",time:"30 min",
content:`<h2>What are Large Language Models?</h2>
<p>LLMs are transformer-based neural networks trained on trillions of tokens to predict the next token. Through this objective they acquire language, reasoning, coding, and knowledge capabilities.</p>
<h2>How LLMs Are Built</h2>
<div class="steps">
<div class="step"><div class="snum">1</div><div class="scont"><h4>Pre-training (~$10M–$100M cost)</h4><p>Train on 10+ trillion tokens from internet, books, code. Learns language, facts, reasoning. Done once by labs (OpenAI, Anthropic, Google, Meta).</p></div></div>
<div class="step"><div class="snum">2</div><div class="scont"><h4>Supervised Fine-Tuning (SFT)</h4><p>Fine-tune on instruction-following examples. Teaches the model to be helpful.</p></div></div>
<div class="step"><div class="snum">3</div><div class="scont"><h4>RLHF (Reinforcement Learning from Human Feedback)</h4><p>Humans rank outputs. Reward model learns preferences. LLM optimized via PPO. Makes model helpful, harmless, honest (HHH).</p></div></div>
</div>
<h2>Major LLM Families (2026)</h2>
<table><tr><th>Provider</th><th>Model</th><th>Context</th><th>Best For</th></tr>
<tr><td>OpenAI</td><td>GPT-4o, o3</td><td>128K</td><td>Coding, reasoning, multimodal</td></tr>
<tr><td>Anthropic</td><td>Claude 3.5 Sonnet, Claude Opus 4</td><td>200K</td><td>Analysis, writing, long docs</td></tr>
<tr><td>Google</td><td>Gemini 2.5 Pro</td><td>2M</td><td>Long context, multimodal</td></tr>
<tr><td>Meta</td><td>LLaMA 3.3 (open)</td><td>128K</td><td>Self-hosted, fine-tuning</td></tr>
<tr><td>Mistral</td><td>Mixtral, Mistral Large</td><td>128K</td><td>EU compliance, open weights</td></tr></table>
<h2>Token Cost Comparison</h2>
<table><tr><th>Model</th><th>Input / 1M tokens</th><th>Output / 1M tokens</th></tr>
<tr><td>GPT-4o</td><td>$2.50</td><td>$10.00</td></tr>
<tr><td>Claude 3.5 Sonnet</td><td>$3.00</td><td>$15.00</td></tr>
<tr><td>Gemini 1.5 Flash</td><td>$0.075</td><td>$0.30</td></tr>
<tr><td>GPT-4o Mini</td><td>$0.15</td><td>$0.60</td></tr></table>
<div class="box tip"><div class="box-ico">💰</div><div class="box-body"><div class="box-title">Cost Architecture Pattern</div><p class="box-text">Route simple queries to cheap models (Flash, Mini, Haiku), complex queries to GPT-4o / Claude Sonnet. An LLM router can cut costs 70–85% with negligible quality loss.</p></div></div>`
},

"openai-api": {id:"openai-api",title:"OpenAI API Integration",cat:"LLMs & APIs",level:"Intermediate",time:"35 min",
content:`<h2>OpenAI API Integration</h2>
<p>OpenAI API provides access to GPT-4o, o3, DALL-E 3. Most widely used LLM API — mentioned in 94% of AI Architect job postings.</p>
<pre><code>pip install openai
export OPENAI_API_KEY=<span class="str">"sk-..."</span></code><div class="c-lang">bash</div></pre>
<h2>Chat Completion</h2>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> OpenAI
client = OpenAI()

response = client.chat.completions.create(
    model=<span class="str">"gpt-4o"</span>,
    messages=[
        {<span class="str">"role"</span>: <span class="str">"system"</span>, <span class="str">"content"</span>: <span class="str">"You are an AI Solution Architect."</span>},
        {<span class="str">"role"</span>: <span class="str">"user"</span>,   <span class="str">"content"</span>: <span class="str">"Explain RAG in 3 points."</span>}
    ],
    temperature=<span class="num">0.3</span>,
    max_tokens=<span class="num">500</span>
)
print(response.choices[<span class="num">0</span>].message.content)</code><div class="c-lang">Python</div></pre>
<h2>Structured Output (JSON)</h2>
<pre><code><span class="kw">from</span> pydantic <span class="kw">import</span> BaseModel

<span class="kw">class</span> <span class="cls">SkillGap</span>(BaseModel):
    skill: <span class="cls">str</span>
    level: <span class="cls">str</span>   <span class="cm"># Beginner / Intermediate / Advanced</span>
    gaps: <span class="cls">list</span>[<span class="cls">str</span>]

response = client.beta.chat.completions.parse(
    model=<span class="str">"gpt-4o"</span>,
    messages=[{<span class="str">"role"</span>: <span class="str">"user"</span>, <span class="str">"content"</span>: <span class="str">"Assess RAG skills for someone who built 2 RAG apps."</span>}],
    response_format=SkillGap,
)
result = response.choices[<span class="num">0</span>].message.parsed
print(result.skill, result.level)</code><div class="c-lang">Python</div></pre>
<h2>Function Calling (Tool Use)</h2>
<pre><code>tools = [{
    <span class="str">"type"</span>: <span class="str">"function"</span>,
    <span class="str">"function"</span>: {
        <span class="str">"name"</span>: <span class="str">"search_documents"</span>,
        <span class="str">"description"</span>: <span class="str">"Search internal knowledge base"</span>,
        <span class="str">"parameters"</span>: {
            <span class="str">"type"</span>: <span class="str">"object"</span>,
            <span class="str">"properties"</span>: {<span class="str">"query"</span>: {<span class="str">"type"</span>: <span class="str">"string"</span>}},
            <span class="str">"required"</span>: [<span class="str">"query"</span>]
        }
    }
}]
response = client.chat.completions.create(
    model=<span class="str">"gpt-4o"</span>,
    messages=[{<span class="str">"role"</span>: <span class="str">"user"</span>, <span class="str">"content"</span>: <span class="str">"What is our refund policy?"</span>}],
    tools=tools, tool_choice=<span class="str">"auto"</span>
)
<span class="cm"># Model will call search_documents with query="refund policy"</span></code><div class="c-lang">Python</div></pre>
<h2>Best Practices</h2>
<ul><li>Never hardcode API keys — use env vars or secrets manager</li>
<li>Use <span class="ic">temperature=0</span> for deterministic extraction/classification tasks</li>
<li>Implement retry with exponential backoff for rate limits</li>
<li>Cache frequent responses in Redis to cut costs</li>
<li>Track token usage with Langfuse or OpenTelemetry</li></ul>`
},
"prompt-engineering": {id:"prompt-engineering",title:"Prompt Engineering",cat:"Prompt Engineering",level:"Intermediate",time:"35 min",
content:`<h2>Prompt Engineering</h2>
<p>Prompt engineering is the practice of designing inputs that reliably produce desired LLM output. It's the fastest quality lever before fine-tuning, RAG changes, or model upgrades.</p>
<h2>Core Principles</h2>
<table><tr><th>Principle</th><th>Bad</th><th>Good</th></tr>
<tr><td>Specificity</td><td>"Explain AI"</td><td>"Explain RAG in 3 bullet points for a Java developer"</td></tr>
<tr><td>Role</td><td>(none)</td><td>"You are a senior AI Architect with 15 years Java experience"</td></tr>
<tr><td>Constraints</td><td>(none)</td><td>"Answer ONLY from context. If unsure, say so."</td></tr>
<tr><td>Format</td><td>(none)</td><td>"Respond as JSON: {confidence: 0-1, answer: string}"</td></tr>
<tr><td>Examples</td><td>Zero-shot only</td><td>2-3 input → output examples (few-shot)</td></tr></table>
<h2>RAG System Prompt Template</h2>
<pre><code>SYSTEM = <span class="str">"""You are an AI assistant for {company}.

RULES:
1. Answer ONLY using the CONTEXT below.
2. If the answer is not in CONTEXT, say "I don't have that information."
3. Never use your training knowledge. Never make up facts.
4. Be concise — max 3 paragraphs.
5. Cite your source: [Source: document_name]

CONTEXT:
{retrieved_chunks}"""</span></code></pre>
<h2>Chain-of-Thought (CoT)</h2>
<pre><code><span class="cm"># Standard: add "think step by step"</span>
prompt = <span class="str">f"""Classify this ticket and explain your reasoning step by step.
Ticket: "My payment was charged twice last Tuesday."
Think: """</span>

<span class="cm"># Few-shot CoT: provide examples with reasoning</span>
prompt_cot = <span class="str">"""Examples:
Ticket: "Can't login" → Reason: login issue → Category: technical
Ticket: "Charged twice" → Reason: billing error → Category: billing

Now classify: "Payment declined" → Reason: """</span></code></pre>
<h2>Structured Output</h2>
<pre><code><span class="kw">from</span> pydantic <span class="kw">import</span> BaseModel
<span class="kw">from</span> openai <span class="kw">import</span> OpenAI

<span class="kw">class</span> <span class="cls">TicketResult</span>(BaseModel):
    category: <span class="cls">str</span>      <span class="cm"># billing | technical | general</span>
    confidence: <span class="cls">float</span>  <span class="cm"># 0.0 - 1.0</span>
    urgency: <span class="cls">str</span>       <span class="cm"># low | medium | high</span>
    summary: <span class="cls">str</span>

client = OpenAI()
result = client.beta.chat.completions.parse(
    model=<span class="str">"gpt-4o"</span>, temperature=<span class="num">0</span>,
    messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:<span class="str">f"Classify: {ticket}"</span>}],
    response_format=TicketResult,
)
print(result.choices[<span class="num">0</span>].message.parsed.category)</code></pre>
<h2>Self-Consistency</h2>
<pre><code><span class="cm"># Run 3x at higher temperature, pick majority answer</span>
answers = [ask_llm(prompt, temperature=<span class="num">0.7</span>) <span class="kw">for</span> _ <span class="kw">in</span> range(<span class="num">3</span>)]
<span class="kw">from</span> collections <span class="kw">import</span> Counter
final = Counter(answers).most_common(<span class="num">1</span>)[<span class="num">0</span>][<span class="num">0</span>]</code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Version Control Your Prompts</div><p class="box-text">Store prompts in git like code. Use Langfuse or PromptLayer to track prompt versions and A/B test performance. A bad prompt is a bug — treat it as one. Temperature=0 for deterministic outputs in production; 0.7+ for creative tasks.</p></div></div>`
},

"embeddings": {id:"embeddings",title:"Embeddings and Semantic Search",cat:"Embeddings & Vector DB",level:"Intermediate",time:"30 min",
content:`<h2>Embeddings and Semantic Search</h2>
<p>Embeddings are dense numerical vectors representing text in high-dimensional space where semantically similar content is geometrically close. They are the foundation of every RAG system, semantic search, and recommendation engine.</p>
<h2>Key Intuition</h2>
<div class="box note"><div class="box-ico">💡</div><div class="box-body"><div class="box-title">How It Works</div><p class="box-text">"cat" and "feline" map to nearby vectors. "cat" and "database" map to distant vectors. Cosine similarity measures semantic relatedness — 1.0 = identical, 0.0 = unrelated. The model learned vector positions from billions of text co-occurrence patterns.</p></div></div>
<h2>Embedding Models</h2>
<table><tr><th>Model</th><th>Dims</th><th>Context</th><th>Cost</th><th>Best For</th></tr>
<tr><td>text-embedding-3-small</td><td>1536</td><td>8191t</td><td>$0.02/1M</td><td>General, cost-sensitive</td></tr>
<tr><td>text-embedding-3-large</td><td>3072</td><td>8191t</td><td>$0.13/1M</td><td>High-precision retrieval</td></tr>
<tr><td>Cohere embed-v3</td><td>1024</td><td>512t</td><td>$0.10/1M</td><td>Multi-lingual, enterprise</td></tr>
<tr><td>BGE-M3 (open)</td><td>1024</td><td>8192t</td><td>Free</td><td>On-premise, multi-lingual</td></tr>
<tr><td>E5-large-v2 (open)</td><td>1024</td><td>512t</td><td>Free</td><td>Self-hosted</td></tr></table>
<h2>Python: Generate and Compare</h2>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> OpenAI
<span class="kw">import</span> numpy <span class="kw">as</span> np

client = OpenAI()

<span class="kw">def</span> <span class="fn">embed</span>(text: <span class="cls">str</span>) -> <span class="cls">list</span>[<span class="cls">float</span>]:
    <span class="kw">return</span> client.embeddings.create(
        input=text, model=<span class="str">"text-embedding-3-small"</span>
    ).data[<span class="num">0</span>].embedding

<span class="kw">def</span> <span class="fn">cosine_sim</span>(a, b) -> <span class="cls">float</span>:
    a, b = np.array(a), np.array(b)
    <span class="kw">return</span> float(np.dot(a,b) / (np.linalg.norm(a) * np.linalg.norm(b)))

v1 = embed(<span class="str">"What is RAG?"</span>)
v2 = embed(<span class="str">"Explain retrieval augmented generation"</span>)
v3 = embed(<span class="str">"How to cook pasta?"</span>)
print(cosine_sim(v1, v2))  <span class="cm"># ~0.92 (similar)</span>
print(cosine_sim(v1, v3))  <span class="cm"># ~0.18 (unrelated)</span></code></pre>
<h2>Batch Embedding (Cost Efficient)</h2>
<pre><code><span class="cm"># Batch all chunks in one API call — much cheaper than one-by-one</span>
texts = [chunk.page_content <span class="kw">for</span> chunk <span class="kw">in</span> chunks]
response = client.embeddings.create(input=texts, model=<span class="str">"text-embedding-3-small"</span>)
embeddings = [item.embedding <span class="kw">for</span> item <span class="kw">in</span> response.data]</code></pre>
<h2>Spring AI (Java)</h2>
<pre><code><span class="dec">@Service</span>
<span class="kw">public class</span> <span class="cls">EmbeddingService</span> {
    <span class="kw">private final</span> <span class="cls">EmbeddingModel</span> embeddingModel;

    <span class="kw">public</span> <span class="cls">float</span>[] <span class="fn">embed</span>(<span class="cls">String</span> text) {
        <span class="kw">return</span> embeddingModel.embed(text);
    }
}
<span class="cm">// spring.ai.openai.embedding.options.model=text-embedding-3-small</span></code></pre>
<h2>Matryoshka Embeddings (Dimension Reduction)</h2>
<pre><code><span class="cm"># text-embedding-3-* support truncation with minimal quality loss</span>
response = client.embeddings.create(
    input=<span class="str">"text to embed"</span>,
    model=<span class="str">"text-embedding-3-small"</span>,
    dimensions=<span class="num">256</span>  <span class="cm"># 1536 → 256: 6x smaller, ~95% quality</span>
)</code></pre>
<div class="box warn"><div class="box-ico">⚠️</div><div class="box-body"><div class="box-title">Never Mix Embedding Models</div><p class="box-text">If you index with model A and query with model B, results are meaningless — they live in different vector spaces. Always store the embedding model name in metadata. If you upgrade models, re-embed ALL documents from scratch.</p></div></div>`
},

"vector-databases": {id:"vector-databases",title:"Vector Databases",cat:"Embeddings & Vector DB",level:"Intermediate",time:"35 min",
content:`<h2>Vector Databases</h2>
<p>Vector DBs store embeddings and enable fast ANN (approximate nearest-neighbor) search. Core infrastructure of every RAG system.</p>
<div class="dia">INDEXING:  Doc --> Embed --> vector(1536-dim) --> VectorDB
QUERY:     Question --> Embed --> VectorDB.search(k=5) --> Top chunks
INDEX:     HNSW (default, fast), IVF (large datasets), PQ (compressed)</div>
<h2>Vector DB Comparison</h2>
<table><tr><th>Database</th><th>Type</th><th>Best For</th></tr>
<tr><td><strong>Pinecone</strong></td><td>Managed cloud</td><td>Production, zero-ops, SLA</td></tr>
<tr><td><strong>Weaviate</strong></td><td>Open source</td><td>Hybrid search, GraphQL API</td></tr>
<tr><td><strong>Qdrant</strong></td><td>Open source (Rust)</td><td>High perf, rich payload filtering</td></tr>
<tr><td><strong>ChromaDB</strong></td><td>Open source</td><td>Local dev, Python-first</td></tr>
<tr><td><strong>pgvector</strong></td><td>Postgres extension</td><td>Already using PostgreSQL</td></tr>
<tr><td><strong>Milvus</strong></td><td>Open source</td><td>Billion-scale vectors</td></tr></table>
<pre><code><span class="cm"># ChromaDB — zero config local dev</span>
<span class="kw">import</span> chromadb
col = chromadb.PersistentClient(<span class="str">"./db"</span>).get_or_create_collection(<span class="str">"kb"</span>)
col.add(documents=[<span class="str">"RAG retrieves docs before generation"</span>],
        metadatas=[{<span class="str">"source"</span>:<span class="str">"arch.pdf"</span>}], ids=[<span class="str">"d1"</span>])
results = col.query(query_texts=[<span class="str">"How does RAG work?"</span>], n_results=3)</code></pre>
<pre><code><span class="cm">-- pgvector: if you are already on PostgreSQL</span>
CREATE EXTENSION IF NOT EXISTS vector;
CREATE TABLE docs (id SERIAL, content TEXT, embedding vector(1536));
CREATE INDEX ON docs USING hnsw (embedding vector_cosine_ops);
SELECT content, 1-(embedding&lt;=&gt;$1::vector) AS score
FROM docs ORDER BY embedding&lt;=&gt;$1::vector LIMIT 5;</code></pre>
<div class="box tip"><div class="box-ico">🏛️</div><div class="box-body"><div class="box-title">Arch Choice Guide</div><p class="box-text">Dev: ChromaDB. On Postgres: pgvector. Enterprise cloud: Pinecone. On-premise: Qdrant/Weaviate. Billion+ vectors: Milvus.</p></div></div>`
},

"rag-architecture": {id:"rag-architecture",title:"RAG System Architecture",cat:"RAG Systems",level:"Advanced",time:"50 min",
content:`<h2>RAG System Architecture</h2>
<p>Retrieval-Augmented Generation (RAG) grounds LLM answers in your own data, eliminating hallucination. The #1 enterprise GenAI pattern — 91% of AI Architect job postings.</p>
<div class="box def"><div class="box-ico">📖</div><div class="box-body"><div class="box-title">Why RAG?</div><p class="box-text">LLMs hallucinate and have a knowledge cutoff. RAG solves both: retrieve current, relevant facts from your knowledge base, then provide them as context so the LLM generates a grounded answer.</p></div></div>
<h2>Architecture Diagram</h2>
<div class="dia">OFFLINE (run once or on doc update):
  Documents
    --> [Extractor] (PDF/DOCX/HTML parser)
    --> [Chunker] (512 tokens, 10% overlap)
    --> [Embedding Model] (text-embedding-3-small)
    --> [Vector DB] (store vector + text + metadata)

ONLINE (every user query):
  User Question
    --> [Embed] --> query_vector
    --> [VectorDB.search(k=5)] --> top_chunks
    --> [Prompt]: system(context) + user(question)
    --> [LLM, temp=0] --> Grounded Answer</div>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> OpenAI
<span class="kw">import</span> chromadb

client = OpenAI()
col = chromadb.PersistentClient(<span class="str">"./db"</span>).get_or_create_collection(<span class="str">"docs"</span>)

<span class="kw">def</span> <span class="fn">ask</span>(question: <span class="cls">str</span>) -> <span class="cls">str</span>:
    res  = col.query(query_texts=[question], n_results=4)
    ctx  = <span class="str">"\\n\\n"</span>.join(res[<span class="str">"documents"</span>][0])
    msgs = [
        {<span class="str">"role"</span>:<span class="str">"system"</span>,<span class="str">"content"</span>:<span class="str">f"Answer ONLY from:\\n{ctx}"</span>},
        {<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:question}
    ]
    <span class="kw">return</span> client.chat.completions.create(
        model=<span class="str">"gpt-4o"</span>, messages=msgs, temperature=0
    ).choices[0].message.content</code></pre>
<h2>Common Failure Modes</h2>
<table><tr><th>Problem</th><th>Root Cause</th><th>Fix</th></tr>
<tr><td>Hallucination persists</td><td>LLM ignores context</td><td>Stronger system prompt constraint, temperature=0</td></tr>
<tr><td>Wrong chunks retrieved</td><td>Poor chunking</td><td>Tune chunk size; use hybrid search</td></tr>
<tr><td>Stale answers</td><td>Index not updated</td><td>Incremental indexing pipeline</td></tr>
<tr><td>Wrong language</td><td>Monolingual embedding</td><td>Use multilingual embedding model</td></tr></table>`
},

"rag-chunking": {id:"rag-chunking",title:"RAG Chunking Strategies",cat:"RAG Systems",level:"Advanced",time:"30 min",
content:`<h2>RAG Chunking Strategies</h2>
<p>Chunking is the single biggest lever for RAG quality. Wrong chunk size causes poor retrieval — no LLM tuning can compensate. Small chunks = precise retrieval but missing context. Large chunks = rich context but noisy retrieval.</p>
<h2>Chunking Strategies</h2>
<table><tr><th>Strategy</th><th>How</th><th>Best For</th><th>Size</th></tr>
<tr><td>Fixed-size</td><td>Split every N tokens + overlap</td><td>Homogeneous docs</td><td>512t, 10% overlap</td></tr>
<tr><td>Sentence-based</td><td>Split at sentence boundaries</td><td>Narrative text</td><td>3-5 sentences</td></tr>
<tr><td>Recursive</td><td>Split: paragraph → sentence → word</td><td>Mixed-format docs</td><td>LangChain default</td></tr>
<tr><td>Semantic</td><td>Split where cosine similarity drops</td><td>Heterogeneous docs</td><td>Variable</td></tr>
<tr><td>Parent-Child</td><td>Index small, retrieve large</td><td>Hierarchical docs</td><td>Child:128, Parent:1024</td></tr></table>
<h2>Python: Recursive Splitter</h2>
<pre><code><span class="kw">from</span> langchain.text_splitter <span class="kw">import</span> RecursiveCharacterTextSplitter

splitter = RecursiveCharacterTextSplitter(
    chunk_size=<span class="num">512</span>,
    chunk_overlap=<span class="num">50</span>,
    separators=[<span class="str">"\n\n"</span>, <span class="str">"\n"</span>, <span class="str">". "</span>, <span class="str">" "</span>, <span class="str">""</span>]
)
chunks = splitter.split_documents(docs)
print(f<span class="str">"Created {len(chunks)} chunks"</span>)</code></pre>
<h2>Parent-Child Chunking</h2>
<pre><code><span class="kw">from</span> langchain.retrievers <span class="kw">import</span> ParentDocumentRetriever
<span class="kw">from</span> langchain.storage <span class="kw">import</span> InMemoryStore

parent_splitter = RecursiveCharacterTextSplitter(chunk_size=<span class="num">2000</span>)
child_splitter  = RecursiveCharacterTextSplitter(chunk_size=<span class="num">200</span>)

retriever = ParentDocumentRetriever(
    vectorstore=vectorstore,
    docstore=InMemoryStore(),   <span class="cm"># use Redis in production</span>
    child_splitter=child_splitter,
    parent_splitter=parent_splitter,
)
<span class="cm"># Retrieves child for precision, returns parent for context</span></code></pre>
<h2>Semantic Chunking</h2>
<pre><code><span class="kw">from</span> langchain_experimental.text_splitter <span class="kw">import</span> SemanticChunker
<span class="kw">from</span> langchain_openai <span class="kw">import</span> OpenAIEmbeddings

chunker = SemanticChunker(
    OpenAIEmbeddings(),
    breakpoint_threshold_type=<span class="str">"percentile"</span>,
    breakpoint_threshold_amount=<span class="num">95</span>
)
chunks = chunker.split_text(long_document)</code></pre>
<h2>Chunk Size by Document Type</h2>
<table><tr><th>Document Type</th><th>Size</th><th>Overlap</th><th>Strategy</th></tr>
<tr><td>FAQ / KB articles</td><td>256-512t</td><td>5%</td><td>Recursive</td></tr>
<tr><td>Technical docs</td><td>512-1024t</td><td>10-15%</td><td>Recursive/Markdown</td></tr>
<tr><td>Research papers</td><td>512-768t</td><td>10%</td><td>Semantic</td></tr>
<tr><td>Legal contracts</td><td>256-512t</td><td>15%</td><td>Parent-Child</td></tr>
<tr><td>Code files</td><td>Per function</td><td>0%</td><td>AST-based</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Treat Chunk Size as a Hyperparameter</div><p class="box-text">Start with 512/50. Measure RAGAS Context Precision and Recall. Try 256 and 1024. Pick the winner. Automate this — it's the highest-ROI tuning in any RAG project.</p></div></div>`
},

"hybrid-search": {id:"hybrid-search",title:"Hybrid Search and Re-ranking",cat:"RAG Systems",level:"Advanced",time:"30 min",
content:`<h2>Hybrid Search and Re-ranking</h2>
<p>Hybrid search combines dense vector search (semantic) with sparse keyword search (BM25). It consistently outperforms either method alone and is the production standard for RAG.</p>
<h2>Dense vs Sparse vs Hybrid</h2>
<table><tr><th></th><th>Dense (Vector)</th><th>Sparse (BM25)</th><th>Hybrid</th></tr>
<tr><td>Matches by</td><td>Semantic meaning</td><td>Exact keywords</td><td>Both</td></tr>
<tr><td>"car" → "automobile"</td><td>✅ Yes</td><td>❌ No</td><td>✅ Yes</td></tr>
<tr><td>Error code "ERR_403"</td><td>❌ Often misses</td><td>✅ Yes</td><td>✅ Yes</td></tr>
<tr><td>Speed</td><td>Fast (ANN)</td><td>Very fast</td><td>Slightly slower</td></tr></table>
<h2>Reciprocal Rank Fusion (RRF)</h2>
<pre><code><span class="kw">def</span> <span class="fn">reciprocal_rank_fusion</span>(results_lists: <span class="cls">list</span>, k: <span class="cls">int</span> = <span class="num">60</span>) -> <span class="cls">list</span>:
    scores = {}
    <span class="kw">for</span> results <span class="kw">in</span> results_lists:
        <span class="kw">for</span> rank, doc <span class="kw">in</span> enumerate(results):
            doc_id = doc.metadata[<span class="str">"id"</span>]
            scores[doc_id] = scores.get(doc_id, <span class="num">0</span>) + <span class="num">1</span> / (k + rank + <span class="num">1</span>)
    <span class="kw">return</span> sorted(scores.items(), key=<span class="kw">lambda</span> x: x[<span class="num">1</span>], reverse=<span class="kw">True</span>)

vector_results = vectorstore.similarity_search(query, k=<span class="num">20</span>)
bm25_results   = bm25_index.get_top_n(query.split(), all_docs, n=<span class="num">20</span>)
merged = reciprocal_rank_fusion([vector_results, bm25_results])</code></pre>
<h2>Qdrant Native Hybrid Search</h2>
<pre><code><span class="kw">from</span> qdrant_client.models <span class="kw">import</span> Prefetch, FusionQuery, Fusion

results = client.query_points(
    collection_name=<span class="str">"docs"</span>,
    prefetch=[
        Prefetch(query=dense_vec, using=<span class="str">"dense"</span>, limit=<span class="num">20</span>),
        Prefetch(query=sparse_vec, using=<span class="str">"sparse"</span>, limit=<span class="num">20</span>),
    ],
    query=FusionQuery(fusion=Fusion.RRF),
    limit=<span class="num">5</span>
)</code></pre>
<h2>Cross-Encoder Re-ranking</h2>
<pre><code><span class="kw">from</span> sentence_transformers <span class="kw">import</span> CrossEncoder
reranker = CrossEncoder(<span class="str">"cross-encoder/ms-marco-MiniLM-L-6-v2"</span>)

<span class="kw">def</span> <span class="fn">rerank</span>(query: <span class="cls">str</span>, docs: <span class="cls">list</span>[<span class="cls">str</span>], top_k: <span class="cls">int</span> = <span class="num">4</span>) -> <span class="cls">list</span>:
    scores = reranker.predict([(query, d) <span class="kw">for</span> d <span class="kw">in</span> docs])
    ranked = sorted(zip(docs, scores), key=<span class="kw">lambda</span> x: x[<span class="num">1</span>], reverse=<span class="kw">True</span>)
    <span class="kw">return</span> [d <span class="kw">for</span> d, _ <span class="kw">in</span> ranked[:top_k]]

<span class="cm"># Pipeline: hybrid(20) → rerank → top 4 → LLM</span>
candidates = hybrid_search(query, k=<span class="num">20</span>)
final = rerank(query, [d.page_content <span class="kw">for</span> d <span class="kw">in</span> candidates])</code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Production Pipeline</div><p class="box-text">Hybrid search (top 20) → cross-encoder rerank (top 4) → LLM. Beats pure vector search by 15-25% on answer quality. Cohere Rerank API is a managed alternative. Latency cost: ~100ms — worth every millisecond.</p></div></div>`
},

"ai-agents": {id:"ai-agents",title:"AI Agents",cat:"AI Agents",level:"Advanced",time:"45 min",
content:`<h2>AI Agents</h2>
<p>AI Agents are LLM-powered systems that use tools, retain memory, and achieve multi-step goals autonomously. 78% of enterprise AI Architect postings now require agent design knowledge.</p>
<div class="box def"><div class="box-ico">📖</div><div class="box-body"><div class="box-title">Agent = LLM + Tools + Memory + Loop</div><p class="box-text">The LLM acts as a reasoning engine, deciding which tool to call next based on goal and current state. The loop continues until the task is complete or a safety limit is reached.</p></div></div>
<h2>ReAct Pattern (Reasoning + Acting)</h2>
<div class="dia">User: "Get TCS stock price and compare to last week."

Thought: I need current TCS price.
Action: get_stock_price("TCS.NS")
Observation: Rs.3847

Thought: Need last week's price.
Action: get_historical_price("TCS.NS", days=7)
Observation: Rs.3721

Thought: Change = (3847-3721)/3721 = +3.4%
Answer: TCS is up 3.4% from Rs.3721 to Rs.3847 this week.</div>
<pre><code><span class="kw">from</span> langchain.agents <span class="kw">import</span> create_tool_calling_agent, AgentExecutor
<span class="kw">from</span> langchain_openai <span class="kw">import</span> ChatOpenAI
<span class="kw">from</span> langchain.tools <span class="kw">import</span> tool

<span class="dec">@tool</span>
<span class="kw">def</span> <span class="fn">search_kb</span>(query: <span class="cls">str</span>) -> <span class="cls">str</span>:
    <span class="str">"Search internal knowledge base."</span>
    <span class="kw">return</span> <span class="str">"\\n"</span>.join(col.query(query_texts=[query],n_results=3)[<span class="str">"documents"</span>][0])

<span class="dec">@tool</span>
<span class="kw">def</span> <span class="fn">create_ticket</span>(title: <span class="cls">str</span>, desc: <span class="cls">str</span>) -> <span class="cls">str</span>:
    <span class="str">"Create a Jira P1 ticket."</span>
    <span class="kw">return</span> jira.create(title, desc)

executor = AgentExecutor(
    agent=create_tool_calling_agent(ChatOpenAI(model=<span class="str">"gpt-4o"</span>),
        [search_kb, create_ticket], prompt),
    tools=[search_kb, create_ticket], max_iterations=10
)
result = executor.invoke({<span class="str">"input"</span>: <span class="str">"Find our DB timeout issue and create a Jira P1."</span>})</code></pre>
<h2>Agent Memory Types</h2>
<table><tr><th>Type</th><th>Storage</th><th>Scope</th></tr>
<tr><td>In-context</td><td>Prompt window</td><td>Current conversation</td></tr>
<tr><td>Conversation buffer</td><td>Message list</td><td>Session</td></tr>
<tr><td>Vector memory</td><td>Vector DB</td><td>Persistent, cross-session</td></tr>
<tr><td>Entity memory</td><td>Key-value</td><td>Persistent facts</td></tr></table>
<div class="box warn"><div class="box-ico">⚠️</div><div class="box-body"><div class="box-title">Safety</div><p class="box-text">Always: max_iterations limit. Human-in-the-loop for destructive actions (delete, send money, emails). Audit log all tool calls. Sandbox code-execution agents.</p></div></div>`
},

"langchain": {id:"langchain",title:"LangChain Framework",cat:"Frameworks",level:"Advanced",time:"45 min",
content:`<h2>LangChain</h2>
<p>The most popular Python framework for LLM applications. Mentioned in 87% of AI Architect job postings alongside LangGraph.</p>
<h2>Core Components</h2>
<table><tr><th>Component</th><th>What It Does</th></tr>
<tr><td>ChatModel</td><td>Unified interface: GPT-4o, Claude, Gemini, Ollama</td></tr>
<tr><td>PromptTemplate</td><td>Templated prompts with variables</td></tr>
<tr><td>LCEL (pipe operator)</td><td>Compose prompt | model | parser into pipeline</td></tr>
<tr><td>Retriever</td><td>Abstract interface: vector DB, web, SQL, files</td></tr>
<tr><td>Memory</td><td>Conversation history management</td></tr>
<tr><td>Tools / Agents</td><td>Functions the LLM can call autonomously</td></tr></table>
<h2>LCEL Pipeline</h2>
<pre><code><span class="kw">from</span> langchain_openai <span class="kw">import</span> ChatOpenAI
<span class="kw">from</span> langchain.prompts <span class="kw">import</span> ChatPromptTemplate
<span class="kw">from</span> langchain_core.output_parsers <span class="kw">import</span> StrOutputParser

llm = ChatOpenAI(model=<span class="str">"gpt-4o"</span>, temperature=0)
prompt = ChatPromptTemplate.from_template(<span class="str">"Summarize in {lang}: {text}"</span>)
chain = prompt | llm | StrOutputParser()  <span class="cm"># pipe operator</span>
result = chain.invoke({<span class="str">"lang"</span>:<span class="str">"Hindi"</span>, <span class="str">"text"</span>:<span class="str">"RAG architecture overview..."</span>})</code></pre>
<h2>RAG Pipeline</h2>
<pre><code><span class="kw">from</span> langchain.chains <span class="kw">import</span> create_retrieval_chain
<span class="kw">from</span> langchain.chains.combine_documents <span class="kw">import</span> create_stuff_documents_chain

retriever = vectorstore.as_retriever(search_kwargs={<span class="str">"k"</span>:4})
rag_chain = create_retrieval_chain(
    retriever,
    create_stuff_documents_chain(llm, ChatPromptTemplate.from_messages([
        (<span class="str">"system"</span>, <span class="str">"Answer ONLY from context:\\n{context}"</span>),
        (<span class="str">"human"</span>, <span class="str">"{input}"</span>)
    ]))
)
print(rag_chain.invoke({<span class="str">"input"</span>:<span class="str">"What is our refund policy?"</span>})[<span class="str">"answer"</span>])</code></pre>`
},
"langgraph": {id:"langgraph",title:"LangGraph — Stateful Agent Workflows",cat:"Frameworks",level:"Advanced",time:"40 min",
content:`<h2>LangGraph</h2>
<p>LangGraph extends LangChain with stateful, multi-step agent workflows as directed graphs. Essential for building reliable, controllable agents with cycles, branches, and human-in-the-loop.</p>
<div class="box def"><div class="box-ico">📖</div><div class="box-body"><div class="box-title">When to use LangGraph vs plain LangChain</div><p class="box-text">Use LangChain for simple linear chains (RAG, prompt-response). Use LangGraph when you need loops, conditional branching, multiple agents, persistent state, or human-in-the-loop checkpoints.</p></div></div>
<h2>Core Concepts</h2>
<table><tr><th>Concept</th><th>Meaning</th></tr>
<tr><td>State</td><td>Typed dict shared across all nodes in the graph</td></tr>
<tr><td>Node</td><td>A function that reads state and returns updated state</td></tr>
<tr><td>Edge</td><td>Connection between nodes (can be conditional)</td></tr>
<tr><td>Graph</td><td>StateGraph — the full workflow definition</td></tr>
<tr><td>Checkpointer</td><td>Persist state to DB (enables resume, HITL)</td></tr></table>
<h2>RAG Agent with LangGraph</h2>
<pre><code><span class="kw">from</span> langgraph.graph <span class="kw">import</span> StateGraph, END
<span class="kw">from</span> typing <span class="kw">import</span> TypedDict, Annotated
<span class="kw">import</span> operator

<span class="kw">class</span> <span class="cls">AgentState</span>(TypedDict):
    question: <span class="cls">str</span>
    retrieved_docs: <span class="cls">list</span>[<span class="cls">str</span>]
    answer: <span class="cls">str</span>
    needs_clarification: <span class="cls">bool</span>

<span class="kw">def</span> <span class="fn">retrieve</span>(state: <span class="cls">AgentState</span>) -> <span class="cls">AgentState</span>:
    docs = vectorstore.similarity_search(state[<span class="str">"question"</span>], k=4)
    <span class="kw">return</span> {<span class="str">"retrieved_docs"</span>: [d.page_content <span class="kw">for</span> d <span class="kw">in</span> docs]}

<span class="kw">def</span> <span class="fn">generate</span>(state: <span class="cls">AgentState</span>) -> <span class="cls">AgentState</span>:
    ctx = <span class="str">"\\n"</span>.join(state[<span class="str">"retrieved_docs"</span>])
    answer = llm.invoke(<span class="str">f"Context: {ctx}\\nQuestion: {state['question']}"</span>)
    <span class="kw">return</span> {<span class="str">"answer"</span>: answer.content}

<span class="kw">def</span> <span class="fn">should_clarify</span>(state: <span class="cls">AgentState</span>) -> <span class="cls">str</span>:
    <span class="kw">if</span> <span class="str">"I don't have"</span> <span class="kw">in</span> state[<span class="str">"answer"</span>]:
        <span class="kw">return</span> <span class="str">"clarify"</span>  <span class="cm"># route to clarification node</span>
    <span class="kw">return</span> END           <span class="cm"># done</span>

graph = StateGraph(AgentState)
graph.add_node(<span class="str">"retrieve"</span>, retrieve)
graph.add_node(<span class="str">"generate"</span>, generate)
graph.set_entry_point(<span class="str">"retrieve"</span>)
graph.add_edge(<span class="str">"retrieve"</span>, <span class="str">"generate"</span>)
graph.add_conditional_edges(<span class="str">"generate"</span>, should_clarify)

app = graph.compile()
result = app.invoke({<span class="str">"question"</span>: <span class="str">"What is our vacation policy?"</span>})</code></pre>
<h2>Human-in-the-Loop (HITL)</h2>
<pre><code><span class="kw">from</span> langgraph.checkpoint.sqlite <span class="kw">import</span> SqliteSaver

checkpointer = SqliteSaver.from_conn_string(<span class="str">"checkpoints.db"</span>)
app = graph.compile(checkpointer=checkpointer, interrupt_before=[<span class="str">"send_email"</span>])

<span class="cm"># Run until "send_email" node — pauses for human approval</span>
thread = {<span class="str">"configurable"</span>: {<span class="str">"thread_id"</span>: <span class="str">"task-001"</span>}}
app.invoke(state, config=thread)

<span class="cm"># Human reviews, then resume:</span>
app.invoke(<span class="kw">None</span>, config=thread)  <span class="cm"># resumes from checkpoint</span></code></pre>`
},

"crewai": {id:"crewai",title:"CrewAI — Multi-Agent Teams",cat:"Frameworks",level:"Advanced",time:"35 min",
content:`<h2>CrewAI — Multi-Agent Teams</h2>
<p>CrewAI orchestrates multiple specialized AI agents working as a team — like hiring a crew of experts. Each agent has a role, goal, backstory, and tools.</p>
<h2>Core Concepts</h2>
<table><tr><th>Concept</th><th>Description</th><th>Example</th></tr>
<tr><td>Agent</td><td>Specialized LLM with role + tools</td><td>Researcher, Writer, Code Reviewer</td></tr>
<tr><td>Task</td><td>What an agent must accomplish</td><td>"Research AI trends for 2026"</td></tr>
<tr><td>Crew</td><td>Team of agents with tasks</td><td>Research crew, DevOps crew</td></tr>
<tr><td>Process</td><td>Sequential or hierarchical task flow</td><td>Sequential: A → B → C</td></tr></table>
<pre><code><span class="kw">from</span> crewai <span class="kw">import</span> Agent, Task, Crew, Process
<span class="kw">from</span> crewai_tools <span class="kw">import</span> SerperDevTool

search_tool = SerperDevTool()

<span class="cm"># Define agents</span>
researcher = Agent(
    role=<span class="str">"AI Research Analyst"</span>,
    goal=<span class="str">"Find the latest enterprise AI architecture trends"</span>,
    backstory=<span class="str">"You are an expert AI analyst who reads research papers and blogs."</span>,
    tools=[search_tool], verbose=<span class="kw">True</span>
)
architect = Agent(
    role=<span class="str">"AI Solution Architect"</span>,
    goal=<span class="str">"Design enterprise architecture based on research"</span>,
    backstory=<span class="str">"Senior architect with 10 years of enterprise AI experience."</span>,
    verbose=<span class="kw">True</span>
)

<span class="cm"># Define tasks</span>
research_task = Task(
    description=<span class="str">"Research top 5 enterprise AI patterns for 2026. Focus on RAG, agents, LLMOps."</span>,
    expected_output=<span class="str">"Markdown report with 5 patterns, pros/cons, and examples."</span>,
    agent=researcher
)
design_task = Task(
    description=<span class="str">"Design an enterprise AI platform architecture based on the research."</span>,
    expected_output=<span class="str">"Architecture diagram (text) and implementation roadmap."</span>,
    agent=architect, context=[research_task]
)

crew = Crew(agents=[researcher, architect], tasks=[research_task, design_task],
            process=Process.sequential, verbose=<span class="kw">True</span>)
result = crew.kickoff()
print(result.raw)</code></pre>
<div class="box tip"><div class="box-ico">🏛️</div><div class="box-body"><div class="box-title">When to Use CrewAI</div><p class="box-text">Use CrewAI for tasks that benefit from specialization and decomposition: research + summarize + write report, plan + code + test + review. For simpler single-agent tasks, LangChain/LangGraph is sufficient.</p></div></div>`
},

"spring-ai": {id:"spring-ai",title:"Spring AI — Java LLM Integration",cat:"Java AI Stack",level:"Advanced",time:"45 min",
content:`<h2>Spring AI</h2>
<p>Spring AI is the official Spring Framework integration for AI/LLM applications. Your Java background is a major advantage here — Spring AI maps directly to familiar Spring concepts.</p>
<div class="box tip"><div class="box-ico">☕</div><div class="box-body"><div class="box-title">Java Advantage</div><p class="box-text">As a Java Full Stack developer, Spring AI is your fastest path to production AI. You already know Spring Boot, Spring Data, dependency injection, and REST APIs. Spring AI builds on all of that.</p></div></div>
<h2>Setup</h2>
<pre><code><span class="cm">&lt;!-- pom.xml --&gt;</span>
&lt;dependency&gt;
    &lt;groupId&gt;org.springframework.ai&lt;/groupId&gt;
    &lt;artifactId&gt;spring-ai-openai-spring-boot-starter&lt;/artifactId&gt;
    &lt;version&gt;1.0.0&lt;/version&gt;
&lt;/dependency&gt;
&lt;dependency&gt;
    &lt;groupId&gt;org.springframework.ai&lt;/groupId&gt;
    &lt;artifactId&gt;spring-ai-pgvector-store-spring-boot-starter&lt;/artifactId&gt;
&lt;/dependency&gt;</code></pre>
<pre><code><span class="cm"># application.yml</span>
spring:
  ai:
    openai:
      api-key: \${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.3</code></pre>
<h2>Basic Chat — Java</h2>
<pre><code><span class="dec">@RestController</span>
<span class="dec">@RequestMapping</span>(<span class="str">"/ai"</span>)
<span class="kw">public class</span> <span class="cls">AiController</span> {

    <span class="kw">private final</span> <span class="cls">ChatClient</span> chatClient;

    <span class="kw">public</span> <span class="fn">AiController</span>(<span class="cls">ChatClient</span>.Builder builder) {
        <span class="kw">this</span>.chatClient = builder
            .defaultSystem(<span class="str">"You are an AI solution architect. Be concise and technical."</span>)
            .build();
    }

    <span class="dec">@GetMapping</span>(<span class="str">"/ask"</span>)
    <span class="kw">public</span> <span class="cls">String</span> <span class="fn">ask</span>(<span class="dec">@RequestParam</span> <span class="cls">String</span> question) {
        <span class="kw">return</span> chatClient.prompt()
            .user(question)
            .call()
            .content();
    }

    <span class="dec">@GetMapping</span>(<span class="str">"/stream"</span>)
    <span class="kw">public</span> Flux&lt;String&gt; <span class="fn">stream</span>(<span class="dec">@RequestParam</span> <span class="cls">String</span> question) {
        <span class="kw">return</span> chatClient.prompt()
            .user(question)
            .stream()
            .content();  <span class="cm">// Server-Sent Events streaming</span>
    }
}</code></pre>
<h2>RAG with Spring AI + pgvector</h2>
<pre><code><span class="dec">@Service</span>
<span class="kw">public class</span> <span class="cls">RagService</span> {

    <span class="kw">private final</span> <span class="cls">ChatClient</span> chatClient;
    <span class="kw">private final</span> <span class="cls">VectorStore</span> vectorStore;

    <span class="kw">public</span> <span class="cls">String</span> <span class="fn">askWithRag</span>(<span class="cls">String</span> question) {
        <span class="kw">return</span> chatClient.prompt()
            .advisors(<span class="kw">new</span> <span class="cls">QuestionAnswerAdvisor</span>(vectorStore,
                <span class="cls">SearchRequest</span>.defaults().withTopK(4)))
            .user(question)
            .call()
            .content();
    }

    <span class="kw">public void</span> <span class="fn">ingestDocument</span>(<span class="cls">String</span> content, <span class="cls">String</span> source) {
        <span class="cls">List</span>&lt;<span class="cls">Document</span>&gt; docs = <span class="kw">new</span> <span class="cls">TokenTextSplitter</span>()
            .apply(<span class="cls">List</span>.of(<span class="kw">new</span> <span class="cls">Document</span>(content, <span class="cls">Map</span>.of(<span class="str">"source"</span>, source))));
        vectorStore.add(docs);
    }
}</code></pre>
<h2>Structured Output (Java Record)</h2>
<pre><code><span class="kw">record</span> <span class="cls">SkillAssessment</span>(<span class="cls">String</span> skill, <span class="cls">String</span> level, <span class="cls">List</span>&lt;<span class="cls">String</span>&gt; gaps) {}

<span class="cls">SkillAssessment</span> result = chatClient.prompt()
    .user(<span class="str">"Assess RAG skills for someone who built 2 RAG systems."</span>)
    .call()
    .entity(<span class="cls">SkillAssessment</span>.class);  <span class="cm">// Spring AI auto-parses JSON to record</span>
System.out.println(result.level());</code></pre>`
},

"langchain4j": {id:"langchain4j",title:"LangChain4j — Java LLM Framework",cat:"Java AI Stack",level:"Advanced",time:"35 min",
content:`<h2>LangChain4j</h2>
<p>LangChain4j is the Java equivalent of Python's LangChain. It provides LLM integration, RAG, agents, and tools with a clean Java API. Works standalone or with Spring Boot.</p>
<pre><code><span class="cm">&lt;!-- Maven --&gt;</span>
&lt;dependency&gt;
    &lt;groupId&gt;dev.langchain4j&lt;/groupId&gt;
    &lt;artifactId&gt;langchain4j-open-ai-spring-boot-starter&lt;/artifactId&gt;
    &lt;version&gt;0.36.0&lt;/version&gt;
&lt;/dependency&gt;</code></pre>
<h2>AI Service Pattern</h2>
<pre><code><span class="cm">// Define interface — LangChain4j implements it</span>
<span class="kw">interface</span> <span class="cls">ArchitectAdvisor</span> {

    <span class="dec">@SystemMessage</span>(<span class="str">"You are an AI solution architect. Be precise and technical."</span>)
    <span class="cls">String</span> <span class="fn">advise</span>(<span class="dec">@UserMessage</span> <span class="cls">String</span> question);

    <span class="dec">@SystemMessage</span>(<span class="str">"Evaluate the architecture and return JSON with fields: score, issues, recommendations."</span>)
    <span class="cls">ArchReview</span> <span class="fn">review</span>(<span class="dec">@UserMessage</span> <span class="cls">String</span> architectureDescription);
}

<span class="cm">// Wire it up</span>
<span class="cls">ArchitectAdvisor</span> advisor = <span class="cls">AiServices</span>.builder(<span class="cls">ArchitectAdvisor</span>.class)
    .chatLanguageModel(<span class="cls">OpenAiChatModel</span>.withApiKey(apiKey))
    .build();

<span class="cls">String</span> answer = advisor.advise(<span class="str">"Should I use RAG or fine-tuning for HR chatbot?"</span>);</code></pre>
<h2>RAG with LangChain4j</h2>
<pre><code><span class="cm">// Embed and store</span>
<span class="cls">EmbeddingModel</span> embeddingModel = <span class="kw">new</span> <span class="cls">OpenAiEmbeddingModel</span>(<span class="str">"text-embedding-3-small"</span>);
<span class="cls">EmbeddingStore</span>&lt;<span class="cls">TextSegment</span>&gt; store = <span class="kw">new</span> <span class="cls">InMemoryEmbeddingStore</span>&lt;&gt;();

<span class="cls">EmbeddingStoreIngestor</span> ingestor = <span class="cls">EmbeddingStoreIngestor</span>.builder()
    .documentSplitter(<span class="cls">DocumentSplitters</span>.recursive(512, 64))
    .embeddingModel(embeddingModel)
    .embeddingStore(store)
    .build();

ingestor.ingest(<span class="cls">Document</span>.from(<span class="str">"RAG architecture overview..."</span>));

<span class="cm">// RAG-enabled AI service</span>
<span class="cls">ArchitectAdvisor</span> ragAdvisor = <span class="cls">AiServices</span>.builder(<span class="cls">ArchitectAdvisor</span>.class)
    .chatLanguageModel(chatModel)
    .contentRetriever(<span class="cls">EmbeddingStoreContentRetriever</span>.from(store))
    .build();</code></pre>
<h2>Tool Use (Function Calling)</h2>
<pre><code><span class="kw">class</span> <span class="cls">DocumentTools</span> {
    <span class="dec">@Tool</span>(<span class="str">"Search the internal knowledge base"</span>)
    <span class="cls">String</span> <span class="fn">searchDocs</span>(<span class="cls">String</span> query) {
        <span class="kw">return</span> knowledgeBase.search(query);
    }
    <span class="dec">@Tool</span>(<span class="str">"Create a Jira ticket"</span>)
    <span class="cls">String</span> <span class="fn">createTicket</span>(<span class="cls">String</span> title, <span class="cls">String</span> description) {
        <span class="kw">return</span> jira.create(title, description);
    }
}
<span class="cm">// Agent automatically decides which tool to call</span>
<span class="cls">ArchitectAdvisor</span> agent = <span class="cls">AiServices</span>.builder(<span class="cls">ArchitectAdvisor</span>.class)
    .chatLanguageModel(chatModel)
    .tools(<span class="kw">new</span> <span class="cls">DocumentTools</span>())
    .build();</code></pre>`
},

"mlops-llmops": {id:"mlops-llmops",title:"MLOps and LLMOps",cat:"MLOps & LLMOps",level:"Advanced",time:"40 min",
content:`<h2>MLOps and LLMOps</h2>
<p>MLOps (ML Operations) and LLMOps (LLM Operations) are engineering disciplines for deploying, monitoring, and maintaining AI systems in production reliably.</p>
<h2>MLOps vs LLMOps</h2>
<table><tr><th>Aspect</th><th>MLOps</th><th>LLMOps</th></tr>
<tr><td>Model size</td><td>MBs to GBs</td><td>GBs to TBs</td></tr>
<tr><td>Training</td><td>Custom training required</td><td>Usually use pre-trained (fine-tuning optional)</td></tr>
<tr><td>Deployment</td><td>Custom inference server</td><td>API (OpenAI/Anthropic) or self-hosted</td></tr>
<tr><td>Evaluation</td><td>Standard metrics (accuracy, F1)</td><td>LLM-as-judge, RAGAS, human eval</td></tr>
<tr><td>Monitoring</td><td>Data drift, accuracy drift</td><td>Hallucination, latency, cost, prompt quality</td></tr>
<tr><td>Versioning</td><td>Model versions + data versions</td><td>Prompt versions + model versions</td></tr></table>
<h2>LLMOps Stack</h2>
<div class="dia">Development:
  Prompt versioning (git / PromptLayer)
  Experiment tracking (MLflow)
  
Deployment:
  API Gateway (Kong, AWS API GW)
  Load balancer across LLM providers
  Caching layer (Redis)
  
Monitoring (Langfuse / OpenTelemetry):
  - Latency (p50, p95, p99)
  - Token cost per request
  - Hallucination rate
  - User feedback (thumbs up/down)
  - Error rate by prompt version</div>
<h2>Langfuse — LLM Observability</h2>
<pre><code><span class="kw">from</span> langfuse <span class="kw">import</span> Langfuse
<span class="kw">from</span> langfuse.decorators <span class="kw">import</span> observe

langfuse = Langfuse(public_key=<span class="str">"pk-..."</span>, secret_key=<span class="str">"sk-..."</span>)

<span class="dec">@observe</span>()  <span class="cm"># auto-traces the entire function</span>
<span class="kw">def</span> <span class="fn">ask_rag</span>(question: <span class="cls">str</span>) -> <span class="cls">str</span>:
    docs = retrieve(question)          <span class="cm"># auto-captured</span>
    answer = generate(question, docs)  <span class="cm"># auto-captured with token usage</span>
    <span class="kw">return</span> answer

<span class="cm"># Langfuse captures: input, output, token usage, latency, cost</span>
<span class="cm"># View at https://cloud.langfuse.com</span></code></pre>
<h2>Prompt Versioning with MLflow</h2>
<pre><code><span class="kw">import</span> mlflow

mlflow.set_tracking_uri(<span class="str">"http://mlflow.company.internal"</span>)

<span class="kw">with</span> mlflow.start_run(run_name=<span class="str">"rag-prompt-v2"</span>):
    mlflow.log_param(<span class="str">"prompt_version"</span>, <span class="str">"v2.0"</span>)
    mlflow.log_param(<span class="str">"model"</span>, <span class="str">"gpt-4o"</span>)
    mlflow.log_param(<span class="str">"chunk_size"</span>, <span class="num">512</span>)
    mlflow.log_metric(<span class="str">"faithfulness"</span>, <span class="num">0.94</span>)
    mlflow.log_metric(<span class="str">"answer_relevancy"</span>, <span class="num">0.87</span>)
    mlflow.log_metric(<span class="str">"avg_latency_ms"</span>, <span class="num">1240</span>)</code></pre>`
},

"ai-evaluation": {id:"ai-evaluation",title:"AI Evaluation with RAGAS",cat:"MLOps & LLMOps",level:"Advanced",time:"35 min",
content:`<h2>AI Evaluation with RAGAS</h2>
<p>RAGAS (Retrieval Augmented Generation Assessment) is the standard framework for evaluating RAG pipelines. It measures both retrieval quality and generation quality automatically using LLMs.</p>
<h2>RAGAS Metrics</h2>
<table><tr><th>Metric</th><th>What It Measures</th><th>Range</th><th>Target</th></tr>
<tr><td><strong>Faithfulness</strong></td><td>Is the answer grounded in context? (no hallucination)</td><td>0-1</td><td>&gt; 0.90</td></tr>
<tr><td><strong>Answer Relevancy</strong></td><td>Does the answer address the question?</td><td>0-1</td><td>&gt; 0.85</td></tr>
<tr><td><strong>Context Precision</strong></td><td>Is the retrieved context relevant?</td><td>0-1</td><td>&gt; 0.80</td></tr>
<tr><td><strong>Context Recall</strong></td><td>Is all needed information retrieved?</td><td>0-1</td><td>&gt; 0.80</td></tr>
<tr><td><strong>Answer Correctness</strong></td><td>Is the answer factually correct vs ground truth?</td><td>0-1</td><td>&gt; 0.85</td></tr></table>
<h2>RAGAS Evaluation</h2>
<pre><code><span class="kw">from</span> ragas <span class="kw">import</span> evaluate
<span class="kw">from</span> ragas.metrics <span class="kw">import</span> (
    faithfulness, answer_relevancy,
    context_precision, context_recall
)
<span class="kw">from</span> datasets <span class="kw">import</span> Dataset

<span class="cm"># Prepare evaluation dataset</span>
eval_data = {
    <span class="str">"question"</span>: [<span class="str">"What is our refund policy?"</span>, <span class="str">"How to contact support?"</span>],
    <span class="str">"answer"</span>: [
        <span class="str">"Refunds are processed within 7 business days..."</span>,
        <span class="str">"Contact support at support@company.com..."</span>
    ],
    <span class="str">"contexts"</span>: [
        [<span class="str">"Our refund policy states 7 business days..."</span>],
        [<span class="str">"Support team available at support@company.com..."</span>]
    ],
    <span class="str">"ground_truth"</span>: [<span class="str">"Refund takes 7 days"</span>, <span class="str">"Email support@company.com"</span>]
}

dataset = Dataset.from_dict(eval_data)
result = evaluate(dataset, metrics=[
    faithfulness, answer_relevancy, context_precision, context_recall
])
print(result.to_pandas())</code></pre>
<h2>LLM-as-Judge Pattern</h2>
<pre><code><span class="kw">def</span> <span class="fn">evaluate_response</span>(question, answer, context):
    judge_prompt = <span class="str">f"""Rate this RAG response on a scale 1-5:
Question: {question}
Context provided: {context}
Answer given: {answer}

Score on:
1. Faithfulness (is it grounded in context?)
2. Relevance (does it answer the question?)
3. Completeness (is anything important missing?)

Return JSON: {{faithfulness: N, relevance: N, completeness: N, reasoning: "..."}}"""</span>
    
    result = llm.invoke(judge_prompt)
    <span class="kw">return</span> json.loads(result.content)</code></pre>
<div class="box tip"><div class="box-ico">🔬</div><div class="box-body"><div class="box-title">Evaluation-Driven Development</div><p class="box-text">Build your evaluation dataset FIRST (50-100 question/answer pairs). Every RAG configuration change must be evaluated. Automate evaluation in CI/CD — fail the pipeline if faithfulness drops below 0.85.</p></div></div>`
},

"cloud-ai": {id:"cloud-ai",title:"Cloud AI Platforms",cat:"Cloud AI",level:"Advanced",time:"35 min",
content:`<h2>Cloud AI Platforms</h2>

        <span class="str">"max_tokens"</span>: 1024,
        <span class="str">"messages"</span>: [{<span class="str">"role"</span>: <span class="str">"user"</span>, <span class="str">"content"</span>: <span class="str">"Explain RAG architecture"</span>}]
    })
)
result = json.loads(response[<span class="str">"body"</span>].read())
print(result[<span class="str">"content"</span>][0][<span class="str">"text"</span>])</code></pre>

<pre><code><span class="kw">from</span> openai <span class="kw">import</span> AzureOpenAI

client = AzureOpenAI(
    azure_endpoint=<span class="str">"https://my-company.openai.azure.com/"</span>,

    model=<span class="str">"gpt-4o"</span>,  <span class="cm"># your deployment name</span>

print(response.text)</code></pre>
<h2>Cloud Platform Comparison</h2>
<table><tr><th>Platform</th><th>Models Available</th><th>Best For</th></tr>
<tr><td>AWS Bedrock</td><td>Claude, LLaMA, Titan, Mistral, Cohere</td><td>AWS-native orgs, compliance (HIPAA, SOC2)</td></tr>

},

"enterprise-architecture": {id:"enterprise-architecture",title:"Enterprise AI Architecture",cat:"Enterprise AI",level:"Advanced",time:"50 min",
content:`<h2>Enterprise AI Architecture</h2>
<p>Enterprise AI architecture goes beyond individual models — it covers scalability, security, governance, multi-tenancy, and integration with existing systems.</p>
<h2>AI Platform Reference Architecture</h2>
<div class="dia">┌──────────────────────────────────────────────────────────────┐
│                    AI PLATFORM ARCHITECTURE                  │
│                                                              │
│  Client Apps (Web / Mobile / Slack / MS Teams)               │
│          │                                                   │
│  ┌───────▼────────┐    ┌─────────────────────────────────┐  │
│  │  API Gateway   │    │     Auth & Authorization        │  │
│  │ (rate limit,   │    │  (JWT, OAuth2, RBAC)            │  │
│  │  routing, log) │    └─────────────────────────────────┘  │
│  └───────┬────────┘                                          │
