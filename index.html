"ai-intro": {id:"ai-intro",title:"What is Artificial Intelligence?",cat:"Introduction",level:"Beginner",time:"20 min",
content:`<h2>What is Artificial Intelligence?</h2>
<p>Artificial Intelligence (AI) is the simulation of human intelligence processes by machines—especially computer systems. AI enables machines to perform tasks that typically require human cognition: learning, reasoning, problem-solving, perception, and language understanding.</p>
<div class="box def"><div class="box-ico">📖</div><div class="box-body"><div class="box-title">Definition</div><p class="box-text">AI is the field of computer science dedicated to building systems that can perform tasks that would normally require human intelligence.</p></div></div>
<h2>The AI Hierarchy</h2>
<p>AI is an umbrella term containing several subfields that build upon one another:</p>
<div class="dia">Artificial Intelligence (broad field)
 └── Machine Learning (learns from data)
      └── Deep Learning (multi-layer neural networks)
           └── Generative AI (creates new content)
                └── Large Language Models (GPT, Claude, Gemini)</div>
<h2>Types of AI by Capability</h2>
<table><tr><th>Type</th><th>Description</th><th>Example</th><th>Status</th></tr>
<tr><td><strong>Narrow AI (ANI)</strong></td><td>Excels at one specific task</td><td>Chess engine, spam filter, ChatGPT</td><td>✅ Exists today</td></tr>
<tr><td><strong>General AI (AGI)</strong></td><td>Human-level across all tasks</td><td>—</td><td>🔬 Research goal</td></tr>
<tr><td><strong>Super AI (ASI)</strong></td><td>Surpasses human intelligence in all domains</td><td>—</td><td>🔮 Theoretical</td></tr></table>
<h2>Core AI Capabilities</h2>
<ul><li><strong>Natural Language Processing (NLP):</strong> Understanding and generating human language — chatbots, translation, summarization</li>
<li><strong>Computer Vision:</strong> Interpreting images and video — object detection, facial recognition, medical imaging</li>
<li><strong>Speech Recognition:</strong> Converting audio to text — Siri, Google Speech-to-Text, Whisper</li>
<li><strong>Reinforcement Learning:</strong> Learning via trial and reward — game playing (AlphaGo), robotics</li>
<li><strong>Generative AI:</strong> Creating new content — text (LLMs), images (DALL-E, Midjourney), code (Copilot)</li></ul>
<h2>Why AI Now?</h2>
<div class="steps"><div class="step"><div class="snum">1</div><div class="scont"><h4>Big Data</h4><p>Massive datasets available from internet, sensors, mobile — AI models need huge data to learn patterns</p></div></div>
<div class="step"><div class="snum">2</div><div class="scont"><h4>Compute Power</h4><p>GPUs and TPUs enable training billion-parameter models in days — impossible a decade ago</p></div></div>
<div class="step"><div class="snum">3</div><div class="scont"><h4>Algorithm Breakthroughs</h4><p>Transformers (2017), Attention mechanism, RLHF — key innovations that unlocked modern AI</p></div></div>
<div class="step"><div class="snum">4</div><div class="scont"><h4>Cloud Infrastructure</h4><p>AWS, Azure, GCP provide scalable AI infrastructure — any company can build AI systems</p></div></div></div>
<div class="box tip"><div class="box-ico">💡</div><div class="box-body"><div class="box-title">Architect Insight</div><p class="box-text">As an AI Solution Architect, you bridge the gap between business problems and AI capabilities. You don't need to be a researcher — you need to know WHEN to apply AI and HOW to deploy it reliably in enterprise environments.</p></div></div>`
},

"ai-vs-ml": {id:"ai-vs-ml",title:"AI vs ML vs DL vs GenAI",cat:"Introduction",level:"Beginner",time:"15 min",
content:`<h2>AI vs ML vs DL vs GenAI</h2>
<p>These terms are often used interchangeably but have distinct meanings. Understanding the differences is fundamental for any AI Architect.</p>
<table><tr><th>Term</th><th>Full Name</th><th>What It Does</th><th>Key Examples</th></tr>
<tr><td><strong>AI</strong></td><td>Artificial Intelligence</td><td>Any technique enabling machine to mimic human intelligence</td><td>Expert systems, rule-based chatbots, ML models, LLMs</td></tr>
<tr><td><strong>ML</strong></td><td>Machine Learning</td><td>Systems that learn patterns from data without explicit programming</td><td>Linear Regression, Random Forest, XGBoost, SVM</td></tr>
<tr><td><strong>DL</strong></td><td>Deep Learning</td><td>ML using multi-layered neural networks to learn complex features</td><td>CNNs, RNNs, Transformers</td></tr>
<tr><td><strong>GenAI</strong></td><td>Generative AI</td><td>AI that creates new content (text, images, code, audio)</td><td>GPT-4o, Claude 3.5, DALL-E 3, Stable Diffusion</td></tr></table>
<h2>The Nested Relationship</h2>
<div class="dia">┌─────────────────────────────────────────────┐
│  ARTIFICIAL INTELLIGENCE                    │
│  ┌───────────────────────────────────────┐  │
│  │  MACHINE LEARNING                     │  │
│  │  ┌─────────────────────────────────┐  │  │
│  │  │  DEEP LEARNING                  │  │  │
│  │  │  ┌───────────────────────────┐  │  │  │
│  │  │  │  GENERATIVE AI            │  │  │  │
│  │  │  │  (LLMs, Diffusion Models) │  │  │  │
│  │  │  └───────────────────────────┘  │  │  │
│  │  └─────────────────────────────────┘  │  │
│  └───────────────────────────────────────┘  │
└─────────────────────────────────────────────┘</div>
<h2>Traditional ML vs Deep Learning vs LLMs</h2>
<table><tr><th>Aspect</th><th>Traditional ML</th><th>Deep Learning</th><th>LLMs (GenAI)</th></tr>
<tr><td>Data Needed</td><td>Thousands of rows</td><td>Millions of samples</td><td>Billions of tokens</td></tr>
<tr><td>Feature Engineering</td><td>Manual (domain expert)</td><td>Automatic</td><td>None required</td></tr>
<tr><td>Interpretability</td><td>High (trees, regression)</td><td>Low (black box)</td><td>Very Low</td></tr>
<tr><td>Training Cost</td><td>Low</td><td>High</td><td>Extremely High ($millions)</td></tr>
<tr><td>Inference Cost</td><td>Negligible</td><td>Medium</td><td>High per token</td></tr>
<tr><td>Use for architects</td><td>Tabular data, forecasting</td><td>Image, speech, video</td><td>Chat, search, generation</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">When to Use What</div><p class="box-text"><strong>Use LLMs</strong> for unstructured text, Q&A, code generation, document processing.<br><strong>Use traditional ML</strong> for tabular data, predictions, anomaly detection.<br><strong>Use deep learning</strong> for images, speech, video where you have large labeled datasets.</p></div></div>`
},

"ai-roadmap": {id:"ai-roadmap",title:"12-Month AI Architect Roadmap",cat:"Introduction",level:"Beginner",time:"10 min",
content:`<h2>12-Month AI Solution Architect Roadmap</h2>
<p>A structured path from Java Full Stack Developer to Enterprise AI Solution Architect. This is based on current job market requirements from 1,071+ AI Architect postings on Naukri.com and LinkedIn India (June 2026).</p>
<div class="box note"><div class="box-ico">📌</div><div class="box-body"><div class="box-title">Target Outcome</div><p class="box-text">Enterprise AI Solution Architect role at Tier 1 companies — ₹40L–₹1.2Cr CTC (India), $180K–$350K (US). 1,071 active postings June 2026 on Naukri.com alone.</p></div></div>
<h2>Phase 1 — Foundations (Months 1–3)</h2>
<div class="steps">
<div class="step"><div class="snum">1</div><div class="scont"><h4>Python for AI (Month 1, Weeks 1-2)</h4><p>NumPy, Pandas, Matplotlib. Python fundamentals from a Java dev perspective. Data manipulation and visualization.</p></div></div>
<div class="step"><div class="snum">2</div><div class="scont"><h4>ML Fundamentals (Month 1-2)</h4><p>Scikit-learn, supervised/unsupervised learning. Linear Regression, Decision Trees, Random Forest, XGBoost, model evaluation (precision, recall, F1, AUC-ROC).</p></div></div>
<div class="step"><div class="snum">3</div><div class="scont"><h4>Deep Learning Basics (Month 2-3)</h4><p>Neural networks, PyTorch basics, CNNs, Transfer Learning. Understand why transformers replaced RNNs.</p></div></div>
<div class="step"><div class="snum">4</div><div class="scont"><h4>Transformers & LLMs (Month 3)</h4><p>Attention mechanism, BERT, GPT architecture. Using OpenAI/Anthropic/Google APIs. Prompt engineering basics.</p></div></div>
</div>
<h2>Phase 2 — LLM Engineering (Months 4–6)</h2>
<div class="steps">
<div class="step"><div class="snum">5</div><div class="scont"><h4>RAG Systems (Month 4)</h4><p>Embeddings, vector databases (Pinecone, ChromaDB, pgvector), chunking strategies, hybrid search. Build 2 RAG projects.</p></div></div>
<div class="step"><div class="snum">6</div><div class="scont"><h4>AI Agents (Month 5)</h4><p>ReAct pattern, LangChain, LangGraph, function calling, tool use, memory systems. Build an autonomous agent.</p></div></div>
<div class="step"><div class="snum">7</div><div class="scont"><h4>Multi-Agent Systems (Month 6)</h4><p>CrewAI, AutoGen, A2A Protocol, MCP (Model Context Protocol). Orchestration of agent teams.</p></div></div>
</div>
<h2>Phase 3 — Java AI Stack (Months 7–8)</h2>
<div class="steps">
<div class="step"><div class="snum">8</div><div class="scont"><h4>Spring AI (Month 7)</h4><p>Spring AI framework, ChatClient, embedding, RAG with Spring. LangChain4j. Java AI patterns. Your Java background is a strong advantage here.</p></div></div>
<div class="step"><div class="snum">9</div><div class="scont"><h4>MLOps & LLMOps (Month 8)</h4><p>MLflow, Docker, Kubernetes, Langfuse, prompt versioning, model monitoring, CI/CD for AI systems.</p></div></div>
</div>
<h2>Phase 4 — Architecture (Months 9–12)</h2>
<div class="steps">
<div class="step"><div class="snum">10</div><div class="scont"><h4>Cloud AI Platforms (Month 9)</h4><p>AWS Bedrock, Azure OpenAI Service, Google Vertex AI. Multi-cloud AI strategy, cost optimization.</p></div></div>
<div class="step"><div class="snum">11</div><div class="scont"><h4>Enterprise AI Architecture (Month 10-11)</h4><p>AI Gateway, multi-tenant systems, security (OWASP LLM Top 10), compliance, responsible AI, governance.</p></div></div>
<div class="step"><div class="snum">12</div><div class="scont"><h4>Certifications & Portfolio (Month 12)</h4><p>AWS Certified ML Specialty, Google Cloud Professional ML Engineer, Azure AI Engineer. Build 5 portfolio projects. Interview prep.</p></div></div>
</div>
<h2>Top In-Demand Skills (Naukri 2026)</h2>
<table><tr><th>Skill</th><th>Job Frequency</th><th>Priority</th></tr>
<tr><td>RAG / Vector DB</td><td>91%</td><td>🔴 Critical</td></tr>
<tr><td>LangChain / LangGraph</td><td>87%</td><td>🔴 Critical</td></tr>
<tr><td>LLM APIs (OpenAI, Claude, Gemini)</td><td>94%</td><td>🔴 Critical</td></tr>
<tr><td>Python</td><td>96%</td><td>🔴 Critical</td></tr>
<tr><td>AI Agents</td><td>78%</td><td>🔴 Critical</td></tr>
<tr><td>Spring AI / Java AI</td><td>34%</td><td>🟡 Important</td></tr>
<tr><td>MLOps / LLMOps</td><td>62%</td><td>🟠 High</td></tr>
<tr><td>Cloud AI (AWS/Azure/GCP)</td><td>71%</td><td>🟠 High</td></tr></table>`
