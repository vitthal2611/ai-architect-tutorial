"ai-intro": {id:"ai-intro",title:"What is Artificial Intelligence?",cat:"Introduction",level:"Beginner",time:"20 min",
content:`<h2>AI Solution Architect — Complete Learning Path</h2>
<p>This guide covers everything you need to go from AI basics to designing enterprise-grade AI systems. Structured like a curriculum: foundations first, then production patterns, then enterprise concerns.</p>
<h2>What is an AI Solution Architect?</h2>
<p>An AI Solution Architect bridges business requirements and technical AI implementation. Unlike a data scientist who builds models, or an ML engineer who trains them, the architect designs the <em>system</em>: how components connect, scale, stay secure, and deliver business value reliably.</p>
<h2>2026 Job Market Reality</h2>
<table><tr><th>Role</th><th>Avg Salary (India)</th><th>Avg Salary (US)</th><th>Key Skills</th></tr>
<tr><td>AI Solution Architect</td><td>₹40-80 LPA</td><td>$180K-$280K</td><td>RAG, LLMOps, Cloud AI, System Design</td></tr>
<tr><td>ML Engineer</td><td>₹25-50 LPA</td><td>$150K-$200K</td><td>MLOps, PyTorch, Kubeflow</td></tr>
<tr><td>GenAI Engineer</td><td>₹20-40 LPA</td><td>$130K-$180K</td><td>LangChain, RAG, Prompt Engineering</td></tr>
<tr><td>AI Product Manager</td><td>₹30-60 LPA</td><td>$160K-$220K</td><td>AI strategy, evaluations, roadmap</td></tr></table>
<h2>Learning Roadmap</h2>
<pre><code><span class="cm">Month 1-2: Foundations</span>
├── Python (async, Pydantic, type hints)
├── ML basics (sklearn, XGBoost, evaluation)
├── Deep Learning concepts (transformers, attention)
└── Cloud fundamentals (AWS/Azure/GCP)

<span class="cm">Month 3-4: GenAI Core</span>
├── OpenAI API (all features: vision, streaming, structured output)
├── Embeddings + vector databases (Qdrant, pgvector)
├── RAG architecture (indexing, retrieval, reranking)
└── Prompt engineering + LangChain

<span class="cm">Month 5-6: Production Systems</span>
├── LLMOps (LangFuse, RAGAS, drift detection)
├── AI Security (OWASP LLM Top 10, guardrails)
├── Docker + Kubernetes for AI workloads
└── Enterprise architecture patterns

<span class="cm">Month 7-8: Advanced Topics</span>
├── Agentic AI (LangGraph, CrewAI, multi-agent)
├── Fine-tuning (LoRA, OpenAI fine-tune)
├── Multimodal AI (vision, audio, video)
└── Responsible AI + EU AI Act compliance</code></pre>
<h2>Key Skills by Priority</h2>
<table><tr><th>Priority</th><th>Skill</th><th>Why</th></tr>
<tr><td>🔴 Must</td><td>RAG System Design</td><td>90% of enterprise AI is RAG-based</td></tr>
<tr><td>🔴 Must</td><td>Python (async, Pydantic)</td><td>Primary language for all AI systems</td></tr>
<tr><td>🔴 Must</td><td>LLMOps + Observability</td><td>Production AI fails without monitoring</td></tr>
<tr><td>🟡 Important</td><td>LangChain/LangGraph</td><td>Industry-standard orchestration</td></tr>
<tr><td>🟡 Important</td><td>Cloud AI (AWS/Azure/GCP)</td><td>All production deployments are cloud</td></tr>
<tr><td>🟡 Important</td><td>Vector Databases</td><td>Core storage layer for RAG</td></tr>
<tr><td>🟢 Nice-to-have</td><td>Fine-tuning</td><td>Only needed for specific format/style</td></tr>
<tr><td>🟢 Nice-to-have</td><td>Spring AI / LangChain4j</td><td>Java shops only</td></tr></table>
<h2>Your First Project</h2>
<pre><code><span class="cm"># Build a production-quality RAG system in 4 weeks:</span>
<span class="cm">Week 1: Ingest 100+ PDFs → Qdrant, test retrieval quality</span>
<span class="cm">Week 2: Add FastAPI backend, streaming, Redis caching</span>
<span class="cm">Week 3: RAGAS evaluation suite, LangFuse observability</span>
<span class="cm">Week 4: Dockerize, deploy to cloud, set up CI/CD pipeline</span>
<span class="cm"># Show this project in interviews — it demonstrates architect thinking</span></code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Architect Mindset</div><p class="box-text">Architects make trade-offs, not just technology choices. "Should we use RAG or fine-tune?" → Depends on update frequency, budget, accuracy requirement. Every section in this guide builds toward answering system design questions with confidence. Work through the topics in order, build the project, and you'll be ready for senior AI Architect roles.</p></div></div>`
},

"ai-vs-ml": {id:"ai-vs-ml",title:"AI vs ML vs DL vs GenAI",cat:"Introduction",level:"Beginner",time:"15 min",
content:`<h2>AI vs ML vs DL vs GenAI</h2>
<p>These terms are nested, not synonymous. Confusing them signals junior thinking. As an AI Architect you must use the right term and understand where each fits architecturally.</p>
<h2>The Hierarchy</h2>
<pre><code>AI (Artificial Intelligence)
├── Rule-based Systems (1960s-1990s)
│   └── Expert Systems, Decision Trees
└── Machine Learning (1980s+)
    ├── Classical ML: regression, SVM, random forests, XGBoost
    └── Deep Learning (2012+)
        ├── CNNs (vision), RNNs (sequences)
        └── Transformers (2017+)
            ├── BERT family (encoders → classification, embeddings)
            └── GPT family (decoders → Generative AI)
                ├── LLMs: GPT-4o, Claude, Gemini
                └── Multimodal: images, audio, video</code></pre>
<h2>When to Use Each</h2>
<table><tr><th>Technology</th><th>Use When</th><th>Avoid When</th></tr>
<tr><td>Rule-based AI</td><td>Fully defined domain, 100% explainability required</td><td>Complex patterns, edge cases</td></tr>
<tr><td>Classical ML (XGBoost)</td><td>Tabular data, fraud, churn, pricing</td><td>Text, images, unstructured</td></tr>
<tr><td>Deep Learning (CNN/RNN)</td><td>Images, speech, time-series at scale</td><td>Small datasets (&lt;10K samples)</td></tr>
<tr><td>Transformer Encoders (BERT)</td><td>Text classification, NER, embeddings</td><td>Generation tasks</td></tr>
<tr><td>LLMs (GPT-4o, Claude)</td><td>Q&A, summarization, code, reasoning</td><td>Structured tabular data</td></tr>
<tr><td>Generative AI (Stable Diffusion)</td><td>Images, video, audio synthesis</td><td>Precise numeric outputs</td></tr></table>
<h2>Performance vs Data Size</h2>
<pre><code><span class="cm"># Classical ML peaks early, Deep Learning keeps scaling</span>
data_size = [<span class="str">"100"</span>, <span class="str">"1K"</span>, <span class="str">"10K"</span>, <span class="str">"100K"</span>, <span class="str">"1M"</span>, <span class="str">"1B"</span>]
classical = [  <span class="num">60</span>,   <span class="num">75</span>,    <span class="num">85</span>,     <span class="num">88</span>,    <span class="num">89</span>,  <span class="num">89</span>]  <span class="cm"># %</span>
deep_learning=[<span class="num">40</span>,   <span class="num">62</span>,    <span class="num">80</span>,     <span class="num">88</span>,    <span class="num">93</span>,  <span class="num">97</span>]  <span class="cm"># %</span>
<span class="cm"># LLMs are pre-trained — 0 domain data needed for RAG baseline</span></code></pre>
<h2>Architectural Decision Framework</h2>
<pre><code><span class="kw">def</span> <span class="fn">choose_approach</span>(task: <span class="cls">dict</span>) -> <span class="cls">str</span>:
    <span class="kw">if</span> task[<span class="str">"data"</span>] == <span class="str">"tabular"</span>:
        <span class="kw">return</span> <span class="str">"XGBoost/LightGBM"</span>
    <span class="kw">if</span> task[<span class="str">"data"</span>] == <span class="str">"image"</span>:
        <span class="kw">return</span> <span class="str">"Vision Transformer or CNN"</span>
    <span class="kw">if</span> task[<span class="str">"task_type"</span>] == <span class="str">"text_classification"</span> <span class="kw">and</span> task[<span class="str">"samples"</span>] &gt; <span class="num">1000</span>:
        <span class="kw">return</span> <span class="str">"Fine-tuned BERT/DistilBERT (cheaper than GPT-4)"</span>
    <span class="kw">if</span> task[<span class="str">"task_type"</span>] <span class="kw">in</span> [<span class="str">"qa"</span>, <span class="str">"summarize"</span>, <span class="str">"generate"</span>]:
        <span class="kw">return</span> <span class="str">"LLM + RAG (GPT-4o or Claude)"</span>
    <span class="kw">if</span> task[<span class="str">"task_type"</span>] == <span class="str">"structured_extract"</span>:
        <span class="kw">return</span> <span class="str">"GPT-4o-mini (17x cheaper, same accuracy)"</span>
    <span class="kw">return</span> <span class="str">"Start with rule-based baseline"</span></code></pre>
<h2>Key Differences at a Glance</h2>
<table><tr><th>Dimension</th><th>Classical ML</th><th>Deep Learning</th><th>LLM</th></tr>
<tr><td>Training data</td><td>100s-millions rows</td><td>Millions+ examples</td><td>Pre-trained (0-few shots)</td></tr>
<tr><td>Compute</td><td>CPU</td><td>GPU</td><td>Massive GPU (training); API for inference</td></tr>
<tr><td>Interpretability</td><td>High (SHAP)</td><td>Low</td><td>Low (CoT helps)</td></tr>
<tr><td>Latency</td><td>Microseconds</td><td>Milliseconds</td><td>0.5-5 seconds</td></tr>
<tr><td>Cost</td><td>Near-zero</td><td>GPU training</td><td>$0.001-0.01/query</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Interview Answer</div><p class="box-text">AI ⊃ ML ⊃ Deep Learning ⊃ LLMs ⊃ Generative AI. They are not competitors — most production systems combine them: XGBoost for fraud detection, BERT for entity extraction, LLM for explanation, rule-based for hard business logic. Your job as architect is assembling the right tool for each layer.</p></div></div>`
},

"ai-roadmap": {id:"ai-roadmap",title:"12-Month AI Architect Roadmap",cat:"Introduction",level:"Beginner",time:"10 min",
content:`<h2>12-Month AI Solution Architect Roadmap</h2>
<p>A structured path from Java Full Stack Developer to Enterprise AI Solution Architect. This is based on current job market requirements from 1,071+ AI Architect postings on Naukri.com and LinkedIn India (June 2026).</p>
<div class="box note"><div class="box-ico">📌</div><div class="box-body"><div class="box-title">Target Outcome</div><p class="box-text">Enterprise AI Solution Architect role at Tier 1 companies — ₹40L–₹1.2Cr CTC (India), $180K–$350K (US). 1,071 active postings June 2026 on Naukri.com alone.</p></div></div>
<h2>Phase 1 — Foundations (Months 1–3)</h2>
<div class="steps">
<div class="step"><div class="snum">1</div><div class="scont"><h4>Python for AI (Month 1, Weeks 1-2)</h4><p>NumPy, Pandas, Matplotlib. Python fundamentals from a Java dev perspective. Data manipulation and visualization.</p></div></div>
<div class="step"><div class="snum">2</div><div class="scont"><h4>ML Fundamentals (Month 1-2)</h4><p>Scikit-learn, supervised/unsupervised learning. Linear Regression, Decision Trees, Random Forest, XGBoost, model evaluation (precision, recall, F1, AUC-ROC).</p></div></div>
<div class="step"><div class="snum">3</div><div class="scont"><h4>Deep Learning Basics (Month 2-3)</h4><p>Neural networks, PyTorch basics, CNNs, Transfer Learning. Understand why transformers replaced RNNs.</p></div></div>
<div class="step"><div class="snum">4</div><div class="scont"><h4>Transformers & LLMs (Month 3)</h4><p>Attention mechanism, BERT, GPT architecture. Using OpenAI/Anthropic/Google APIs. Prompt engineering basics.</p></div></div>
</div>
<h2>Phase 2 — LLM Engineering (Months 4–6)</h2>
<div class="steps">
<div class="step"><div class="snum">5</div><div class="scont"><h4>RAG Systems (Month 4)</h4><p>Embeddings, vector databases (Pinecone, ChromaDB, pgvector), chunking strategies, hybrid search. Build 2 RAG projects.</p></div></div>

"python-basics": {id:"python-basics",title:"Python for AI (Java Dev Guide)",cat:"Python for AI",level:"Beginner",time:"45 min",
content:`<h2>Python for AI Architects</h2>
<p>Python is the primary language for AI/ML. As an architect, you need fluency in async patterns, type safety, data structures, and production-grade code patterns — not just scripts.</p>
<h2>Type Hints + Pydantic (Production Standard)</h2>
<pre><code><span class="kw">from</span> pydantic <span class="kw">import</span> BaseModel, Field, validator
<span class="kw">from</span> typing <span class="kw">import</span> Optional, List
<span class="kw">from</span> datetime <span class="kw">import</span> datetime

<span class="kw">class</span> <span class="cls">RAGRequest</span>(BaseModel):
    question: <span class="cls">str</span> = Field(<span class="str">""</span>, min_length=<span class="num">5</span>, max_length=<span class="num">1000</span>)
    tenant_id: <span class="cls">str</span>
    top_k: <span class="cls">int</span> = Field(<span class="num">4</span>, ge=<span class="num">1</span>, le=<span class="num">20</span>)
    temperature: <span class="cls">float</span> = Field(<span class="num">0.0</span>, ge=<span class="num">0.0</span>, le=<span class="num">2.0</span>)

<span class="kw">class</span> <span class="cls">RAGResponse</span>(BaseModel):
    answer: <span class="cls">str</span>
    sources: List[<span class="cls">str</span>]
    latency_ms: <span class="cls">int</span>
    tokens_used: <span class="cls">int</span>
    cost_usd: <span class="cls">float</span>

<span class="cm"># FastAPI auto-validates and documents these models</span></code></pre>
<h2>Async/Await (Essential for AI APIs)</h2>
<pre><code><span class="kw">import</span> asyncio
<span class="kw">from</span> openai <span class="kw">import</span> AsyncOpenAI

client = AsyncOpenAI()

<span class="kw">async def</span> <span class="fn">embed_text</span>(text: <span class="cls">str</span>) -> <span class="cls">list</span>[<span class="cls">float</span>]:
    resp = <span class="kw">await</span> client.embeddings.create(
        model=<span class="str">"text-embedding-3-small"</span>, input=text)
    <span class="kw">return</span> resp.data[<span class="num">0</span>].embedding

<span class="kw">async def</span> <span class="fn">process_batch</span>(texts: list[<span class="cls">str</span>]) -> list:
    <span class="cm"># Process up to 20 concurrently to respect rate limits</span>
    semaphore = asyncio.Semaphore(<span class="num">20</span>)
    <span class="kw">async def</span> <span class="fn">limited_embed</span>(text):
        <span class="kw">async with</span> semaphore:
            <span class="kw">return await</span> embed_text(text)
    <span class="kw">return await</span> asyncio.gather(*[limited_embed(t) <span class="kw">for</span> t <span class="kw">in</span> texts])</code></pre>
<h2>Context Managers for Resource Safety</h2>
<pre><code><span class="kw">from</span> contextlib <span class="kw">import</span> asynccontextmanager
<span class="kw">from</span> fastapi <span class="kw">import</span> FastAPI

<span class="dec">@asynccontextmanager</span>
<span class="kw">async def</span> <span class="fn">lifespan</span>(app: <span class="cls">FastAPI</span>):
    <span class="cm"># Startup: initialize connections</span>
    app.state.db = <span class="kw">await</span> init_db()
    app.state.vectorstore = <span class="kw">await</span> init_qdrant()
    app.state.redis = <span class="kw">await</span> init_redis()
    <span class="kw">yield</span>
    <span class="cm"># Shutdown: clean up</span>
    <span class="kw">await</span> app.state.db.close()
    <span class="kw">await</span> app.state.redis.close()

app = FastAPI(lifespan=lifespan)</code></pre>
<h2>Error Handling + Retry</h2>
<pre><code><span class="kw">import</span> tenacity

<span class="dec">@tenacity.retry(</span>
    wait=tenacity.wait_exponential(min=<span class="num">1</span>, max=<span class="num">60</span>),
    stop=tenacity.stop_after_attempt(<span class="num">5</span>),
    retry=tenacity.retry_if_exception_type((<span class="cls">RateLimitError</span>, <span class="cls">APITimeoutError</span>)),
    before_sleep=tenacity.before_sleep_log(logger, logging.WARNING)
)
<span class="kw">async def</span> <span class="fn">call_llm_with_retry</span>(messages: list) -> <span class="cls">str</span>:
    resp = <span class="kw">await</span> client.chat.completions.create(
        model=<span class="str">"gpt-4o"</span>, messages=messages, timeout=<span class="num">30</span>)
    <span class="kw">return</span> resp.choices[<span class="num">0</span>].message.content</code></pre>
<h2>Dataclasses vs Pydantic vs TypedDict</h2>
<table><tr><th>Type</th><th>Validation</th><th>Serialization</th><th>Use When</th></tr>
<tr><td>TypedDict</td><td>❌</td><td>❌</td><td>Type hints only, zero overhead</td></tr>
<tr><td>@dataclass</td><td>❌</td><td>Limited</td><td>Simple internal data</td></tr>
<tr><td>Pydantic</td><td>✅ Runtime</td><td>✅ JSON</td><td>API request/response, config</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Production Python Rules</div><p class="box-text">Always type-hint functions. Use Pydantic for all API schemas — free validation + OpenAPI docs. Async everything that calls external APIs. Retry with exponential backoff (tenacity) for all LLM calls — rate limits are inevitable. Use structlog over print(). Virtual envs per project, pinned deps in requirements.txt.</p></div></div>`
},

"numpy-pandas": {id:"numpy-pandas",title:"NumPy & Pandas for AI",cat:"Python for AI",level:"Beginner",time:"35 min",
content:`<h2>NumPy & Pandas for AI</h2>
<p>NumPy and Pandas are the foundation of every Python ML pipeline. As an AI Architect you use them for data exploration, feature engineering, embedding manipulation, and evaluation pipelines.</p>
<h2>NumPy Essentials</h2>
<pre><code><span class="kw">import</span> numpy <span class="kw">as</span> np

<span class="cm"># Embedding math — the core of vector search</span>
emb1 = np.random.rand(<span class="num">1536</span>).astype(np.float32)  <span class="cm"># OpenAI embedding</span>
emb2 = np.random.rand(<span class="num">1536</span>).astype(np.float32)

<span class="cm"># Cosine similarity (used in vector DBs)</span>
cos_sim = np.dot(emb1, emb2) / (np.linalg.norm(emb1) * np.linalg.norm(emb2))

<span class="cm"># Batch cosine similarity — retrieve top-k from matrix</span>
doc_embeddings = np.random.rand(<span class="num">10000</span>, <span class="num">1536</span>).astype(np.float32)
query_emb = np.random.rand(<span class="num">1536</span>).astype(np.float32)

norms = np.linalg.norm(doc_embeddings, axis=<span class="num">1</span>, keepdims=<span class="kw">True</span>)
normed_docs = doc_embeddings / norms
normed_query = query_emb / np.linalg.norm(query_emb)
scores = normed_docs @ normed_query  <span class="cm"># shape (10000,)</span>
top5_idx = np.argsort(scores)[::-<span class="num">1</span>][:<span class="num">5</span>]
print(<span class="str">"Top 5 doc indices:"</span>, top5_idx, <span class="str">"Scores:"</span>, scores[top5_idx].round(<span class="num">3</span>))</code></pre>
<h2>Pandas for Data Prep</h2>
<pre><code><span class="kw">import</span> pandas <span class="kw">as</span> pd

df = pd.read_csv(<span class="str">"customer_data.csv"</span>)

<span class="cm"># Explore</span>
print(df.info())             <span class="cm"># types and nulls</span>
print(df.describe())         <span class="cm"># stats</span>
print(df.isnull().sum())     <span class="cm"># null counts per column</span>

<span class="cm"># Clean</span>
df[<span class="str">"age"</span>] = df[<span class="str">"age"</span>].fillna(df[<span class="str">"age"</span>].median())
df = df.dropna(subset=[<span class="str">"email"</span>])
df[<span class="str">"revenue"</span>] = pd.to_numeric(df[<span class="str">"revenue"</span>], errors=<span class="str">"coerce"</span>)

<span class="cm"># Feature engineering</span>
df[<span class="str">"revenue_log"</span>] = np.log1p(df[<span class="str">"revenue"</span>])  <span class="cm"># log-transform skewed data</span>
df[<span class="str">"tenure_bucket"</span>] = pd.cut(df[<span class="str">"tenure_days"</span>],
    bins=[<span class="num">0</span>,<span class="num">30</span>,<span class="num">90</span>,<span class="num">365</span>,<span class="num">9999</span>], labels=[<span class="str">"New"</span>,<span class="str">"Active"</span>,<span class="str">"Loyal"</span>,<span class="str">"Champion"</span>])
df[<span class="str">"is_high_value"</span>] = (df[<span class="str">"revenue"</span>] > df[<span class="str">"revenue"</span>].quantile(<span class="num">0.9</span>)).astype(int)</code></pre>
<h2>RAG Evaluation with Pandas</h2>
<pre><code><span class="cm"># Track RAGAS metrics over time in a DataFrame</span>
eval_runs = []
<span class="kw">for</span> q, answer, context, ground_truth <span class="kw">in</span> test_set:
    eval_runs.append({
        <span class="str">"question"</span>: q,
        <span class="str">"faithfulness"</span>: score_faithfulness(answer, context),
        <span class="str">"relevancy"</span>: score_relevancy(answer, q),
        <span class="str">"latency_ms"</span>: measure_latency(q),
        <span class="str">"cost_usd"</span>: measure_cost(q)
    })
df_eval = pd.DataFrame(eval_runs)
print(df_eval.describe())  <span class="cm"># min, mean, max per metric</span>
df_eval.groupby(df_eval.index // <span class="num">10</span>)[<span class="str">"faithfulness"</span>].mean().plot()  <span class="cm"># trend</span>

<span class="cm"># Flag regressions</span>
regressions = df_eval[df_eval[<span class="str">"faithfulness"</span>] &lt; <span class="num">0.80</span>]
print(f<span class="str">"⚠️ {len(regressions)} questions below faithfulness threshold"</span>)</code></pre>
<h2>Common Patterns</h2>
<table><tr><th>Pattern</th><th>Pandas Code</th></tr>
<tr><td>Group aggregation</td><td>df.groupby("tier")["revenue"].agg(["mean","sum","count"])</td></tr>
<tr><td>Pivot table</td><td>df.pivot_table(values="sales", index="region", columns="quarter")</td></tr>
<tr><td>Time series resample</td><td>df.resample("W", on="date")["events"].sum()</td></tr>
<tr><td>Merge datasets</td><td>pd.merge(orders, customers, on="customer_id", how="left")</td></tr>
<tr><td>Apply LLM to rows</td><td>df["summary"] = df["text"].apply(lambda t: llm.invoke(t))</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Performance at Scale</div><p class="box-text">For DataFrames over 1M rows: use polars (10x faster than pandas). For embedding matrix operations over 100K vectors: use FAISS (GPU-accelerated ANN). Apply LLM to DataFrame rows with df.parallel_apply() (pandarallel) to parallelize API calls 4-8x. Always profile with df.memory_usage(deep=True) before loading large files.</p></div></div>`
},

"ml-intro": {id:"ml-intro",title:"Machine Learning Overview",cat:"Machine Learning",level:"Beginner",time:"25 min",
content:`<h2>Machine Learning Overview</h2>
<p>Machine Learning enables systems to learn patterns from data without explicit programming. As an AI Architect, you must know which approach applies when — and when traditional ML beats LLMs.</p>
<h2>ML Categories</h2>
<table><tr><th>Category</th><th>Learns From</th><th>Algorithms</th><th>Use Cases</th></tr>
<tr><td>Supervised</td><td>Labeled pairs (X → y)</td><td>XGBoost, Random Forest, Neural Net</td><td>Classification, regression, prediction</td></tr>
<tr><td>Unsupervised</td><td>Unlabeled data patterns</td><td>K-Means, PCA, DBSCAN, Autoencoders</td><td>Clustering, anomaly detection</td></tr>
<tr><td>Reinforcement</td><td>Rewards and penalties</td><td>PPO, DQN, SAC</td><td>Game AI, robotics, RLHF</td></tr>
<tr><td>Self-supervised</td><td>Labels derived from data</td><td>BERT (masked LM), GPT (next token)</td><td>LLM pre-training, embeddings</td></tr></table>
<h2>Standard ML Workflow</h2>
<pre><code><span class="kw">import</span> pandas <span class="kw">as</span> pd
<span class="kw">from</span> sklearn.model_selection <span class="kw">import</span> train_test_split, RandomizedSearchCV
<span class="kw">from</span> sklearn.ensemble <span class="kw">import</span> RandomForestClassifier
<span class="kw">from</span> sklearn.pipeline <span class="kw">import</span> Pipeline
<span class="kw">from</span> sklearn.preprocessing <span class="kw">import</span> StandardScaler
<span class="kw">from</span> sklearn.metrics <span class="kw">import</span> classification_report

X, y = df.drop(<span class="str">"target"</span>, axis=<span class="num">1</span>), df[<span class="str">"target"</span>]
X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=<span class="num">0.2</span>, random_state=<span class="num">42</span>)

pipeline = Pipeline([
    (<span class="str">"scaler"</span>, StandardScaler()),
    (<span class="str">"clf"</span>, RandomForestClassifier(n_estimators=<span class="num">100</span>, random_state=<span class="num">42</span>))
])
pipeline.fit(X_train, y_train)
print(classification_report(y_test, pipeline.predict(X_test)))</code></pre>
<h2>Hyperparameter Tuning</h2>
<pre><code>search = RandomizedSearchCV(pipeline, {
    <span class="str">"clf__n_estimators"</span>: [<span class="num">100</span>, <span class="num">200</span>, <span class="num">300</span>],
    <span class="str">"clf__max_depth"</span>: [<span class="kw">None</span>, <span class="num">5</span>, <span class="num">10</span>],
    <span class="str">"clf__min_samples_leaf"</span>: [<span class="num">1</span>, <span class="num">5</span>, <span class="num">10</span>]
}, n_iter=<span class="num">20</span>, cv=<span class="num">5</span>, scoring=<span class="str">"f1_macro"</span>, n_jobs=-<span class="num">1</span>)
search.fit(X_train, y_train)
print(<span class="str">"Best F1:"</span>, round(search.best_score_, <span class="num">3</span>), <span class="str">"Params:"</span>, search.best_params_)</code></pre>
<h2>Algorithm Cheat Sheet</h2>
<table><tr><th>Algorithm</th><th>Strengths</th><th>Weaknesses</th><th>When</th></tr>
<tr><td>Logistic Regression</td><td>Interpretable, fast, probabilistic</td><td>Linear boundaries only</td><td>Baseline + feature importance</td></tr>
<tr><td>Random Forest</td><td>Robust, handles missing data</td><td>Slow at large scale</td><td>Tabular data, general purpose</td></tr>
<tr><td>XGBoost / LightGBM</td><td>Best tabular performance</td><td>Hyperparameter tuning needed</td><td>Structured data, competitions</td></tr>
<tr><td>K-Means</td><td>Fast, simple</td><td>Must pick K, spherical clusters</td><td>Customer segmentation</td></tr>
<tr><td>Isolation Forest</td><td>Anomaly detection without labels</td><td>Hard to interpret</td><td>Fraud detection, outliers</td></tr>
<tr><td>SVMs</td><td>Effective in high dimensions</td><td>Slow on large datasets</td><td>Small datasets, text classification</td></tr></table>
<h2>ML vs LLMs Decision</h2>
<table><tr><th>Task</th><th>ML</th><th>LLM</th></tr>
<tr><td>Structured tabular data</td><td>✅ XGBoost always</td><td>❌ Overkill</td></tr>
<tr><td>Simple text classification</td><td>✅ Fine-tuned BERT</td><td>✅ GPT-4o-mini (easier)</td></tr>
<tr><td>Q&A over documents</td><td>❌ Not possible</td><td>✅ RAG</td></tr>
<tr><td>Time series forecast</td><td>✅ LightGBM / Prophet</td><td>❌ Not suited</td></tr>
<tr><td>Fraud detection</td><td>✅ Isolation Forest</td><td>✅ LLM for explanation</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Start Simple, Always Baseline</div><p class="box-text">Start with logistic regression before neural networks. XGBoost on tabular data at 99% effort beats a transformer at 100% effort. LLMs are expensive — for pure classification on structured data, traditional ML is often 100x cheaper with similar accuracy. Profile first, over-engineer never.</p></div></div>`
},

"model-evaluation": {id:"model-evaluation",title:"Model Evaluation Metrics",cat:"Machine Learning",level:"Intermediate",time:"30 min",
content:`<h2>Model Evaluation</h2>
<p>Rigorous evaluation separates reliable production AI from demo-ware. Evaluation must cover retrieval quality, generation quality, and operational metrics — and run automatically in CI/CD.</p>
<h2>Evaluation Dimensions</h2>
<table><tr><th>Dimension</th><th>Metric</th><th>Tool</th><th>Threshold</th></tr>
<tr><td>Retrieval accuracy</td><td>Context precision, recall</td><td>RAGAS</td><td>&gt;0.75</td></tr>
<tr><td>Answer faithfulness</td><td>Is answer grounded in context?</td><td>RAGAS</td><td>&gt;0.85</td></tr>
<tr><td>Answer relevancy</td><td>Is it on-topic?</td><td>RAGAS</td><td>&gt;0.80</td></tr>
<tr><td>Correctness</td><td>Matches ground truth</td><td>RAGAS, human</td><td>&gt;0.75</td></tr>
<tr><td>Latency</td><td>P50, P95, P99 ms</td><td>LangFuse</td><td>P99 &lt;3000ms</td></tr>
<tr><td>Cost</td><td>$ per query</td><td>LangFuse</td><td>&lt;$0.02</td></tr>
<tr><td>Safety</td><td>Toxicity, PII leakage</td><td>Guardrails</td><td>0 violations</td></tr></table>
<h2>RAGAS Automated Evaluation</h2>
<pre><code><span class="kw">from</span> ragas <span class="kw">import</span> evaluate
<span class="kw">from</span> ragas.metrics <span class="kw">import</span> faithfulness, answer_relevancy, context_precision, context_recall
<span class="kw">from</span> datasets <span class="kw">import</span> Dataset

golden = Dataset.from_list([
    {<span class="str">"question"</span>: <span class="str">"What is the refund window?"</span>,
     <span class="str">"answer"</span>: rag_system.query(<span class="str">"What is the refund window?"</span>),
     <span class="str">"contexts"</span>: retrieve(<span class="str">"What is the refund window?"</span>),
     <span class="str">"ground_truth"</span>: <span class="str">"30 days from purchase"</span>}
])
result = evaluate(golden, metrics=[faithfulness, answer_relevancy,
                                    context_precision, context_recall])
df = result.to_pandas()
print(df[[<span class="str">"faithfulness"</span>,<span class="str">"answer_relevancy"</span>,<span class="str">"context_precision"</span>,<span class="str">"context_recall"</span>]])</code></pre>
<h2>Retrieval-Specific Metrics</h2>
<pre><code><span class="kw">def</span> <span class="fn">precision_at_k</span>(relevant: set, retrieved: list, k: <span class="cls">int</span>) -> <span class="cls">float</span>:
    <span class="str">"""Fraction of top-k results that are relevant."""</span>
    top_k = set(retrieved[:k])
    <span class="kw">return</span> len(top_k & relevant) / k

<span class="kw">def</span> <span class="fn">recall_at_k</span>(relevant: set, retrieved: list, k: <span class="cls">int</span>) -> <span class="cls">float</span>:
    <span class="str">"""Fraction of relevant docs retrieved in top-k."""</span>
    top_k = set(retrieved[:k])
    <span class="kw">return</span> len(top_k & relevant) / len(relevant) <span class="kw">if</span> relevant <span class="kw">else</span> <span class="num">0</span>

<span class="kw">def</span> <span class="fn">mrr</span>(relevant: set, retrieved: list) -> <span class="cls">float</span>:
    <span class="str">"""Mean Reciprocal Rank — rewards finding relevant docs early."""</span>
    <span class="kw">for</span> i, doc <span class="kw">in</span> enumerate(retrieved, start=<span class="num">1</span>):
        <span class="kw">if</span> doc <span class="kw">in</span> relevant: <span class="kw">return</span> <span class="num">1</span> / i
    <span class="kw">return</span> <span class="num">0</span>

<span class="cm"># Run across test set</span>
results = [precision_at_k(r, q_results, <span class="num">5</span>) <span class="kw">for</span> r, q_results <span class="kw">in</span> test_set]
print(f<span class="str">"MAP@5: {sum(results)/len(results):.3f}"</span>)</code></pre>
<h2>Continuous Evaluation in CI</h2>
<pre><code><span class="cm"># eval.py — run in GitHub Actions on every PR</span>
<span class="kw">import</span> sys
THRESHOLDS = {<span class="str">"faithfulness"</span>:<span class="num">0.85</span>, <span class="str">"answer_relevancy"</span>:<span class="num">0.80</span>,
              <span class="str">"context_precision"</span>:<span class="num">0.75</span>}

results = run_ragas_eval()
failed = [k <span class="kw">for</span> k,v <span class="kw">in</span> THRESHOLDS.items() <span class="kw">if</span> results[k] &lt; v]
<span class="kw">if</span> failed:
    print(f<span class="str">"❌ EVAL FAILED: {failed}"</span>)
    sys.exit(<span class="num">1</span>)  <span class="cm"># Blocks merge</span>
print(<span class="str">"✅ All eval metrics passing"</span>)</code></pre>
<h2>Human Evaluation</h2>
<table><tr><th>Signal</th><th>Collection Method</th><th>How to Use</th></tr>
<tr><td>Thumbs up/down</td><td>UI button on every response</td><td>Flag low-rated answers for review</td></tr>
<tr><td>Copy rate</td><td>Track answer copy events</td><td>High copy = answer is actually useful</td></tr>
<tr><td>Follow-up questions</td><td>Conversation logs</td><td>Many follow-ups = incomplete answer</td></tr>
<tr><td>Expert review</td><td>Weekly sample of 20 random answers</td><td>Catch systematic errors RAGAS misses</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Eval-Driven Development</div><p class="box-text">Start with a 50-question golden set before building anything. Run RAGAS on it as your baseline. Every improvement (new chunking, better prompt, reranker) must move at least one metric without dropping others. Production: RAGAS in CI + LangFuse for live monitoring + weekly human review. Never ship a RAG change without running evals first.</p></div></div>`
},

"deep-learning": {id:"deep-learning",title:"Deep Learning & Neural Networks",cat:"Deep Learning",level:"Intermediate",time:"40 min",
content:`<h2>Deep Learning for AI Architects</h2>
<p>Deep learning is the foundation beneath all LLMs. Architects need enough understanding to make good infrastructure decisions, debug training failures, and evaluate model capabilities honestly.</p>
<h2>Core Building Blocks</h2>
<table><tr><th>Layer Type</th><th>Operation</th><th>Use Case</th></tr>
<tr><td>Linear/Dense</td><td>y = Wx + b</td><td>Any transformation, FFN in transformers</td></tr>
<tr><td>Activation (ReLU/GeLU)</td><td>max(0, x)</td><td>Nonlinearity between layers</td></tr>
<tr><td>Attention</td><td>softmax(QK^T/√d)V</td><td>Token relationships in transformers</td></tr>
<tr><td>Layer Norm</td><td>Normalize per-layer</td><td>Training stability in transformers</td></tr>
<tr><td>Embedding</td><td>Integer → vector</td><td>Token and position representation</td></tr>
<tr><td>Dropout</td><td>Zero p% of neurons</td><td>Regularization to prevent overfitting</td></tr></table>
<h2>Neural Net from Scratch</h2>
<pre><code><span class="kw">import</span> torch
<span class="kw">import</span> torch.nn <span class="kw">as</span> nn

<span class="kw">class</span> <span class="cls">TextClassifier</span>(nn.Module):
    <span class="kw">def</span> <span class="fn">__init__</span>(self, vocab_size=<span class="num">30000</span>, embed_dim=<span class="num">128</span>, num_classes=<span class="num">5</span>):
        <span class="kw">super</span>().__init__()
        self.embed = nn.Embedding(vocab_size, embed_dim, padding_idx=<span class="num">0</span>)
        self.fc = nn.Sequential(
            nn.Linear(embed_dim, <span class="num">256</span>), nn.ReLU(), nn.Dropout(<span class="num">0.3</span>),
            nn.Linear(<span class="num">256</span>, num_classes))

    <span class="kw">def</span> <span class="fn">forward</span>(self, x):  <span class="cm"># x: (batch, seq_len) token IDs</span>
        emb = self.embed(x).mean(dim=<span class="num">1</span>)  <span class="cm"># mean pooling</span>
        <span class="kw">return</span> self.fc(emb)

model = TextClassifier()
optimizer = torch.optim.AdamW(model.parameters(), lr=<span class="num">3e-4</span>)
loss_fn = nn.CrossEntropyLoss()

<span class="kw">for</span> epoch <span class="kw">in</span> range(<span class="num">10</span>):
    <span class="kw">for</span> X_batch, y_batch <span class="kw">in</span> train_loader:
        logits = model(X_batch)
        loss = loss_fn(logits, y_batch)
        optimizer.zero_grad(); loss.backward(); optimizer.step()
    print(f<span class="str">"Epoch {epoch}: loss={loss.item():.4f}"</span>)</code></pre>
<h2>Transfer Learning Pattern</h2>
<pre><code><span class="kw">from</span> transformers <span class="kw">import</span> AutoModel, AutoTokenizer
<span class="kw">import</span> torch.nn <span class="kw">as</span> nn

<span class="cm"># Fine-tune DistilBERT for text classification</span>
<span class="kw">class</span> <span class="cls">BERTClassifier</span>(nn.Module):
    <span class="kw">def</span> <span class="fn">__init__</span>(self, num_classes=<span class="num">5</span>):
        <span class="kw">super</span>().__init__()
        self.bert = AutoModel.from_pretrained(<span class="str">"distilbert-base-uncased"</span>)
        self.classifier = nn.Linear(<span class="num">768</span>, num_classes)

    <span class="kw">def</span> <span class="fn">forward</span>(self, input_ids, attention_mask):
        out = self.bert(input_ids=input_ids, attention_mask=attention_mask)
        cls_emb = out.last_hidden_state[:, <span class="num">0</span>, :]  <span class="cm"># [CLS] token</span>
        <span class="kw">return</span> self.classifier(cls_emb)

<span class="cm"># Freeze BERT, train only classifier head first</span>
<span class="kw">for</span> param <span class="kw">in</span> model.bert.parameters():
    param.requires_grad = <span class="kw">False</span>  <span class="cm"># freeze backbone</span>
<span class="cm"># After 3 epochs: unfreeze last 2 layers for full fine-tune</span></code></pre>
<h2>Key Hyperparameters</h2>
<table><tr><th>Hyperparameter</th><th>Typical Value</th><th>Effect</th></tr>
<tr><td>Learning rate</td><td>1e-3 (Adam), 2e-5 (BERT fine-tune)</td><td>Too high → diverge, too low → stuck</td></tr>
<tr><td>Batch size</td><td>32-256</td><td>Larger = stable gradients, more GPU RAM</td></tr>
<tr><td>Dropout</td><td>0.1-0.3</td><td>Higher = more regularization</td></tr>
<tr><td>Weight decay</td><td>0.01</td><td>L2 regularization, prevents overfitting</td></tr>
<tr><td>Warmup steps</td><td>10% of total steps</td><td>Prevents large updates early in training</td></tr></table>
<h2>GPU Memory Estimation</h2>
<pre><code><span class="cm"># Rule of thumb: model params × bytes per param × 4 (optimizer states)</span>
<span class="cm"># GPT-4o ~1.76T params — not self-hostable</span>
<span class="cm"># LLaMA 3.1 70B (float16): 70B × 2 = 140GB → 2× A100 80GB</span>
<span class="cm"># LLaMA 3.1 70B (4-bit QLoRA): 70B × 0.5 = 35GB → 1× A100</span>
<span class="cm"># LLaMA 3.1 8B (float16): 8B × 2 = 16GB → 1× A100 40GB</span>
<span class="cm"># Mistral 7B (int4): ~4GB → runs on M1 Mac!</span></code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">When Architects Need Deep Learning</div><p class="box-text">You need deep learning knowledge when: choosing between BERT embeddings vs GPT-4o for classification (BERT is 1000x cheaper for simple classification). Planning GPU infrastructure for self-hosted LLMs. Explaining why a model fails on certain inputs. Evaluating fine-tuning vs RAG (DL knowledge lets you reason about model capabilities). You don't need to implement backpropagation — but understanding layers, parameters, and training dynamics is essential.</p></div></div>`
},

"transformers": {id:"transformers",title:"Transformer Architecture",cat:"Deep Learning",level:"Intermediate",time:"40 min",
content:`<h2>Transformer Architecture</h2>
<p>Transformers are the architectural foundation of all modern LLMs. Understanding how attention works helps you make better architectural decisions: choosing between encoder vs decoder models, understanding context length trade-offs, and debugging generation failures.</p>
<h2>Architecture Overview</h2>
<pre><code><span class="cm">Input: "The cat sat on"</span>
   ↓ Tokenize: [1423, 4822, 9087, 319]
   ↓ Embedding: each token → 768/4096-dim vector
   ↓ Positional Encoding: add position information
   ↓ N × Transformer Blocks:
      ├── Multi-Head Self-Attention (who to focus on)
      ├── Add & Norm (residual connection)
      ├── Feed-Forward Network (transform)
      └── Add & Norm
   ↓ Output Head: vocab logits → softmax → next token
Output: "mat" (highest probability next token)</code></pre>
<h2>Self-Attention — The Key Idea</h2>
<pre><code><span class="kw">import</span> torch
<span class="kw">import</span> torch.nn <span class="kw">as</span> nn
<span class="kw">import</span> math

<span class="kw">def</span> <span class="fn">attention</span>(Q, K, V, mask=<span class="kw">None</span>):
    <span class="cm"># Q: what am I looking for?</span>
    <span class="cm"># K: what do I offer to queries?</span>
    <span class="cm"># V: what information do I carry?</span>
    d_k = Q.size(-<span class="num">1</span>)
    scores = (Q @ K.transpose(-<span class="num">2</span>, -<span class="num">1</span>)) / math.sqrt(d_k)  <span class="cm"># scale</span>
    <span class="kw">if</span> mask <span class="kw">is not None</span>: scores.masked_fill_(mask==<span class="num">0</span>, -<span class="num">1e9</span>)
    weights = torch.softmax(scores, dim=-<span class="num">1</span>)  <span class="cm"># attention distribution</span>
    <span class="kw">return</span> weights @ V  <span class="cm"># weighted sum of values</span>

<span class="cm"># "The cat sat on the mat"</span>
<span class="cm"># When processing "mat", "sat" and "on" get high attention weights</span>
<span class="cm"># because they're most relevant for predicting what follows</span></code></pre>
<h2>Encoder vs Decoder Models</h2>
<table><tr><th>Type</th><th>Attention</th><th>Models</th><th>Use Cases</th></tr>
<tr><td>Encoder (BERT)</td><td>Bidirectional — sees all tokens</td><td>BERT, RoBERTa, DistilBERT</td><td>Classification, embeddings, NER</td></tr>
<tr><td>Decoder (GPT)</td><td>Causal — sees only past tokens</td><td>GPT-4, Claude, LLaMA</td><td>Text generation, LLM inference</td></tr>
<tr><td>Encoder-Decoder (T5)</td><td>Both</td><td>T5, BART, mT5</td><td>Translation, summarization, Q&A</td></tr></table>
<h2>Context Window and KV Cache</h2>
<pre><code><span class="cm"># Context window = max tokens model can "see" at once</span>
<span class="cm"># GPT-4o: 128K tokens (~96,000 words = ~3 books)</span>
<span class="cm"># Gemini 2.0 Pro: 2M tokens (~8 large books)</span>

<span class="cm"># Attention cost scales quadratically with sequence length</span>
<span class="cm"># Attention complexity: O(n²) where n = sequence length</span>
<span class="cm"># 128K context = 128K × 128K = 16 billion attention operations per layer</span>

<span class="cm"># KV Cache: cache key/value for past tokens during generation</span>
<span class="cm"># Without cache: each new token requires full attention over all past tokens</span>
<span class="cm"># With cache: O(1) per new token — only compute attention for NEW token</span>
<span class="cm"># KV cache size: 2 × n_layers × n_heads × head_dim × seq_len × 2 bytes</span>
<span class="cm"># GPT-4o 128K context ≈ 40GB KV cache per inference session</span></code></pre>
<h2>Using HuggingFace Transformers</h2>
<pre><code><span class="kw">from</span> transformers <span class="kw">import</span> AutoTokenizer, AutoModelForSequenceClassification
<span class="kw">import</span> torch

<span class="cm"># Sentiment classification with fine-tuned BERT</span>
tokenizer = AutoTokenizer.from_pretrained(<span class="str">"distilbert-base-uncased-finetuned-sst-2-english"</span>)
model = AutoModelForSequenceClassification.from_pretrained(
    <span class="str">"distilbert-base-uncased-finetuned-sst-2-english"</span>)

<span class="kw">def</span> <span class="fn">classify</span>(text: <span class="cls">str</span>) -> <span class="cls">str</span>:
    inputs = tokenizer(text, return_tensors=<span class="str">"pt"</span>, truncation=<span class="kw">True</span>, max_length=<span class="num">512</span>)
    <span class="kw">with</span> torch.no_grad():
        logits = model(**inputs).logits
    pred = logits.argmax(-<span class="num">1</span>).item()
    <span class="kw">return</span> [<span class="str">"NEGATIVE"</span>,<span class="str">"POSITIVE"</span>][pred]

print(classify(<span class="str">"The RAG system works great!"</span>))  <span class="cm"># POSITIVE</span></code></pre>
<h2>Flash Attention — 4x Faster</h2>
<pre><code><span class="cm"># Flash Attention: memory-efficient attention with IO-aware tiling</span>
<span class="cm"># Standard attention: O(n²) memory. Flash: O(n) — never materializes full matrix</span>
<span class="kw">from</span> transformers <span class="kw">import</span> AutoModelForCausalLM
model = AutoModelForCausalLM.from_pretrained(
    <span class="str">"meta-llama/Meta-Llama-3.1-8B"</span>,
    attn_implementation=<span class="str">"flash_attention_2"</span>,  <span class="cm"># 4x faster, 10x less memory</span>
    torch_dtype=torch.bfloat16, device_map=<span class="str">"auto"</span>)</code></pre>
<div class="box def"><div class="box-ico">🔵</div><div class="box-body"><div class="box-title">Why Architects Need This</div><p class="box-text">Understanding context limits helps you design chunking strategies (fit 4 chunks × 512 tokens in 2048-token window). Quadratic attention cost explains why Gemini's 2M context is expensive. Knowing encoder vs decoder tells you when to use BERT (fast, cheap embedding/classification) vs GPT (generation). Flash Attention selection determines GPU RAM requirements for self-hosted models.</p></div></div>`
},

"llm-intro": {id:"llm-intro",title:"What are Large Language Models?",cat:"LLMs & APIs",level:"Intermediate",time:"30 min",
content:`<h2>What are Large Language Models?</h2>
<p>LLMs are deep neural networks trained on massive text corpora to predict the next token. All intelligence emerges from next-token prediction at scale on trillions of examples.</p>
<h2>Major LLMs (2026)</h2>
<table><tr><th>Model</th><th>Context</th><th>Strengths</th><th>Cost/1M in</th></tr>
<tr><td>GPT-4o</td><td>128K</td><td>Coding, multimodal, speed</td><td>$2.50</td></tr>
<tr><td>Claude 3.7 Sonnet</td><td>200K</td><td>Long docs, analysis, safety</td><td>$3.00</td></tr>
<tr><td>Gemini 2.0 Pro</td><td>2M</td><td>Ultra-long context, video</td><td>$1.25</td></tr>
<tr><td>GPT-4o-mini</td><td>128K</td><td>Fast and cheap</td><td>$0.15</td></tr>
<tr><td>LLaMA 3.1 70B</td><td>128K</td><td>Open weights, self-hostable</td><td>Free</td></tr>
<tr><td>Mistral Large</td><td>128K</td><td>EU data residency</td><td>$2.00</td></tr></table>
<h2>Key Inference Parameters</h2>
<table><tr><th>Parameter</th><th>Effect</th><th>Production Value</th></tr>
<tr><td>temperature</td><td>Randomness of sampling</td><td>0 for RAG/extraction; 0.7 for creative</td></tr>
<tr><td>max_tokens</td><td>Max output length</td><td>Set based on expected response size</td></tr>
<tr><td>top_p</td><td>Nucleus sampling cutoff</td><td>0.9 (alternative to temperature)</td></tr>
<tr><td>seed</td><td>Reproducible outputs</td><td>42 for deterministic testing</td></tr></table>
<h2>Basic API Call</h2>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> OpenAI
client = OpenAI()

response = client.chat.completions.create(
    model=<span class="str">"gpt-4o"</span>, temperature=<span class="num">0</span>,
    messages=[
        {<span class="str">"role"</span>:<span class="str">"system"</span>,<span class="str">"content"</span>:<span class="str">"You are an AI architect assistant."</span>},
        {<span class="str">"role"</span>:<span class="str">"user"</span>,  <span class="str">"content"</span>:<span class="str">"Explain RAG vs fine-tuning in 3 points."</span>}
    ],
    max_tokens=<span class="num">400</span>
)
print(response.choices[<span class="num">0</span>].message.content)
cost = response.usage.total_tokens * <span class="num">0.0000025</span>
print(f<span class="str">"Cost: \${cost:.4f}"</span>)</code></pre>
<h2>LLM Training Stages</h2>
<table><tr><th>Stage</th><th>What Happens</th><th>Data</th></tr>
<tr><td>Pre-training</td><td>Next-token prediction on massive corpus</td><td>1-15 trillion tokens</td></tr>
<tr><td>SFT</td><td>Train on instruction-response pairs</td><td>Millions of curated Q&A</td></tr>
<tr><td>RLHF</td><td>Optimize for human preference via RL</td><td>Human rankings of outputs</td></tr>
<tr><td>RLAIF</td><td>AI-generated preference data (Constitutional AI)</td><td>AI vs AI debates</td></tr></table>
<h2>Cost Estimation</h2>
<pre><code><span class="cm"># 1 token = ~0.75 words = ~4 chars. 1 page = 500-700 tokens.</span>
<span class="cm"># 10,000 RAG queries/day on GPT-4o:</span>
<span class="cm">#   Input: 1500t x $2.50/1M = $0.00375/query</span>
<span class="cm">#   Output: 300t x $10/1M   = $0.003/query</span>
<span class="cm">#   Total: ~$68/day</span>
<span class="cm"># Routing 60% to GPT-4o-mini: ~$25/day (63% saving)</span></code></pre>
<h2>Model Selection Framework</h2>
<pre><code><span class="kw">def</span> <span class="fn">select_model</span>(task: <span class="cls">str</span>) -> <span class="cls">str</span>:
    <span class="kw">return</span> {
        <span class="str">"extraction"</span>:  <span class="str">"gpt-4o-mini"</span>,   <span class="cm"># 17x cheaper</span>
        <span class="str">"reasoning"</span>:   <span class="str">"o3"</span>,             <span class="cm"># best reasoning</span>
        <span class="str">"long_doc"</span>:    <span class="str">"gemini-2.0-pro"</span>, <span class="cm"># 2M context</span>
        <span class="str">"on_premise"</span>:  <span class="str">"llama3.1-70b"</span>,  <span class="cm"># self-hosted Ollama</span>
        <span class="str">"eu_data"</span>:     <span class="str">"mistral-large"</span>, <span class="cm"># EU residency</span>
    }.get(task, <span class="str">"gpt-4o"</span>)</code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Architect Decision Framework</div><p class="box-text">Prototype with GPT-4o. Profile query types. Route simple queries to GPT-4o-mini — 17x cheaper. Use Claude for 100K+ token docs. Self-hosted LLaMA for regulated industries (banking, healthcare). Never pick a model without benchmarking on YOUR actual data — leaderboards are misleading.</p></div></div>`
},

"openai-api": {id:"openai-api",title:"OpenAI API Integration",cat:"LLMs & APIs",level:"Intermediate",time:"35 min",
content:`<h2>OpenAI API Deep Dive</h2>
<p>The OpenAI API is the most widely used LLM API in production. Mastering its full surface — structured outputs, function calling, vision, streaming, batch API — is essential for AI Architects.</p>
<h2>Structured Outputs (JSON Mode)</h2>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> OpenAI
<span class="kw">from</span> pydantic <span class="kw">import</span> BaseModel
<span class="kw">from</span> typing <span class="kw">import</span> List

client = OpenAI()

<span class="kw">class</span> <span class="cls">ExtractedOrder</span>(BaseModel):
    order_ids: List[<span class="cls">str</span>]
    total_value: <span class="cls">float</span>
    currency: <span class="cls">str</span>
    customer_name: <span class="cls">str</span>

<span class="cm"># Guaranteed JSON matching the schema — no hallucinated fields</span>
resp = client.beta.chat.completions.parse(
    model=<span class="str">"gpt-4o"</span>, temperature=<span class="num">0</span>,
    messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:<span class="str">"Extract: Alice ordered items ORD-1 and ORD-2 for $149.99 USD"</span>}],
    response_format=ExtractedOrder)
order = resp.choices[<span class="num">0</span>].message.parsed
print(order.order_ids, order.total_value)</code></pre>
<h2>Vision API — Document Understanding</h2>
<pre><code><span class="kw">import</span> base64
<span class="kw">from</span> pathlib <span class="kw">import</span> Path

<span class="kw">def</span> <span class="fn">analyze_image</span>(image_path: <span class="cls">str</span>, question: <span class="cls">str</span>) -> <span class="cls">str</span>:
    img_b64 = base64.b64encode(Path(image_path).read_bytes()).decode()
    ext = image_path.split(<span class="str">"."</span>)[-<span class="num">1</span>].lower()
    resp = client.chat.completions.create(model=<span class="str">"gpt-4o"</span>, messages=[{
        <span class="str">"role"</span>: <span class="str">"user"</span>,
        <span class="str">"content"</span>: [
            {<span class="str">"type"</span>:<span class="str">"image_url"</span>,<span class="str">"image_url"</span>:{<span class="str">"url"</span>:f<span class="str">"data:image/{ext};base64,{img_b64}"</span>,<span class="str">"detail"</span>:<span class="str">"high"</span>}},
            {<span class="str">"type"</span>:<span class="str">"text"</span>,<span class="str">"text"</span>:question}
        ]
    }])
    <span class="kw">return</span> resp.choices[<span class="num">0</span>].message.content

<span class="cm"># Use case: extract table data from PDF screenshot</span>
data = analyze_image(<span class="str">"invoice.png"</span>, <span class="str">"Extract all line items as JSON with name, qty, price"</span>)</code></pre>
<h2>Streaming Responses</h2>
<pre><code><span class="cm"># Stream tokens as they're generated — essential for UX</span>
<span class="kw">from</span> fastapi import FastAPI
<span class="kw">from</span> fastapi.responses <span class="kw">import</span> StreamingResponse

<span class="kw">async def</span> <span class="fn">stream_response</span>(question: <span class="cls">str</span>):
    stream = <span class="kw">await</span> client.chat.completions.create(
        model=<span class="str">"gpt-4o"</span>, stream=<span class="kw">True</span>,
        messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:question}])
    <span class="kw">async for</span> chunk <span class="kw">in</span> stream:
        delta = chunk.choices[<span class="num">0</span>].delta.content <span class="kw">or</span> <span class="str">""</span>
        <span class="kw">if</span> delta: <span class="kw">yield</span> f<span class="str">"data: {delta}\n\n"</span>

<span class="dec">@app.get("/stream")</span>
<span class="kw">async def</span> <span class="fn">stream_endpoint</span>(q: <span class="cls">str</span>):
    <span class="kw">return</span> StreamingResponse(stream_response(q), media_type=<span class="str">"text/event-stream"</span>)</code></pre>
<h2>Batch API (50% Cost Savings)</h2>
<pre><code><span class="cm"># Process 10,000+ requests at 50% off — async 24h turnaround</span>
<span class="kw">import</span> json

requests = [
    {<span class="str">"custom_id"</span>: f<span class="str">"req-{i}"</span>,
     <span class="str">"method"</span>: <span class="str">"POST"</span>, <span class="str">"url"</span>: <span class="str">"/v1/chat/completions"</span>,
     <span class="str">"body"</span>: {<span class="str">"model"</span>:<span class="str">"gpt-4o"</span>, <span class="str">"messages"</span>:[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:q}]}}
    <span class="kw">for</span> i, q <span class="kw">in</span> enumerate(questions)
]
<span class="kw">with</span> open(<span class="str">"batch.jsonl"</span>, <span class="str">"w"</span>) <span class="kw">as</span> f:
    <span class="kw">for</span> r <span class="kw">in</span> requests: f.write(json.dumps(r) + <span class="str">"\n"</span>)

batch_file = client.files.create(file=open(<span class="str">"batch.jsonl"</span>,<span class="str">"rb"</span>), purpose=<span class="str">"batch"</span>)
batch = client.batches.create(input_file_id=batch_file.id,
    endpoint=<span class="str">"/v1/chat/completions"</span>, completion_window=<span class="str">"24h"</span>)
print(f<span class="str">"Batch ID: {batch.id}"</span>)  <span class="cm"># Poll until status == "completed"</span></code></pre>
<h2>Model Cost Summary</h2>
<table><tr><th>Model</th><th>Input $/1M</th><th>Output $/1M</th><th>Best For</th></tr>
<tr><td>gpt-4o</td><td>$2.50</td><td>$10.00</td><td>Complex reasoning, vision</td></tr>
<tr><td>gpt-4o-mini</td><td>$0.15</td><td>$0.60</td><td>Simple extraction, classification</td></tr>
<tr><td>o3-mini</td><td>$1.10</td><td>$4.40</td><td>Multi-step reasoning (STEM)</td></tr>
<tr><td>text-embedding-3-small</td><td>$0.02</td><td>—</td><td>RAG embeddings (production standard)</td></tr>
<tr><td>text-embedding-3-large</td><td>$0.13</td><td>—</td><td>High-precision retrieval</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Cost Optimization Playbook</div><p class="box-text">1. Route simple tasks to gpt-4o-mini (17x cheaper). 2. Use Batch API for offline processing (50% off). 3. Cache embeddings in Redis (embedding = 100% of cost for repeated queries). 4. Set max_tokens tight — you pay for output. 5. Use structured outputs — removes parsing retries. 6. Log every token with LangFuse to find expensive outlier queries.</p></div></div>`
},
"prompt-engineering": {id:"prompt-engineering",title:"Prompt Engineering",cat:"Prompt Engineering",level:"Intermediate",time:"35 min",
content:`<h2>Prompt Engineering</h2>
<p>Prompt engineering is the discipline of crafting LLM inputs to get reliable, accurate outputs. It's the highest ROI skill for AI Architects — better prompts improve accuracy without increasing cost.</p>
<h2>Core Principles</h2>
<table><tr><th>Principle</th><th>Bad</th><th>Good</th></tr>
<tr><td>Be specific</td><td>"Write a summary"</td><td>"Summarize in 3 bullet points, max 20 words each"</td></tr>
<tr><td>Give role/persona</td><td>No system prompt</td><td>"You are an expert legal analyst..."</td></tr>
<tr><td>Show examples</td><td>Describe format in words</td><td>Show 2-3 concrete input→output examples</td></tr>
<tr><td>Constrain scope</td><td>"Answer questions"</td><td>"Answer ONLY from the provided context"</td></tr>
<tr><td>Request reasoning</td><td>"What is the answer?"</td><td>"Think step by step, then give your answer"</td></tr></table>
<h2>Structured System Prompt Template</h2>
<pre><code>SYSTEM = <span class="str">"""You are a {role} at {company}.

TASK: {specific_task}

RULES:
1. Answer ONLY from the provided context. If the answer is not in the context, say "I don't know based on the available information."
2. Always cite your source: [Source: filename, page N]
3. Be concise — 3-5 sentences maximum unless asked for more
4. Never make up information or extrapolate beyond what is stated

OUTPUT FORMAT:
Answer: {answer_here}
Source: {source_citation}
Confidence: High/Medium/Low"""</span></code></pre>
<h2>Chain of Thought (CoT)</h2>
<pre><code><span class="kw">def</span> <span class="fn">cot_prompt</span>(question: <span class="cls">str</span>) -> <span class="cls">str</span>:
    <span class="kw">return</span> f<span class="str">"""You are an expert AI architect. Solve this step by step.

Question: {question}

Step 1: Identify the key requirements
Step 2: Consider the relevant trade-offs  
Step 3: Recommend the best approach with justification
Step 4: Provide a concrete implementation outline

Begin your analysis:"""</span>

<span class="cm"># CoT improves accuracy on complex reasoning by 30-50%</span>
<span class="cm"># "Let's think step by step" = 20% improvement on math benchmarks</span></code></pre>
<h2>Few-Shot Examples</h2>
<pre><code>FEW_SHOT = <span class="str">"""Extract the main action items from this meeting note.

Example 1:
Input: "John will send the report by Friday. Sarah needs to review the contract."
Output: ["John: Send report by Friday", "Sarah: Review contract"]

Example 2:  
Input: "We decided to postpone the launch. Alex to inform stakeholders by EOD."
Output: ["Alex: Inform stakeholders by EOD"]

Now extract from:
Input: {user_input}
Output:"""</span>

<span class="cm"># 3-5 examples dramatically improves format adherence</span>
<span class="cm"># Especially useful for structured extraction tasks</span></code></pre>
<h2>Meta-Prompt Pattern</h2>
<pre><code><span class="kw">def</span> <span class="fn">optimize_prompt</span>(base_prompt: <span class="cls">str</span>, failures: list[<span class="cls">str</span>]) -> <span class="cls">str</span>:
    <span class="str">"""Use GPT-4 to improve its own prompt."""</span>
    optimizer = f<span class="str">"""You are an expert prompt engineer. 
Improve this prompt to fix the following failure cases:

CURRENT PROMPT:
{base_prompt}

FAILURE CASES (these give wrong outputs):
{chr(10).join(f"- {f}" for f in failures)}

IMPROVED PROMPT:"""</span>
    <span class="kw">return</span> client.chat.completions.create(model=<span class="str">"gpt-4o"</span>,
        messages=[{<span class="str">"role"</span>:<span class="str">"user"</span>,<span class="str">"content"</span>:optimizer}]).choices[<span class="num">0</span>].message.content</code></pre>
<h2>Prompt Testing Framework</h2>
<pre><code><span class="kw">def</span> <span class="fn">eval_prompt</span>(prompt_template: <span class="cls">str</span>, test_cases: list) -> <span class="cls">float</span>:
    correct = <span class="num">0</span>
    <span class="kw">for</span> case <span class="kw">in</span> test_cases:
        prompt = prompt_template.format(**case[<span class="str">"inputs"</span>])
        output = llm.invoke(prompt)
        <span class="kw">if</span> case[<span class="str">"check"</span>](output):  <span class="cm"># lambda to test output</span>
            correct += <span class="num">1</span>
    accuracy = correct / len(test_cases)
    print(f<span class="str">"Prompt accuracy: {accuracy:.1%} ({correct}/{len(test_cases)})"</span>)
    <span class="kw">return</span> accuracy

<span class="cm"># A/B test prompts before deploying</span>
v1 = eval_prompt(prompt_v1, test_cases)  <span class="cm"># 72% accuracy</span>
v2 = eval_prompt(prompt_v2, test_cases)  <span class="cm"># 89% accuracy</span>
print(f<span class="str">"V2 is {(v2-v1)/v1:.0%} better — deploying V2"</span>)</code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Prompt Engineering Priority Order</div><p class="box-text">1. Clear role + task in system prompt. 2. Add "Answer ONLY from context" for RAG. 3. Add output format specification. 4. Add 2-3 few-shot examples. 5. Add chain-of-thought if reasoning is needed. 6. Add negative examples (what NOT to do). Always test on 20+ examples before declaring victory. Version prompts in LangSmith Hub or Git — treat them like code.</p></div></div>`
},

"embeddings": {id:"embeddings",title:"Embeddings and Semantic Search",cat:"Embeddings & Vector DB",level:"Intermediate",time:"30 min",
content:`<h2>Embeddings</h2>
<p>Embeddings are dense vector representations of text — the mathematical engine behind semantic search, clustering, recommendations, and RAG retrieval. Every production AI architect must understand how to generate, store, and use them efficiently.</p>
<h2>How Embeddings Work</h2>
<pre><code><span class="cm"># Text → numbers that capture semantic meaning</span>
<span class="cm"># "cat" → [0.2, -0.8, 0.3, ...] (1536 dimensions for text-embedding-3-small)</span>
<span class="cm"># "feline" → [0.19, -0.81, 0.31, ...] (very similar vector!)</span>
<span class="cm"># "car" → [-0.5, 0.4, -0.2, ...]  (very different vector)</span>
<span class="cm"># Cosine similarity: cat·feline ≈ 0.95, cat·car ≈ 0.12</span></code></pre>
<h2>Generating Embeddings</h2>
<pre><code><span class="kw">from</span> openai <span class="kw">import</span> OpenAI
<span class="kw">import</span> numpy <span class="kw">as</span> np

client = OpenAI()

<span class="kw">def</span> <span class="fn">embed</span>(text: <span class="cls">str</span>) -> list[<span class="cls">float</span>]:
    resp = client.embeddings.create(
        model=<span class="str">"text-embedding-3-small"</span>, input=text)
    <span class="kw">return</span> resp.data[<span class="num">0</span>].embedding  <span class="cm"># 1536-dim list</span>

<span class="kw">def</span> <span class="fn">embed_batch</span>(texts: list[<span class="cls">str</span>]) -> list[list[<span class="cls">float</span>]]:
    <span class="cm"># Batch is more efficient — one API call for many texts</span>
    resp = client.embeddings.create(
        model=<span class="str">"text-embedding-3-small"</span>, input=texts)
    <span class="kw">return</span> [d.embedding <span class="kw">for</span> d <span class="kw">in</span> sorted(resp.data, key=<span class="kw">lambda</span> x: x.index)]

<span class="kw">def</span> <span class="fn">cosine_similarity</span>(a: list, b: list) -> <span class="cls">float</span>:
    a, b = np.array(a), np.array(b)
    <span class="kw">return</span> float(np.dot(a, b) / (np.linalg.norm(a) * np.linalg.norm(b)))</code></pre>
<h2>Embedding Model Comparison</h2>
<table><tr><th>Model</th><th>Dims</th><th>Cost/1M tokens</th><th>MTEB Score</th><th>Best For</th></tr>
<tr><td>text-embedding-3-small</td><td>1536</td><td>$0.02</td><td>62.3</td><td>Production default — best cost/quality</td></tr>
<tr><td>text-embedding-3-large</td><td>3072</td><td>$0.13</td><td>64.6</td><td>Higher precision tasks</td></tr>
<tr><td>text-embedding-ada-002</td><td>1536</td><td>$0.10</td><td>60.9</td><td>Legacy — use 3-small instead</td></tr>
<tr><td>BAAI/bge-m3 (local)</td><td>1024</td><td>Free</td><td>63.1</td><td>On-premise, multilingual</td></tr>
<tr><td>sentence-transformers/all-MiniLM</td><td>384</td><td>Free</td><td>56.3</td><td>Lightweight, fast, local</td></tr></table>
<h2>Self-Hosted Embeddings (Cost Saving)</h2>
<pre><code><span class="kw">from</span> sentence_transformers <span class="kw">import</span> SentenceTransformer
<span class="kw">import</span> numpy <span class="kw">as</span> np

<span class="cm"># Free, runs on CPU, 300-1000 sentences/sec</span>
model = SentenceTransformer(<span class="str">"BAAI/bge-m3"</span>)  <span class="cm"># multilingual, 1024-dim</span>

<span class="kw">def</span> <span class="fn">embed_local</span>(texts: list[<span class="cls">str</span>]) -> np.ndarray:
    <span class="kw">return</span> model.encode(texts, normalize_embeddings=<span class="kw">True</span>,
                        batch_size=<span class="num">64</span>, show_progress_bar=<span class="kw">True</span>)

<span class="cm"># vs OpenAI text-embedding-3-small for 1M docs:</span>
<span class="cm"># OpenAI: ~$20 per million + latency</span>
<span class="cm"># Self-hosted: $0 + 1x t3.large EC2 instance (~$0.08/hr)</span></code></pre>
<h2>Matryoshka Embeddings</h2>
<pre><code><span class="cm"># text-embedding-3-small supports truncation to smaller dims</span>
<span class="cm"># Smaller dims = less storage + faster ANN search</span>
resp = client.embeddings.create(
    model=<span class="str">"text-embedding-3-small"</span>, input=texts,
    dimensions=<span class="num">256</span>)  <span class="cm"># Truncate 1536 → 256 dims</span>
<span class="cm"># 256 dims: 6x less storage, 6x faster ANN, ~3% quality loss</span>
<span class="cm"># Great for mobile or very large scale (100M+ vectors)</span></code></pre>
<h2>Embedding Caching</h2>
<pre><code><span class="kw">import</span> hashlib, json
<span class="kw">from</span> redis <span class="kw">import</span> Redis

redis = Redis()

<span class="kw">def</span> <span class="fn">embed_cached</span>(text: <span class="cls">str</span>) -> list[<span class="cls">float</span>]:
    key = hashlib.sha256(text.encode()).hexdigest()
    cached = redis.get(f<span class="str">"emb:{key}"</span>)
    <span class="kw">if</span> cached: <span class="kw">return</span> json.loads(cached)

    emb = embed(text)
    redis.setex(f<span class="str">"emb:{key}"</span>, <span class="num">86400</span>, json.dumps(emb))  <span class="cm"># TTL 24h</span>
    <span class="kw">return</span> emb
<span class="cm"># If 40% of queries repeat, cache cuts embedding cost by 40%</span></code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Embedding Architecture Decisions</div><p class="box-text">Default to text-embedding-3-small — it's 5x cheaper than ada-002 with better quality. Self-host bge-m3 if you have &gt;10M documents or multilingual requirements. Always store vectors as float32 for Qdrant/pgvector. Cache embeddings for repeated queries — embedding cost can dominate at scale. Use 256-dim truncation for mobile or if you have &gt;50M vectors. Never embed the question and documents with different models.</p></div></div>`
},

"vector-databases": {id:"vector-databases",title:"Vector Databases",cat:"Embeddings & Vector DB",level:"Intermediate",time:"35 min",
content:`<h2>Vector Databases</h2>
<p>Vector databases store high-dimensional embeddings and enable fast approximate nearest neighbor (ANN) search — the retrieval backbone of every production RAG system.</p>
<h2>How ANN Search Works</h2>
<div class="box note"><div class="box-ico">💡</div><div class="box-body"><div class="box-title">HNSW Algorithm</div><p class="box-text">Exact nearest neighbor search is O(n·d) — too slow for millions of vectors. HNSW (Hierarchical Navigable Small World) builds a multi-layer graph index, finding approximate nearest neighbors in O(log n) with >95% recall. Fast enough for real-time retrieval at scale.</p></div></div>
<h2>Vector DB Comparison</h2>
<table><tr><th>DB</th><th>Type</th><th>Scale</th><th>Best For</th></tr>
<tr><td>Qdrant</td><td>Open source (Rust)</td><td>Billions</td><td>On-premise, high performance</td></tr>
<tr><td>Pinecone</td><td>Managed SaaS</td><td>Billions</td><td>Zero-ops cloud</td></tr>
<tr><td>pgvector</td><td>Postgres extension</td><td>~10M</td><td>Existing Postgres shops</td></tr>
<tr><td>Weaviate</td><td>Open source</td><td>Billions</td><td>GraphQL, multi-modal</td></tr>
<tr><td>ChromaDB</td><td>Open source</td><td>&lt;1M</td><td>Local dev/prototyping only</td></tr>
<tr><td>Milvus</td><td>Open source</td><td>Billions</td><td>Large-scale on-premise</td></tr></table>
<h2>Qdrant — Python</h2>
<pre><code><span class="kw">from</span> qdrant_client <span class="kw">import</span> QdrantClient
<span class="kw">from</span> qdrant_client.models <span class="kw">import</span> Distance, VectorParams, PointStruct

client = QdrantClient(<span class="str">"localhost"</span>, port=<span class="num">6333</span>)
client.create_collection(<span class="str">"docs"</span>,
    vectors_config=VectorParams(size=<span class="num">1536</span>, distance=Distance.COSINE))

<span class="cm"># Upsert with metadata for tenant isolation</span>
client.upsert(<span class="str">"docs"</span>, points=[
    PointStruct(id=<span class="num">1</span>, vector=embed(<span class="str">"RAG overview"</span>),
                payload={<span class="str">"source"</span>:<span class="str">"doc.pdf"</span>,<span class="str">"page"</span>:<span class="num">3</span>,<span class="str">"tenant"</span>:<span class="str">"acme"</span>}),
])

<span class="cm"># Filtered search (tenant isolation)</span>
hits = client.search(<span class="str">"docs"</span>,
    query_vector=embed(query),
    query_filter={<span class="str">"must"</span>:[{<span class="str">"key"</span>:<span class="str">"tenant"</span>,<span class="str">"match"</span>:{<span class="str">"value"</span>:<span class="str">"acme"</span>}}]},
    limit=<span class="num">5</span>, with_payload=<span class="kw">True</span>)

<span class="kw">for</span> h <span class="kw">in</span> hits:
    print(f<span class="str">"{h.score:.3f} | {h.payload['source']} p{h.payload['page']}"</span>)</code></pre>
<h2>pgvector — SQL + Vectors</h2>
<pre><code>CREATE EXTENSION vector;
CREATE TABLE docs (
    id SERIAL PRIMARY KEY,
    content TEXT,
    embedding vector(1536),
    tenant TEXT,
    source TEXT
);
CREATE INDEX ON docs USING hnsw (embedding vector_cosine_ops)
    WITH (m = 16, ef_construction = 64);

SELECT content, source,
       1 - (embedding &lt;=&gt; \$1::vector) AS similarity
FROM docs
WHERE tenant = \$2
ORDER BY embedding &lt;=&gt; \$1::vector
LIMIT 5;</code></pre>
<h2>Spring AI VectorStore (Java)</h2>
<pre><code><span class="dec">@Bean</span>
<span class="kw">public</span> <span class="cls">VectorStore</span> <span class="fn">vectorStore</span>(<span class="cls">JdbcTemplate</span> jdbc, <span class="cls">EmbeddingModel</span> em) {
    <span class="kw">return new</span> <span class="cls">PgVectorStore</span>(jdbc, em);  <span class="cm">// or QdrantVectorStore</span>
}

vectorStore.add(List.of(<span class="kw">new</span> <span class="cls">Document</span>(text, Map.of(<span class="str">"tenant"</span>, tenantId))));

List&lt;Document&gt; hits = vectorStore.similaritySearch(
    SearchRequest.query(question).withTopK(<span class="num">5</span>)
        .withFilterExpression(<span class="str">"tenant == 'acme'"</span>));</code></pre>
<h2>HNSW Tuning</h2>
<table><tr><th>Param</th><th>Default</th><th>Effect</th></tr>
<tr><td>M</td><td>16</td><td>Graph edges per node — higher = better recall + more RAM</td></tr>
<tr><td>ef_construction</td><td>64</td><td>Build quality — higher = slower build + better recall</td></tr>
<tr><td>ef_search</td><td>64</td><td>Query accuracy — tune per-request for speed/recall trade-off</td></tr></table>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Choosing Your Vector DB</div><p class="box-text">Existing Postgres + &lt;5M vectors → pgvector (no new infra). Cloud, zero-ops → Pinecone. High-perf on-premise → Qdrant. Regulated (bank/health) → Qdrant self-hosted in K8s. Warning: vectors can be approximately reversed to recover source text — never store unencrypted PII in payloads.</p></div></div>`
},

"rag-architecture": {id:"rag-architecture",title:"RAG System Architecture",cat:"RAG Systems",level:"Advanced",time:"50 min",
content:`<h2>RAG System Architecture</h2>
<p>RAG (Retrieval-Augmented Generation) grounds LLM responses in private knowledge, reducing hallucinations and enabling real-time knowledge updates without retraining. The dominant enterprise AI pattern in 2026.</p>
<h2>Two-Phase Architecture</h2>
<pre><code><span class="cm">OFFLINE (Indexing):</span>
<span class="cm">  Docs → Extract → Chunk (512t/50 overlap) → Embed → Vector DB</span>

<span class="cm">ONLINE (Query):</span>
<span class="cm">  Question → Embed → ANN k=20 → Rerank top 4 → LLM → Answer + Citations</span></code></pre>
<h2>Indexing Pipeline</h2>
<pre><code><span class="kw">from</span> langchain_community.document_loaders <span class="kw">import</span> DirectoryLoader, PyPDFLoader
<span class="kw">from</span> langchain.text_splitter <span class="kw">import</span> RecursiveCharacterTextSplitter
<span class="kw">from</span> langchain_openai <span class="kw">import</span> OpenAIEmbeddings
<span class="kw">from</span> langchain_community.vectorstores <span class="kw">import</span> Qdrant

raw = DirectoryLoader(<span class="str">"./docs"</span>, glob=<span class="str">"**/*.pdf"</span>, loader_cls=PyPDFLoader).load()
chunks = RecursiveCharacterTextSplitter(chunk_size=<span class="num">512</span>, chunk_overlap=<span class="num">50</span>).split_documents(raw)
vectorstore = Qdrant.from_documents(chunks,
    OpenAIEmbeddings(model=<span class="str">"text-embedding-3-small"</span>),
    url=<span class="str">"http://localhost:6333"</span>, collection_name=<span class="str">"kb"</span>)
print(f<span class="str">"Indexed {len(chunks)} chunks"</span>)</code></pre>
<h2>Query Pipeline with Reranking</h2>
<pre><code><span class="kw">from</span> sentence_transformers <span class="kw">import</span> CrossEncoder
<span class="kw">from</span> openai <span class="kw">import</span> OpenAI

reranker = CrossEncoder(<span class="str">"cross-encoder/ms-marco-MiniLM-L-6-v2"</span>)
client = OpenAI()

<span class="kw">def</span> <span class="fn">rag_query</span>(question: <span class="cls">str</span>, tenant: <span class="cls">str</span>) -> <span class="cls">dict</span>:
    candidates = vectorstore.similarity_search(question, k=<span class="num">20</span>, filter={<span class="str">"tenant"</span>: tenant})
    scores = reranker.predict([(question, c.page_content) <span class="kw">for</span> c <span class="kw">in</span> candidates])
    top4 = [candidates[i] <span class="kw">for</span> i <span class="kw">in</span> sorted(range(<span class="num">20</span>), key=<span class="kw">lambda</span> i: scores[i], reverse=<span class="kw">True</span>)[:<span class="num">4</span>]]
    context = <span class="str">"\n\n"</span>.join(f<span class="str">"[{i+1}] {d.page_content} (Source: {d.metadata.get('source','')})"</span>
                           <span class="kw">for</span> i,d <span class="kw">in</span> enumerate(top4))
    resp = client.chat.completions.create(model=<span class="str">"gpt-4o"</span>, temperature=<span class="num">0</span>, messages=[
        {<span class="str">"role"</span>:<span class="str">"system"</span>,<span class="str">"content"</span>:f<span class="str">"Answer ONLY from context:\n{context}"</span>},
        {<span class="str">"role"</span>:<span class="str">"user"</span>,  <span class="str">"content"</span>:question}])
    <span class="kw">return</span> {<span class="str">"answer"</span>: resp.choices[<span class="num">0</span>].message.content,
            <span class="str">"sources"</span>: [d.metadata.get(<span class="str">"source"</span>) <span class="kw">for</span> d <span class="kw">in</span> top4]}</code></pre>
<h2>RAG Variants</h2>
<table><tr><th>Variant</th><th>Description</th><th>When to Use</th></tr>
<tr><td>Naive RAG</td><td>Retrieve top-k → LLM. No reranking.</td><td>Prototypes only</td></tr>
<tr><td>Advanced RAG</td><td>Hybrid search + reranking + query rewriting</td><td>Production</td></tr>
<tr><td>Agentic RAG</td><td>Agent loops: retrieve → reason → re-retrieve</td><td>Multi-hop complex queries</td></tr>
<tr><td>Graph RAG</td><td>Knowledge graph + vector search</td><td>Highly connected domains</td></tr>
<tr><td>Multimodal RAG</td><td>Retrieve images, tables, charts</td><td>Document-heavy enterprises</td></tr></table>
<h2>Multi-turn Conversation</h2>
<pre><code><span class="kw">from</span> langchain.chains <span class="kw">import</span> create_history_aware_retriever

<span class="cm"># Rewrite "What about it?" using history before retrieving</span>
contextualize = ChatPromptTemplate.from_messages([
    (<span class="str">"system"</span>, <span class="str">"Rewrite question to be standalone given chat history."</span>),
    MessagesPlaceholder(<span class="str">"chat_history"</span>),
    (<span class="str">"human"</span>, <span class="str">"{input}"</span>)
])
history_retriever = create_history_aware_retriever(llm, retriever, contextualize)</code></pre>
<div class="box tip"><div class="box-ico">🎯</div><div class="box-body"><div class="box-title">Production RAG Checklist</div><p class="box-text">✅ Hybrid search (vector + BM25). ✅ Cross-encoder reranking. ✅ Metadata filter per tenant. ✅ System prompt: "Answer ONLY from context." ✅ RAGAS evaluation in CI/CD. ✅ Redis caching for repeated queries. ✅ Citations in every answer. ✅ LangFuse observability dashboard.</p></div></div>`
},

"rag-chunking": {id:"rag-chunking",title:"RAG Chunking Strategies",cat:"RAG Systems",level:"Advanced",time:"30 min",
content:`<h2>RAG Chunking Strategies</h2>
<p>Chunking — splitting documents into searchable pieces — is one of the highest-leverage decisions in RAG. Bad chunking causes retrieval failures regardless of how good your LLM is.</p>
<h2>Why Chunking Matters</h2>
<pre><code><span class="cm">Too small chunks (100 tokens):</span>
<span class="cm">  ✓ Precise retrieval</span>
<span class="cm">  ✗ Context is incomplete — LLM lacks enough info to answer</span>

<span class="cm">Too large chunks (2000 tokens):</span>
<span class="cm">  ✓ Full context in each chunk</span>
<span class="cm">  ✗ Dilutes relevance signal — retrieval becomes imprecise</span>
